name: Cancel superseded run
description: >-
  Runs in a unified status job when an upstream job was cancelled — with
  cancel-in-progress concurrency that means a newer push superseded this
  wave. Cancels the whole run via the API so the superseded commit shows
  grey "cancelled" instead of red "failure", keeping red reserved for
  real defects. The runner kills this step once the cancellation
  propagates; if it never does, the step fails loudly, so a cancelled
  wave can never read as green. Requires `actions: write` on the calling
  job.

runs:
  using: composite
  steps:
    - name: Cancel this run
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
      run: |
        set -euo pipefail
        echo "Upstream jobs were cancelled — this wave was superseded by a newer push."
        echo "Cancelling run ${RUN_ID} so the commit shows grey (cancelled), not red (failure)."
        gh api --method POST "repos/${REPO}/actions/runs/${RUN_ID}/cancel"
        # Upper bound before the fail-safe, not a wait for work: the runner
        # kills this step within seconds of the cancellation propagating.
        sleep 120
        echo "Cancellation did not propagate within 120s — failing loudly."
        exit 1
