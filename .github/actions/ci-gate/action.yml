name: CI Gate
description: >
  Selects browser coverage for Playwright/visual workflows. macOS (WebKit) and
  Firefox run on push to main; PRs stay Chromium-only to keep per-push cost
  down. The `run` output is always true so required-status-check gating works.

inputs:
  run-labels:
    description: Unused; retained for backwards compatibility with existing callers.
    required: false
    default: ""

outputs:
  run:
    description: Always true. Kept for backwards compatibility with existing `if:` guards.
    value: "true"
  run-macos:
    description: Whether macOS (WebKit) tests should run
    value: ${{ steps.check.outputs.run-macos }}
  browsers:
    description: Comma-separated list of browsers to test
    value: ${{ steps.check.outputs.browsers }}

runs:
  using: composite
  steps:
    - id: check
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        REF_NAME: ${{ github.ref_name }}
      run: |
        if [[ "$EVENT_NAME" == "push" && "$REF_NAME" == "main" ]]; then
          echo "run-macos=true" >> "$GITHUB_OUTPUT"
          echo "browsers=chromium,firefox" >> "$GITHUB_OUTPUT"
        else
          echo "run-macos=false" >> "$GITHUB_OUTPUT"
          echo "browsers=chromium" >> "$GITHUB_OUTPUT"
        fi
