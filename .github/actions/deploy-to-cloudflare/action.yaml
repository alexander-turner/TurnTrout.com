name: "Deploy to Cloudflare Pages"
description: "Installs Wrangler and deploys to Cloudflare Pages"
inputs:
  cloudflare-api-token:
    description: "Cloudflare API Token"
    required: true
  cloudflare-account-id:
    description: "Cloudflare Account ID"
    required: true
  cloudflare-zone-id:
    description: "Cloudflare Zone ID"
    required: true
  project-name:
    description: "Cloudflare Pages project name"
    required: true
  branch:
    description: "Branch name for deployment"
    required: true
  public-dir:
    description: "Directory containing the built site"
    required: false
    default: "./public"

runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

    - name: Install Wrangler
      run: pnpm install wrangler@3.99.0
      shell: bash

    - name: Deploy to Cloudflare Pages
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare-api-token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare-account-id }}
        CLOUDFLARE_ZONE_ID: ${{ inputs.cloudflare-zone-id }}
      run: |
        for attempt in 1 2 3; do
          if pnpm exec wrangler pages deploy ${{ inputs.public-dir }} --project-name=${{ inputs.project-name }} --branch ${{ inputs.branch }}; then
            exit 0
          fi
          echo "Deploy attempt $attempt failed, retrying in $((attempt * 15))s..."
          sleep $((attempt * 15))
        done
        echo "All deploy attempts failed"
        exit 1
      shell: bash
