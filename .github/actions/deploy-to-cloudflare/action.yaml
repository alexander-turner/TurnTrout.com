name: "Deploy to Cloudflare Pages"
description: >-
  Installs Wrangler and deploys to Cloudflare Pages. Reads
  ``CLOUDFLARE_API_TOKEN``, ``CLOUDFLARE_ACCOUNT_ID`` and
  ``CLOUDFLARE_ZONE_ID`` from the surrounding job/step environment (Wrangler
  picks these up natively), so set them once at the job level.
inputs:
  project-name:
    description: "Cloudflare Pages project name"
    required: true
  branch:
    description: "Branch name for deployment"
    required: true
  public-dir:
    description: "Directory containing the built site"
    required: false
    default: "./public"

runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

    - name: Install Wrangler
      run: pnpm install wrangler@3.99.0
      shell: bash

    - name: Deploy to Cloudflare Pages
      run: |
        for attempt in 1 2 3; do
          if pnpm exec wrangler pages deploy ${{ inputs.public-dir }} --project-name=${{ inputs.project-name }} --branch ${{ inputs.branch }}; then
            exit 0
          fi
          echo "Deploy attempt $attempt failed, retrying in $((attempt * 15))s..."
          sleep $((attempt * 15))
        done
        echo "All deploy attempts failed"
        exit 1
      shell: bash
