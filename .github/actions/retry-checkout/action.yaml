name: "Checkout with retry"
description: >-
  Wraps actions/checkout with a single retry after a 15-second delay.
  Mitigates transient GitHub token-provisioning failures that surface as
  "could not read Username" during git fetch on ephemeral runners.
inputs:
  ref:
    description: "The branch, tag, or SHA to checkout (forwarded to actions/checkout)."
    required: false
    default: ""
  fetch-depth:
    description: "Number of commits to fetch. 0 = full history."
    required: false
    default: "1"
  path:
    description: "Relative path under $GITHUB_WORKSPACE to place the repository."
    required: false
    default: ""
  sparse-checkout:
    description: "Cone patterns for sparse checkout."
    required: false
    default: ""
  filter:
    description: "Partial-clone filter spec (e.g. blob:none)."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Checkout (attempt 1)
      id: checkout1
      continue-on-error: true
      timeout-minutes: 5
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        ref: ${{ inputs.ref }}
        fetch-depth: ${{ inputs.fetch-depth }}
        path: ${{ inputs.path }}
        sparse-checkout: ${{ inputs.sparse-checkout }}
        filter: ${{ inputs.filter }}

    - name: Wait before retry
      if: steps.checkout1.outcome == 'failure'
      shell: bash
      run: |
        echo "::warning::Checkout failed — retrying in 15s"
        sleep 15

    - name: Checkout (attempt 2)
      if: steps.checkout1.outcome == 'failure'
      timeout-minutes: 5
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        ref: ${{ inputs.ref }}
        fetch-depth: ${{ inputs.fetch-depth }}
        path: ${{ inputs.path }}
        sparse-checkout: ${{ inputs.sparse-checkout }}
        filter: ${{ inputs.filter }}
