name: "Retry external command with exponential backoff"
description: >-
  Retries a shell command up to N times on non-zero exit with exponential
  backoff. Use ONLY for transient external failures we don't control (e.g.
  Cloudflare API 504s, external link checks). Do NOT
  wrap in-house steps (tests, linters, builds) — zero-flakiness policy
  requires fixing those at the source, not retrying them.
inputs:
  command:
    description: "Shell command to run and retry on non-zero exit."
    required: true
  max-attempts:
    description: "Maximum attempts, including the first try."
    required: false
    default: "4"
  initial-delay-seconds:
    description: "Delay before the second attempt. Doubles each retry."
    required: false
    default: "2"
  max-delay-seconds:
    description: "Cap on the exponential delay between retries."
    required: false
    default: "30"
  timeout-minutes:
    description: "Per-attempt timeout in minutes. 0 = no timeout."
    required: false
    default: "0"

runs:
  using: "composite"
  steps:
    - name: Retry with exponential backoff
      shell: bash
      env:
        # Passed via env so command contents don't get interpolated into
        # the shell literal — avoids quoting/injection issues.
        RETRY_COMMAND: ${{ inputs.command }}
        MAX_ATTEMPTS: ${{ inputs.max-attempts }}
        INITIAL_DELAY: ${{ inputs.initial-delay-seconds }}
        MAX_DELAY: ${{ inputs.max-delay-seconds }}
        TIMEOUT_MINUTES: ${{ inputs.timeout-minutes }}
      run: |
        # GitHub Actions runs composite `shell: bash` steps with
        # `set -eo pipefail`. Without disabling `-e` here, a failing
        # `bash -c "$RETRY_COMMAND"` aborts the script immediately and
        # the retry loop never iterates — `rc=$?` is never reached.
        set +e
        set -u
        attempt=1
        delay="$INITIAL_DELAY"

        timeout_prefix=""
        if [ "$TIMEOUT_MINUTES" -gt 0 ] 2>/dev/null; then
          timeout_secs=$((TIMEOUT_MINUTES * 60))
          if command -v timeout &>/dev/null; then
            timeout_prefix="timeout ${timeout_secs}"
          else
            timeout_prefix="perl -e 'alarm ${timeout_secs}; exec @ARGV' --"
          fi
        fi

        while :; do
          echo "::group::Attempt $attempt/$MAX_ATTEMPTS"
          if [ -n "$timeout_prefix" ]; then
            $timeout_prefix bash -c "$RETRY_COMMAND"
          else
            bash -c "$RETRY_COMMAND"
          fi
          rc=$?
          echo "::endgroup::"
          if [ "$rc" -eq 0 ]; then
            if [ "$attempt" -gt 1 ]; then
              echo "::notice::Command succeeded on attempt $attempt"
            fi
            exit 0
          fi
          if [ "$rc" -eq 124 ] && [ -n "$timeout_prefix" ]; then
            echo "::warning::Attempt $attempt timed out after ${TIMEOUT_MINUTES}m"
          fi
          if [ "$attempt" -ge "$MAX_ATTEMPTS" ]; then
            echo "::error::Command failed after $MAX_ATTEMPTS attempts (last exit code $rc)"
            exit "$rc"
          fi
          echo "::warning::Attempt $attempt failed (exit $rc). Retrying in ${delay}s..."
          sleep "$delay"
          attempt=$((attempt + 1))
          delay=$((delay * 2))
          if [ "$delay" -gt "$MAX_DELAY" ]; then
            delay="$MAX_DELAY"
          fi
        done
