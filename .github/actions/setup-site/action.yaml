name: "Setup Site"
description: "Sets up Node.js, pnpm, Python with uv, caches, and optionally browsers/system deps."
inputs:
  install-node-deps:
    description: "Whether to install Node.js and dependencies"
    required: false
    default: "true"
  install-python:
    description: "Whether to install Python and Python dependencies"
    required: false
    default: "true"
  install-sharp:
    description: "Whether to install sharp for Linux"
    required: false
    default: "false"
  install-browsers:
    description: "Whether to install Chromium (Playwright) and Chrome (Puppeteer)"
    required: false
    default: "false"
  install-system-deps:
    description: "Whether to install all system apt packages (build tools, ffmpeg, test utilities)"
    required: false
    default: "false"
  cache-playwright:
    description: "Whether to cache Playwright browsers"
    required: false
    default: "false"
  cache-puppeteer:
    description: "Whether to cache Puppeteer browsers"
    required: false
    default: "false"
  install-puppeteer-chrome:
    description: "Whether to install Puppeteer's Chrome (needed by pa11y-ci, subfont, Mermaid). Implies cache-puppeteer."
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    # ── Node.js ─────────────────────────────────────────────────────────────────
    - name: Set up Node.js
      if: inputs.install-node-deps == 'true'
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: "22.22.0"

    - name: Install pnpm
      if: inputs.install-node-deps == 'true'
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

    - name: Get pnpm store directory
      if: inputs.install-node-deps == 'true'
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Restore pnpm cache
      if: inputs.install-node-deps == 'true'
      uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    # Cache node_modules itself so `pnpm install --frozen-lockfile`
    # (which still takes 5–30s even with a warm pnpm store, because of
    # the symlink-farm setup) can be skipped on cache hit. Keyed on
    # install-sharp too because the build job installs a linux/x64
    # sharp binary that shards do not — they must not share a cache.
    - name: Cache node_modules
      if: inputs.install-node-deps == 'true'
      id: cache-node-modules
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: node_modules
        key: node-modules-${{ runner.os }}-sharp-${{ inputs.install-sharp }}-${{ hashFiles('**/pnpm-lock.yaml') }}

    - name: Install Node Dependencies
      if: inputs.install-node-deps == 'true' && steps.cache-node-modules.outputs.cache-hit != 'true'
      run: |
        # macOS doesn't have GNU timeout; use perl one-liner as a portable fallback
        if command -v timeout &>/dev/null; then
          timeout 600 pnpm install --frozen-lockfile
        else
          perl -e 'alarm 600; exec @ARGV' -- pnpm install --frozen-lockfile
        fi
      shell: bash
      env:
        NODE_OPTIONS: "--max-old-space-size=4096"

    - name: Install sharp
      if: inputs.install-sharp == 'true' && inputs.install-node-deps == 'true' && steps.cache-node-modules.outputs.cache-hit != 'true'
      run: pnpm install --os=linux --cpu=x64 sharp
      shell: bash

    # ── Python ────────────────────────────────────────────────────────────────
    - name: Set up uv
      if: inputs.install-python == 'true'
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      if: inputs.install-python == 'true'
      run: uv python install 3.11
      shell: bash

    # Cache .venv directly so `uv sync --frozen` (5–15s even with the
    # uv cache warm, because it copies into the venv) can be skipped on
    # cache hit.
    - name: Cache .venv
      if: inputs.install-python == 'true'
      id: cache-venv
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}

    - name: Install Python Dependencies
      if: inputs.install-python == 'true' && steps.cache-venv.outputs.cache-hit != 'true'
      run: uv sync --frozen
      shell: bash

    # ── Browsers ──────────────────────────────────────────────────────────────
    - name: Cache Playwright browsers
      if: inputs.cache-playwright == 'true'
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: ${{ runner.os == 'macOS' && '~/Library/Caches/ms-playwright' || '~/.cache/ms-playwright' }}
        key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    - name: Cache Puppeteer browsers
      if: inputs.cache-puppeteer == 'true' || inputs.install-puppeteer-chrome == 'true'
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: ~/.cache/puppeteer
        key: puppeteer-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          puppeteer-${{ runner.os }}-

    # ── Apt package cache ──────────────────────────────────────────────────────────
    # Redirect apt's archive dir to a cached location so ALL apt-get
    # install commands (here and in calling workflows) reuse cached .debs.
    # Any path that installs apt packages benefits from the cache, so
    # the gate matches `install-system-deps`.
    - name: Restore apt package cache
      if: inputs.install-system-deps == 'true' && runner.os == 'Linux'
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: ~/apt-cache
        key: apt-cache-${{ runner.os }}-${{ hashFiles('.github/actions/setup-site/action.yaml') }}
        restore-keys: |
          apt-cache-${{ runner.os }}-

    - name: Configure apt to use cached archives
      if: inputs.install-system-deps == 'true' && runner.os == 'Linux'
      run: |
        mkdir -p ~/apt-cache/partial
        echo "Dir::Cache::Archives \"$HOME/apt-cache/\";" | sudo tee /etc/apt/apt.conf.d/99-github-cache
      shell: bash

    - name: Install Chromium and Chrome for Mermaid rendering and critical CSS
      if: inputs.install-browsers == 'true' && inputs.install-node-deps == 'true'
      run: pnpm playwright install chromium && npx puppeteer browsers install chrome
      shell: bash

    # Puppeteer ≥22 dropped the postinstall Chrome download — pa11y-ci,
    # subfont, and any other Puppeteer caller will fail with "Could not
    # find Chrome" unless we install it explicitly. Skipped when
    # install-browsers already installed it above.
    - name: Install Puppeteer Chrome
      if: inputs.install-puppeteer-chrome == 'true' && inputs.install-browsers != 'true' && inputs.install-node-deps == 'true'
      run: npx puppeteer browsers install chrome
      shell: bash

    # ── System packages ─────────────────────────────────────────────────────────────
    # All apt packages in one step so every workflow populates the same
    # cache. With caching active, repeat installs unpack from disk in
    # seconds instead of downloading from slow mirrors.
    # All versions pinned for deterministic builds. Bump when Ubuntu
    # pushes security updates that remove the old version.
    # GitHub-hosted runners ship with `azure.archive.ubuntu.com` as the
    # priority-1 mirror in /etc/apt/apt-mirrors.txt. That mirror
    # periodically throttles to ~100 kB/s, which made install steps
    # consistently exceed any reasonable timeout. Drop the Azure entry so
    # apt falls through to canonical `archive.ubuntu.com` immediately.
    - name: Demote Azure apt mirror
      if: inputs.install-system-deps == 'true' && runner.os == 'Linux'
      run: |
        if [ -f /etc/apt/apt-mirrors.txt ]; then
          sudo sed -i '\|azure\.archive\.ubuntu\.com|d' /etc/apt/apt-mirrors.txt
        fi
        sudo sed -i 's|//azure\.archive\.ubuntu\.com/ubuntu|//archive.ubuntu.com/ubuntu|g' \
          /etc/apt/sources.list /etc/apt/sources.list.d/*.list 2>/dev/null || true
      shell: bash

    # Wrapped in retry-external because the upstream Ubuntu mirror still
    # occasionally rate-limits. retry-external bounds the total at 3
    # attempts; per-attempt we let apt run to completion rather than
    # capping with `timeout`, since slow-but-progressing downloads were
    # getting killed mid-fetch by a 10-min cap.
    - name: Install system packages
      if: inputs.install-system-deps == 'true' && runner.os == 'Linux'
      uses: ./.github/actions/retry-external
      with:
        max-attempts: "3"
        command: |
          sudo apt-get update && \
          sudo apt-get install -y --no-install-recommends \
            libxml2-utils=2.9.14+dfsg-1.3ubuntu3.7 \
            dos2unix=7.5.1-1 \
            ffmpeg=7:6.1.1-3ubuntu5 \
            libimage-exiftool-perl=12.76+dfsg-1 \
            inkscape=1.2.2-2ubuntu12 \
            rclone=1.60.1+dfsg-3ubuntu0.24.04.3 \
            fish=3.7.0-1
