name: "Setup Visual Testing Environment"
description: "Sets up Node.js, installs dependencies, and optionally installs Playwright."
inputs:
  install-playwright:
    description: "Whether to install Playwright and its dependencies"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Setup base environment
      uses: ./.github/actions/setup-base-env
      with:
        install-sharp: "false"
        cache-playwright: "true"
        cache-puppeteer: "true"
        cache-apt-playwright: ${{ inputs.install-playwright }}
        install-python: "false"

    - name: Install Playwright system dependencies
      if: inputs.install-playwright == 'true'
      shell: bash
      run: |
        # Restore cached .deb packages so apt skips downloading them
        if ls ~/apt-playwright-cache/*.deb &>/dev/null; then
          sudo cp ~/apt-playwright-cache/*.deb /var/cache/apt/archives/
        fi
        # Install with retry for transient mirror failures
        for attempt in 1 2 3; do
          pnpm exec playwright install-deps chromium webkit firefox && break
          [ "$attempt" -lt 3 ] && sleep $((attempt * 10)) || exit 1
        done
        # Save .deb packages for next run
        mkdir -p ~/apt-playwright-cache
        cp /var/cache/apt/archives/*.deb ~/apt-playwright-cache/ 2>/dev/null || true

    - name: Install ffmpeg from system packages
      run: |
        # Skip if ffmpeg is already available (e.g. pre-installed in Docker image)
        if command -v ffprobe &>/dev/null; then
          echo "ffprobe already available, skipping install"
          ffprobe -version
          exit 0
        fi
        # Pinned to ubuntu-24.04 runner's ffmpeg version (only ffprobe is needed at build time)
        sudo apt-get update
        sudo apt-get install -y ffmpeg=7:6.1.1-3ubuntu5
        ffprobe -version
      shell: bash
