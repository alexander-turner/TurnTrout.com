name: "Setup Visual Testing Environment"
description: "Sets up Node.js, installs dependencies, and optionally installs Playwright."
inputs:
  install-playwright:
    description: "Whether to install Playwright and its dependencies"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Setup site
      uses: ./.github/actions/setup-site
      with:
        install-sharp: "false"
        install-ffmpeg: "true"
        cache-playwright: "true"
        cache-puppeteer: "true"
        cache-apt: ${{ inputs.install-playwright }}
        install-python: "false"

    - name: Install Playwright system dependencies (Linux)
      if: inputs.install-playwright == 'true' && runner.os == 'Linux'
      shell: bash
      run: |
        # Install with retry for transient mirror failures. Apt archives are
        # cached by setup-site via cache-apt, so repeat runs unpack locally.
        for attempt in 1 2 3; do
          pnpm exec playwright install-deps chromium firefox && break
          [ "$attempt" -lt 3 ] && sleep $((attempt * 10)) || exit 1
        done

    - name: Install ffmpeg on macOS
      if: runner.os == 'macOS'
      run: |
        if command -v ffprobe &>/dev/null; then
          echo "ffprobe already available, skipping install"
          ffprobe -version
          exit 0
        fi
        brew install ffmpeg
        ffprobe -version
      shell: bash
