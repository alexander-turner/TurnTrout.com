name: "Setup Visual Testing Environment"
description: "Sets up Node.js, installs dependencies, and optionally installs Playwright."
inputs:
  install-playwright:
    description: "Whether to install Playwright and its dependencies"
    required: false
    default: "false"
  install-python:
    description: "Whether to install Python and uv (needed for r2_baselines.py)"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Setup site
      uses: ./.github/actions/setup-site
      with:
        install-sharp: "false"
        # install-system-deps installs ffmpeg + build tools on Linux. The
        # prior install-ffmpeg input no longer exists upstream and was
        # being silently ignored, leaving ffprobe unavailable when this
        # action runs in a build-on-runner job.
        install-system-deps: "true"
        cache-playwright: "true"
        cache-puppeteer: "true"
        install-python: ${{ inputs.install-python }}

    - name: Install Playwright system dependencies (Linux)
      if: inputs.install-playwright == 'true' && runner.os == 'Linux'
      shell: bash
      run: |
        # Install with retry for transient mirror failures. Apt archives are
        # cached by setup-site's "Restore apt package cache" step, so
        # repeat runs unpack locally.
        for attempt in 1 2 3; do
          pnpm exec playwright install-deps chromium firefox && break
          [ "$attempt" -lt 3 ] && sleep $((attempt * 10)) || exit 1
        done

    - name: Install ffmpeg on macOS
      if: runner.os == 'macOS'
      run: |
        if command -v ffprobe &>/dev/null; then
          echo "ffprobe already available, skipping install"
          ffprobe -version
          exit 0
        fi
        brew install ffmpeg
        ffprobe -version
      shell: bash

    # rclone ships via apt as part of setup-site's install-system-deps on
    # Linux, but macOS has no equivalent step — install it here so
    # scripts/r2_baselines.py works on both platforms.
    - name: Install rclone on macOS
      if: runner.os == 'macOS'
      run: |
        if command -v rclone &>/dev/null; then
          echo "rclone already available, skipping install"
          rclone version
          exit 0
        fi
        brew install rclone
        rclone version
      shell: bash
