version: 2
updates:
  # "npm" ecosystem automatically detects pnpm-lock.yaml and uses pnpm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: auto
    ignore:
      # eslint 10 breaks eslint-plugin-react and eslint-plugin-jsx-a11y
      # (peer deps pin to v9 max). Revisit when plugins add v10 support.
      - dependency-name: "eslint"
        versions: [">=10"]
      - dependency-name: "@eslint/js"
        versions: [">=10"]
      # punctilio 3.3+ adds quote wrappers to "Mismatched quotes in ..." errors,
      # which breaks toThrowErrorMatchingSnapshot assertions in
      # formatting_improvement_html.test.ts. Revisit by regenerating the
      # affected snapshots intentionally.
      - dependency-name: "punctilio"
        versions: [">=3.3.0"]
      # jest 30 switches to v8 coverage by default, which drops branch
      # coverage below 100% on existing files (pre-existing branches that
      # istanbul counted as fully covered). Re-enable after reconciling
      # coverage reporter config.
      - dependency-name: "jest"
        versions: [">=30"]
      - dependency-name: "jest-environment-jsdom"
        versions: [">=30"]
      - dependency-name: "babel-jest"
        versions: [">=30"]
      - dependency-name: "@jest/globals"
        versions: [">=30"]
      - dependency-name: "@types/jest"
        versions: [">=30"]
    groups:
      npm-all:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"

  # "uv" ecosystem specifically handles uv.lock updates
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: auto
    groups:
      uv-all:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"

  # Keep GitHub Actions versions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-all:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"

  # Dependabot only scans .github/workflows/ by default.
  # These entries cover composite actions in .github/actions/.
  - package-ecosystem: "github-actions"
    directory: ".github/actions/setup-site"
    schedule:
      interval: "weekly"
    ignore:
      # v6 breaks pnpm install with ERR_PNPM_BROKEN_LOCKFILE in CI
      - dependency-name: "pnpm/action-setup"
        versions: ["6"]
  - package-ecosystem: "github-actions"
    directory: ".github/actions/setup-visual-testing-env"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: ".github/actions/summarize-failed-shards"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: ".github/actions/deploy-to-cloudflare"
    schedule:
      interval: "weekly"
