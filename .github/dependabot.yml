version: 2
updates:
  # Only track a handful of npm packages for version updates.
  # Security updates for all packages are handled separately by
  # GitHub's Dependabot security alerts (enabled at the repo level).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: auto
    allow:
      - dependency-name: "punctilio"
      - dependency-name: "subfont"
    ignore:
      # punctilio 3.3+ changes collectTransformableElements to return the
      # outermost transformable element, so <p><a>URL</a></p> collects <p>
      # and our "don't mangle URLs" check (elt.tagName !== "a") no longer
      # fires. Re-enable once we either make the skip href-aware locally or
      # add a per-text-node skip hook in punctilio itself.
      - dependency-name: "punctilio"
        versions: [">=3.3.0"]

  # Keep GitHub Actions versions up to date (monthly to reduce churn)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      # v6 breaks pnpm install with ERR_PNPM_BROKEN_LOCKFILE in CI
      - dependency-name: "pnpm/action-setup"
        versions: [">=6"]
    groups:
      actions-all:
        patterns:
          - "*"

  # Composite actions in .github/actions/
  - package-ecosystem: "github-actions"
    directory: ".github/actions/setup-site"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "pnpm/action-setup"
        versions: [">=6"]
  - package-ecosystem: "github-actions"
    directory: ".github/actions/setup-visual-testing-env"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "pnpm/action-setup"
        versions: [">=6"]
  - package-ecosystem: "github-actions"
    directory: ".github/actions/summarize-failed-shards"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "pnpm/action-setup"
        versions: [">=6"]
  - package-ecosystem: "github-actions"
    directory: ".github/actions/deploy-to-cloudflare"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "pnpm/action-setup"
        versions: [">=6"]
