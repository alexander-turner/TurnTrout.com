version: 2
updates:
  # "npm" ecosystem automatically detects pnpm-lock.yaml and uses pnpm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: auto
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # "uv" ecosystem specifically handles uv.lock updates
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: auto
    groups:
      uv-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep GitHub Actions versions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
