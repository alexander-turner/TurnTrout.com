name: Accessibility

on:
  push:
    branches: ["main"]
    paths:
      - "quartz/**"
      - "!quartz/**/*.spec.ts"
      - "!quartz/**/*.test.ts"
      - "!quartz/**/*.test.tsx"
      - "!quartz/**/tests/**"
      - "website_content/**"
      - "config/quartz/**"
      - "config/constants.json"
      - "config/pa11y/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"

permissions:
  actions: read
  contents: read

jobs:
  a11y-build:
    if: ${{ !startsWith(github.head_ref, 'deepsource-') }}
    uses: ./.github/workflows/build-site.yaml
    with:
      artifact-name: a11y-public-dir

  a11y:
    needs: a11y-build
    runs-on: ubuntu-24.04
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup site
        uses: ./.github/actions/setup-site
        with:
          install-python: "false"

      - name: Download built site
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: a11y-public-dir
          path: public/

      - name: Start server and run accessibility checks
        timeout-minutes: 10
        run: |
          # Start server in background
          pnpm exec serve public -l 8080 &
          SERVER_PID=$!

          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:8080 > /dev/null; then
              break
            fi
            sleep 1
          done

          # Retry up to 3 times — Chrome intermittently hangs on
          # certain pages under CI memory pressure.
          for attempt in 1 2 3; do
            if pnpm test:a11y; then
              break
            elif [ "$attempt" -lt 3 ]; then
              echo "Attempt $attempt failed, retrying..."
            else
              echo "All 3 attempts failed"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
          done

          kill $SERVER_PID 2>/dev/null || true
