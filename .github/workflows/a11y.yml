name: Accessibility

concurrency:
  group: a11y-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  should-run:
    name: a11y-should-run
    # Skip the automated README-snapshot refresh (branch automated/readme-snapshots):
    # it only rewrites embedded external READMEs, not code under test. should-run is
    # skipped, so the always() reporter below marks the required check green.
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]' && !startsWith(github.head_ref, 'deepsource-') && github.head_ref != 'automated/readme-snapshots'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        timeout-minutes: 5
        with:
          sparse-checkout: .github/actions/ci-gate
          persist-credentials: false
      - id: gate
        uses: ./.github/actions/ci-gate
        with:
          force-labels: "ci:full-tests,ci:run-a11y"
          filters: |
            relevant:
              - "quartz/**"
              - "!quartz/**/*.spec.ts"
              - "!quartz/**/*.test.ts"
              - "!quartz/**/*.test.tsx"
              - "!quartz/**/tests/**"
              - "website_content/**"
              - "config/quartz/**"
              - "config/constants.json"
              - "config/pa11y/**"
              - "package.json"
              - "pnpm-lock.yaml"
              - ".github/actions/**"

  a11y-build:
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/build-site.yaml
    secrets:
      ACCESS_KEY_ID_TURNTROUT_MEDIA: ${{ secrets.ACCESS_KEY_ID_TURNTROUT_MEDIA }}
      SECRET_ACCESS_TURNTROUT_MEDIA: ${{ secrets.SECRET_ACCESS_TURNTROUT_MEDIA }}
      S3_ENDPOINT_ID_TURNTROUT_MEDIA: ${{ secrets.S3_ENDPOINT_ID_TURNTROUT_MEDIA }}

  a11y-test:
    needs: [should-run, a11y-build]
    runs-on: ubuntu-24.04
    timeout-minutes: 55

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        timeout-minutes: 5
        with:
          persist-credentials: false
      - name: Setup site
        uses: ./.github/actions/setup-site
        with:
          install-python: "false"
          install-puppeteer-chrome: "true"

      - name: Restore built site from cache
        uses: ./.github/actions/restore-site-cache
        with:
          key: site-build-${{ github.sha }}-fixtures-false

      - name: Start server
        id: server
        uses: ./.github/actions/wait-for-server
        with:
          path: public

      - name: Run accessibility checks
        timeout-minutes: 50
        env:
          SERVER_PID: ${{ steps.server.outputs.server-pid }}
        run: |
          pnpm test:a11y
          rc=$?
          kill "$SERVER_PID" 2>/dev/null || true
          exit "$rc"

  # Unified status check — provides passing status when gated off on PRs.
  # `if: always()` normally lets this job report a clean skip when should-run
  # gated everything off, but always() jobs are immune to the cancellation
  # that `cancel-in-progress` sends the rest of a superseded run — so the
  # `!contains(..., 'cancelled')` guard is required to let this job itself
  # go skipped (grey) instead of running to a false failure.
  a11y-status:
    name: a11y
    if: always() && !contains(needs.*.result, 'cancelled')
    needs: [should-run, a11y-test]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          if [[ "${NEEDS_SHOULD_RUN_OUTPUTS_RUN}" == "false" ]] || [[ "${{ needs.should-run.result }}" == "skipped" ]]; then
            echo "Tests were skipped (no relevant changes or filtered actor)"
            exit 0
          fi
          if [[ "${{ needs.a11y-test.result }}" != "success" ]]; then
            echo "a11y tests did not succeed (${{ needs.a11y-test.result }})"
            exit 1
          fi
        env:
          NEEDS_SHOULD_RUN_OUTPUTS_RUN: ${{ needs.should-run.outputs.run }}
