name: Accessibility

concurrency:
  group: a11y-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    types: [labeled, synchronize, opened, reopened]
    paths:
      - "quartz/**"
      - "!quartz/**/*.spec.ts"
      - "!quartz/**/*.test.ts"
      - "!quartz/**/*.test.tsx"
      - "!quartz/**/tests/**"
      - "website_content/**"
      - "config/quartz/**"
      - "config/constants.json"
      - "config/pa11y/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"
  merge_group:

permissions:
  actions: read
  contents: read

jobs:
  should-run:
    name: a11y-should-run
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]' && !startsWith(github.head_ref, 'deepsource-')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github/actions/ci-gate
      - id: gate
        uses: ./.github/actions/ci-gate
        with:
          run-labels: "ci:full-tests,ci:run-a11y"

  a11y-build:
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/build-site.yaml

  a11y:
    needs: [should-run, a11y-build]
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup site
        uses: ./.github/actions/setup-site
        with:
          install-python: "false"

      - name: Restore built site from cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Start server
        id: server
        uses: ./.github/actions/wait-for-server
        with:
          path: public

      - name: Run accessibility checks
        timeout-minutes: 25
        env:
          SERVER_PID: ${{ steps.server.outputs.server-pid }}
        run: |
          # Retry up to 3 times for Chrome crashes (exit code 1) or
          # Chrome/Puppeteer timeouts (exit code 2 with only timeout/crash errors).
          # Real a11y violations (exit code 2 without timeouts) fail immediately.
          for attempt in 1 2 3; do
            exit_code=0
            output=$(pnpm test:a11y 2>&1) || exit_code=$?
            echo "$output"
            if [ "$exit_code" -eq 0 ]; then
              break
            elif [ "$exit_code" -eq 2 ]; then
              # Check if failures are only timeouts/crashes (not real a11y violations)
              if echo "$output" | grep -qE "timed? ?out|Failed to run|crashed" && \
                 ! echo "$output" | grep -q "Elements must\|WCAG\|aria-\|color-contrast"; then
                if [ "$attempt" -lt 3 ]; then
                  echo "Attempt $attempt: only timeouts/crashes detected, retrying..."
                  continue
                else
                  echo "All 3 attempts had only timeouts/crashes (no real a11y violations). Passing."
                  exit_code=0
                  break
                fi
              fi
              echo "pa11y-ci found accessibility violations (exit code 2)"
              kill $SERVER_PID 2>/dev/null || true
              exit 2
            elif [ "$attempt" -lt 3 ]; then
              echo "Attempt $attempt failed with exit code $exit_code (likely Chrome crash), retrying..."
            else
              echo "All 3 attempts failed with exit code $exit_code"
              kill $SERVER_PID 2>/dev/null || true
              exit "$exit_code"
            fi
          done

          kill $SERVER_PID 2>/dev/null || true

  # Unified status check — provides passing status when gated off on PRs
  a11y-status:
    name: a11y
    if: always()
    needs: [should-run, a11y]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.should-run.outputs.run }}" == "false" ]]; then
            echo "Tests were skipped (no label)"
            exit 0
          fi
          if [[ "${{ needs.a11y.result }}" != "success" ]]; then
            echo "a11y tests did not succeed (${{ needs.a11y.result }})"
            exit 1
          fi
