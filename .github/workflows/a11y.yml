name: Accessibility

concurrency:
  group: a11y-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    paths:
      - "quartz/**"
      - "!quartz/**/*.spec.ts"
      - "!quartz/**/*.test.ts"
      - "!quartz/**/*.test.tsx"
      - "!quartz/**/tests/**"
      - "website_content/**"
      - "config/quartz/**"
      - "config/constants.json"
      - "config/pa11y/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"

permissions:
  actions: read
  contents: read

jobs:
  should-run:
    name: a11y-should-run
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]' && !startsWith(github.head_ref, 'deepsource-')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github/actions/ci-gate
      - id: gate
        uses: ./.github/actions/ci-gate
        with:
          run-labels: "ci:full-tests,ci:run-a11y"

  a11y-build:
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/build-site.yaml

  a11y-test:
    needs: [should-run, a11y-build]
    runs-on: ubuntu-24.04
    timeout-minutes: 55

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup site
        uses: ./.github/actions/setup-site
        with:
          install-python: "false"
          install-puppeteer-chrome: "true"

      - name: Restore built site from cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Start server
        id: server
        uses: ./.github/actions/wait-for-server
        with:
          path: public

      - name: Run accessibility checks
        timeout-minutes: 50
        env:
          SERVER_PID: ${{ steps.server.outputs.server-pid }}
        run: |
          # First pass: full sitemap. ~17 min on a healthy runner.
          # On crash (exit 1) or timeout/crash-only failure (exit 2 with
          # no real a11y violations), re-run pa11y *just for the URLs
          # that failed* — re-running the whole 200+ URL suite per
          # attempt blows the 50-min step cap with only 2 attempts'
          # worth of budget.
          set +e
          first_output=$(pnpm test:a11y 2>&1)
          first_exit=$?
          set -e
          echo "$first_output"

          if [ "$first_exit" -eq 0 ]; then
            kill $SERVER_PID 2>/dev/null || true
            exit 0
          fi

          real_violations=$(echo "$first_output" | grep -E "Elements must|WCAG|aria-|color-contrast" || true)
          flake_signal=$(echo "$first_output" | grep -E "timed? ?out|Failed to run|crashed" || true)
          if [ -z "$flake_signal" ] || [ -n "$real_violations" ]; then
            echo "pa11y-ci found real accessibility violations."
            kill $SERVER_PID 2>/dev/null || true
            exit "$first_exit"
          fi

          failing_urls=$(echo "$first_output" | grep -oE "Errors in http://localhost:8080[^:]+" | sed 's|Errors in ||' | sort -u)
          if [ -z "$failing_urls" ]; then
            echo "Flake signal but no Errors-in-URL line; falling back to full re-run."
            failing_urls="ALL"
          fi
          echo ""
          echo "First pass had flake-only failures. Retrying these URLs:"
          echo "$failing_urls"

          for attempt in 2 3; do
            set +e
            if [ "$failing_urls" = "ALL" ]; then
              retry_output=$(pnpm test:a11y 2>&1)
            else
              # Per-URL retry. Lower concurrency than the full suite is
              # already 1, so we just iterate.
              retry_output=""
              retry_exit=0
              while IFS= read -r url; do
                page_output=$(pnpm exec pa11y \
                  --config config/pa11y/.pa11yci \
                  --reporter cli \
                  "$url" 2>&1)
                page_exit=$?
                retry_output="${retry_output}${page_output}"$'\n'
                if [ "$page_exit" -ne 0 ]; then
                  retry_exit=$page_exit
                fi
              done <<< "$failing_urls"
            fi
            set -e
            echo "$retry_output"

            if [ "${retry_exit:-0}" -eq 0 ]; then
              echo "Attempt $attempt: all retried URLs passed."
              kill $SERVER_PID 2>/dev/null || true
              exit 0
            fi

            real_violations=$(echo "$retry_output" | grep -E "Elements must|WCAG|aria-|color-contrast" || true)
            if [ -n "$real_violations" ]; then
              echo "Retry attempt $attempt surfaced real accessibility violations."
              kill $SERVER_PID 2>/dev/null || true
              exit 2
            fi
            echo "Attempt $attempt: still only timeout/crash failures."
          done

          echo "All 3 attempts had only timeouts/crashes (no real a11y violations). Passing."
          kill $SERVER_PID 2>/dev/null || true

  # Unified status check — provides passing status when gated off on PRs
  a11y-status:
    name: a11y
    if: always()
    needs: [should-run, a11y-test]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.should-run.outputs.run }}" == "false" ]]; then
            echo "Tests were skipped (no label)"
            exit 0
          fi
          if [[ "${{ needs.a11y-test.result }}" != "success" ]]; then
            echo "a11y tests did not succeed (${{ needs.a11y-test.result }})"
            exit 1
          fi
