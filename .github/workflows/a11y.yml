name: Accessibility

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    types: [labeled, synchronize, opened, reopened]
    paths:
      - "quartz/**"
      - "!quartz/**/*.spec.ts"
      - "!quartz/**/*.test.ts"
      - "!quartz/**/*.test.tsx"
      - "!quartz/**/tests/**"
      - "website_content/**"
      - "config/quartz/**"
      - "config/constants.json"
      - "config/pa11y/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"
  merge_group:

permissions:
  actions: read
  contents: read

jobs:
  a11y-build:
    if: ${{ !startsWith(github.head_ref, 'deepsource-') }}
    uses: ./.github/workflows/build-site.yaml
    with:
      artifact-name: a11y-public-dir

  a11y:
    needs: a11y-build
    runs-on: ubuntu-24.04
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup site
        uses: ./.github/actions/setup-site
        with:
          install-python: "false"

      - name: Download built site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: a11y-public-dir
          path: public/

      - name: Start server and run accessibility checks
        timeout-minutes: 10
        run: |
          # Start server in background
          pnpm exec serve public -l 8080 &
          SERVER_PID=$!

          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:8080 > /dev/null; then
              break
            fi
            sleep 1
          done

          # Retry up to 3 times only for Chrome crashes (exit code 1).
          # pa11y-ci exits 2 for a11y violations — don't retry those.
          for attempt in 1 2 3; do
            exit_code=0
            pnpm test:a11y || exit_code=$?
            if [ "$exit_code" -eq 0 ]; then
              break
            elif [ "$exit_code" -eq 2 ]; then
              echo "pa11y-ci found accessibility violations (exit code 2)"
              kill $SERVER_PID 2>/dev/null || true
              exit 2
            elif [ "$attempt" -lt 3 ]; then
              echo "Attempt $attempt failed with exit code $exit_code (likely Chrome crash), retrying..."
            else
              echo "All 3 attempts failed with exit code $exit_code"
              kill $SERVER_PID 2>/dev/null || true
              exit "$exit_code"
            fi
          done

          kill $SERVER_PID 2>/dev/null || true
