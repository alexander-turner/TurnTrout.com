name: Archive outbound links

# Snapshots newly-added outbound links and re-probes liveness, then opens a PR
# with the updated manifest. Runs off the push critical path. The first full
# pass over ~1k+ links is run LOCALLY via `scripts/archive_links.py --backfill`
# (it exceeds the job time cap); this job handles the steady-state delta.
#
# Captures use single-file (headless Chromium) directly; links that are already
# hard-gone fall back to the Wayback Machine. Probe telemetry (strike counts)
# is synced to/from R2 so consecutive-run dead confirmation survives fresh
# runners while the committed manifest stays free of timestamp churn.
#
# NOT YET VALIDATED end-to-end in CI. Keep `workflow_dispatch`-only (no
# `schedule:`) until a local `--backfill` proves real captures land on R2. See
# .claude/dev-notes.md.

concurrency:
  group: archive-links
  cancel-in-progress: false

on:
  # Manual only until validated. Add `schedule: [{cron: "0 6 * * 1"}]` (weekly,
  # Mon 06:00 UTC) once a local --backfill proves the capture path.
  workflow_dispatch:
    inputs:
      refresh:
        description: "Re-archive links even if already archived"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write

env:
  # Pin single-file so an upstream release can't silently change capture
  # behavior. Keep in sync with python-tests.yaml's singlefile-integration job.
  SINGLE_FILE_VERSION: "2.0.83"
  # Probe telemetry lives on R2, not in git: strike counts must persist across
  # runs, but their weekly churn must not pollute the manifest PR diff.
  PROBE_STATE_REMOTE: "r2:turntrout/static/link-archive/probe-state.json"
  PROBE_STATE_LOCAL: ".archive_probe_state.json"

jobs:
  archive-links:
    runs-on: ubuntu-24.04
    # Stay well under the 6h job cap; the steady-state delta is small.
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        timeout-minutes: 5

      - name: Setup site
        uses: ./.github/actions/setup-site
        with:
          install-node-deps: "true"
          install-python: "true"
          install-system-deps: "true"

      - name: Install single-file
        uses: ./.github/actions/retry-external
        with:
          max-attempts: "3"
          timeout-minutes: "10"
          command: |
            npm install -g "single-file-cli@${SINGLE_FILE_VERSION}"
            single-file --version

      - name: Select a Chromium for single-file
        run: |
          chrome="$(command -v google-chrome || command -v chromium-browser || command -v chromium || true)"
          if [ -z "$chrome" ]; then
            echo "::error::No google-chrome/chromium binary found for single-file" >&2
            exit 1
          fi
          echo "Chromium for single-file: $chrome -> $("$chrome" --version)"
          echo "CHROME_BINARY=$chrome" >> "$GITHUB_ENV"

      - name: Smoke-test a real capture (version pin + chromium)
        # Captures a tiny locally-served page for real and asserts a usable
        # singlefile.html is produced — so a bad single-file release or a broken
        # Chromium fails here, before the multi-hundred-link run.
        run: uv run pytest -m requires_singlefile scripts/tests/test_archive_links.py

      - name: Configure rclone for R2
        env:
          ACCESS_KEY_ID_TURNTROUT_MEDIA: ${{ secrets.ACCESS_KEY_ID_TURNTROUT_MEDIA }}
          SECRET_ACCESS_TURNTROUT_MEDIA: ${{ secrets.SECRET_ACCESS_TURNTROUT_MEDIA }}
          S3_ENDPOINT_ID_TURNTROUT_MEDIA: ${{ secrets.S3_ENDPOINT_ID_TURNTROUT_MEDIA }}
        run: |
          mkdir -p "$HOME/.config/rclone"
          endpoint="$S3_ENDPOINT_ID_TURNTROUT_MEDIA"
          case "$endpoint" in
            *://*) ;;
            *) endpoint="https://${endpoint}.r2.cloudflarestorage.com" ;;
          esac
          cat > "$HOME/.config/rclone/rclone.conf" <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${ACCESS_KEY_ID_TURNTROUT_MEDIA}
          secret_access_key = ${SECRET_ACCESS_TURNTROUT_MEDIA}
          endpoint = ${endpoint}
          no_check_bucket = true
          EOF

      - name: Pull probe state from R2
        run: |
          rclone copyto "$PROBE_STATE_REMOTE" "$PROBE_STATE_LOCAL" \
            || echo "No previous probe state (first run)"

      - name: Archive new links and probe liveness
        env:
          ACCESS_KEY_ID_TURNTROUT_MEDIA: ${{ secrets.ACCESS_KEY_ID_TURNTROUT_MEDIA }}
          SECRET_ACCESS_TURNTROUT_MEDIA: ${{ secrets.SECRET_ACCESS_TURNTROUT_MEDIA }}
          S3_ENDPOINT_ID_TURNTROUT_MEDIA: ${{ secrets.S3_ENDPOINT_ID_TURNTROUT_MEDIA }}
          # Bound through env (not inlined into the script) to avoid template injection.
          REFRESH: ${{ github.event.inputs.refresh }}
        run: |
          args=(--probe-state "$PROBE_STATE_LOCAL")
          if [ "$REFRESH" = "true" ]; then args+=(--refresh); fi
          uv run python scripts/archive_links.py "${args[@]}"

      - name: Push probe state to R2
        run: rclone copyto "$PROBE_STATE_LOCAL" "$PROBE_STATE_REMOTE"

      - name: Verify every archived snapshot is live on R2
        # Enforces the invariant the per-PR linkchecker no longer checks: every
        # archive_url the reader could rewrite to must be a live R2 object.
        run: uv run python scripts/check_link_archive_integrity.py

      - name: Open PR with manifest changes
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          # A PAT (not GITHUB_TOKEN) so the opened PR triggers the required
          # status checks; GITHUB_TOKEN-authored PRs don't fire workflow runs.
          token: ${{ secrets.TEMPLATE_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "chore: refresh outbound link archive manifest"
          title: "chore: refresh outbound link archive manifest"
          body: |
            Automated update of `config/link_archive_manifest.json` from the
            scheduled archive-links job: newly-added outbound links were snapshotted
            to R2 and every known link's liveness was re-probed.

            The manifest holds only durable facts (`archive_url`, `dead`), so this
            diff contains real changes: new snapshots or dead-verdict flips. Dead
            links (404/410 confirmed on >=2 consecutive runs) will be rewritten to
            their archived copy at build time. Review the diff before merging.
          branch: chore/archive-links-manifest
          delete-branch: true
          add-paths: config/link_archive_manifest.json
          labels: automated
