name: Auto-fix failed deploy

on:
  workflow_run:
    workflows:
      - "Deploy to Cloudflare"
    types:
      - completed
    branches:
      - main
      - dev

permissions:
  issues: write
  actions: read

jobs:
  create-fix-issue:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-24.04
    steps:
      - name: Get failed job logs
        id: logs
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const runId = context.payload.workflow_run.id;

            // Get failed jobs
            const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
              filter: 'latest',
            });

            const failedJobs = jobs.filter(j => j.conclusion === 'failure');
            const jobSummaries = [];

            for (const job of failedJobs) {
              // Download logs for the failed job
              try {
                const { data: logData } = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  job_id: job.id,
                });

                // Get last 80 lines of log (most relevant for errors)
                const lines = logData.split('\n');
                const tail = lines.slice(-80).join('\n');
                jobSummaries.push(`### ${job.name}\n\n\`\`\`\n${tail}\n\`\`\``);
              } catch (e) {
                jobSummaries.push(`### ${job.name}\n\n_Could not retrieve logs: ${e.message}_`);
              }
            }

            core.setOutput('job_details', jobSummaries.join('\n\n'));
            core.setOutput('failed_job_names', failedJobs.map(j => j.name).join(', '));

      - name: Create issue for Claude to fix
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        env:
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          FAILED_JOBS: ${{ steps.logs.outputs.failed_job_names }}
          JOB_DETAILS: ${{ steps.logs.outputs.job_details }}
        with:
          script: |
            const runUrl = process.env.RUN_URL;
            const sha = process.env.HEAD_SHA.substring(0, 7);
            const branch = process.env.BRANCH;
            const failedJobs = process.env.FAILED_JOBS;
            const jobDetails = process.env.JOB_DETAILS;

            // Check for an existing open issue for this branch to avoid duplicates
            const marker = `<!-- auto-fix-deploy-${branch} -->`;
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auto-fix-deploy',
              per_page: 10,
            });

            const existing = existingIssues.find(i => i.body?.includes(marker));
            if (existing) {
              console.log(`Open issue #${existing.number} already exists for ${branch}, skipping`);
              return;
            }

            const body = [
              marker,
              `@claude The deploy to Cloudflare failed on \`${branch}\` at commit ${sha}.`,
              '',
              `**Failed run:** ${runUrl}`,
              `**Failed jobs:** ${failedJobs}`,
              '',
              '## Failed job logs',
              '',
              jobDetails,
              '',
              '## Instructions',
              '',
              'Please investigate the failure logs above, identify the root cause, and open a PR to fix it.',
              `Target branch: \`${branch}\``,
            ].join('\n');

            // Ensure the label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'auto-fix-deploy',
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'auto-fix-deploy',
                color: 'e11d48',
                description: 'Automated issue created when deploy fails on main/dev',
              });
            }

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `fix: Deploy failed on ${branch} (${sha})`,
              body: body,
              labels: ['auto-fix-deploy'],
            });

            console.log(`Created issue #${issue.number}: ${issue.html_url}`);
