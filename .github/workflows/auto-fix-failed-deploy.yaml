name: Auto-fix failed CI

on:
  workflow_run:
    workflows:
      - "Deploy to Cloudflare"
      - "Node tests"
    types:
      - completed
    branches:
      - main
      - dev

permissions:
  issues: write
  actions: read

concurrency:
  group: auto-fix-deploy-${{ github.event.workflow_run.head_branch }}

jobs:
  create-fix-issue:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-24.04
    steps:
      - name: Create issue for Claude to fix
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const runId = context.payload.workflow_run.id;
            const runUrl = context.payload.workflow_run.html_url;
            const workflowName = context.payload.workflow_run.name;
            const sha = context.payload.workflow_run.head_sha.substring(0, 7);
            const branch = context.payload.workflow_run.head_branch;
            const maxIssues = 3; // Circuit breaker: stop after 3 issues per branch

            // --- Circuit breaker: count recent auto-fix issues for this branch ---
            const marker = `<!-- auto-fix-deploy-${branch} -->`;
            const { data: recentIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'auto-fix-deploy',
              state: 'all',
              sort: 'created',
              direction: 'desc',
              per_page: 20,
            });

            const branchIssues = recentIssues.filter(i => i.body?.includes(marker));

            // Don't create if there's already an open issue for this branch
            const openIssue = branchIssues.find(i => i.state === 'open');
            if (openIssue) {
              console.log(`Open issue #${openIssue.number} already exists for ${branch}, skipping`);
              return;
            }

            // Don't create if we've hit the circuit breaker (issues in last 24h)
            const oneDayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000);
            const recentCount = branchIssues.filter(i => new Date(i.created_at) > oneDayAgo).length;
            if (recentCount >= maxIssues) {
              console.log(`Circuit breaker: ${recentCount} issues created for ${branch} in last 24h (max: ${maxIssues}), skipping`);
              return;
            }

            // --- Collect failed job logs ---
            const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
              filter: 'latest',
            });

            const failedJobs = jobs.filter(j => j.conclusion === 'failure');
            const jobSummaries = [];
            const maxLogBytes = 50000; // Cap total log size to stay within GitHub limits
            let totalBytes = 0;

            for (const job of failedJobs) {
              if (totalBytes >= maxLogBytes) {
                jobSummaries.push(`### ${job.name}\n\n_Log truncated (total size limit reached)_`);
                continue;
              }
              try {
                const { data: logData } = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  job_id: job.id,
                });

                const lines = logData.split('\n');
                let tail = lines.slice(-500).join('\n');
                if (totalBytes + tail.length > maxLogBytes) {
                  tail = tail.substring(0, maxLogBytes - totalBytes);
                }
                totalBytes += tail.length;
                jobSummaries.push(`### ${job.name}\n\n\`\`\`\n${tail}\n\`\`\``);
              } catch (e) {
                jobSummaries.push(`### ${job.name}\n\n_Could not retrieve logs: ${e.message}_`);
              }
            }

            const failedJobNames = failedJobs.map(j => j.name).join(', ');
            const jobDetails = jobSummaries.join('\n\n');

            // --- Create the issue ---
            const body = [
              marker,
              `@claude The **${workflowName}** workflow failed on \`${branch}\` at commit ${sha}.`,
              '',
              `**Failed run:** ${runUrl}`,
              `**Failed jobs:** ${failedJobNames}`,
              '',
              '## Failed job logs',
              '',
              jobDetails,
              '',
              '## Instructions',
              '',
              'Please investigate the failure logs above, identify the root cause, and open a PR to fix it.',
              `Target branch: \`${branch}\``,
            ].join('\n');

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `fix: ${workflowName} failed on ${branch} (${sha})`,
              body: body,
              labels: ['auto-fix-deploy'],
            });

            console.log(`Created issue #${issue.number}: ${issue.html_url}`);

  close-fixed-issue:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Close resolved issues
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const branch = context.payload.workflow_run.head_branch;
            const marker = `<!-- auto-fix-deploy-${branch} -->`;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'auto-fix-deploy',
              state: 'open',
              per_page: 10,
            });

            const branchIssues = openIssues.filter(i => i.body?.includes(marker));
            for (const issue of branchIssues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Automatically closing: CI is passing again on \`${branch}\`.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              console.log(`Closed issue #${issue.number}`);
            }
