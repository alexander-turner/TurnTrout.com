name: Auto-fix failed CI

on:
  workflow_run:
    workflows:
      - "Deploy to Cloudflare"
    types:
      - completed
    branches:
      - main
      - dev

permissions:
  issues: write
  actions: read

# If a deploy succeeds while we're creating a failure issue, cancel-in-progress
# drops the issue creation — which is correct since CI is already passing.
concurrency:
  group: auto-fix-deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  create-fix-issue:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-24.04
    steps:
      - name: Create issue for Claude to fix
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const run = context.payload.workflow_run;
            const branch = run.head_branch;
            const sha = run.head_sha.substring(0, 7);
            const marker = `<!-- auto-fix-deploy-${branch} -->`;
            const maxIssuesPerDay = 3;

            // --- Circuit breaker ---
            const { data: recentIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'auto-fix-deploy',
              state: 'all',
              sort: 'created',
              direction: 'desc',
              per_page: 20,
            });

            const branchIssues = recentIssues.filter(i => i.body?.includes(marker));

            const openIssue = branchIssues.find(i => i.state === 'open');
            if (openIssue) {
              console.log(`Open issue #${openIssue.number} already exists for ${branch}, skipping`);
              return;
            }

            const oneDayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000);
            const recentCount = branchIssues.filter(i => new Date(i.created_at) > oneDayAgo).length;
            if (recentCount >= maxIssuesPerDay) {
              console.log(`Circuit breaker: ${recentCount} issues in last 24h for ${branch} (max ${maxIssuesPerDay}), skipping`);
              return;
            }

            // --- Collect failed job logs ---
            const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
              owner, repo,
              run_id: run.id,
              filter: 'latest',
            });

            const failedJobs = jobs.filter(j => j.conclusion === 'failure');
            if (failedJobs.length === 0) {
              console.log('Run failed but no individual jobs show failure (infrastructure issue?), skipping');
              return;
            }

            const jobSummaries = [];
            // GitHub issue body limit is 65,536 chars; leave room for the template
            const maxLogBytes = 45_000;
            let totalBytes = 0;

            for (const job of failedJobs) {
              if (totalBytes >= maxLogBytes) {
                jobSummaries.push(`### ${job.name}\n\n_Log truncated (size limit reached)_`);
                continue;
              }
              try {
                const { data: logData } = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner, repo,
                  job_id: job.id,
                });

                // Strip GitHub's timestamp prefixes (e.g. "2024-01-15T10:30:00.1234567Z ")
                const cleaned = logData
                  .split('\n')
                  .slice(-500)
                  .map(line => line.replace(/^\d{4}-\d{2}-\d{2}T[\d:.]+Z /, ''))
                  .join('\n');

                const tail = cleaned.slice(-(maxLogBytes - totalBytes));
                totalBytes += tail.length;
                jobSummaries.push(`### ${job.name}\n\n\`\`\`\n${tail}\n\`\`\``);
              } catch (e) {
                jobSummaries.push(`### ${job.name}\n\n_Could not retrieve logs: ${e.message}_`);
              }
            }

            // --- Create the issue ---
            const body = [
              marker,
              `@claude The **${run.name}** workflow failed on \`${branch}\` at commit ${sha}.`,
              '',
              `**Failed run:** ${run.html_url}`,
              `**Failed jobs:** ${failedJobs.map(j => j.name).join(', ')}`,
              '',
              '## Failed job logs',
              '',
              jobSummaries.join('\n\n'),
              '',
              '## Instructions',
              '',
              'Please investigate the failure logs above, identify the root cause, and open a PR to fix it.',
              `Target branch: \`${branch}\``,
            ].join('\n');

            const { data: issue } = await github.rest.issues.create({
              owner, repo,
              title: `fix: ${run.name} failed on ${branch} (${sha})`,
              body,
              labels: ['auto-fix-deploy'],
            });

            console.log(`Created issue #${issue.number}: ${issue.html_url}`);

  close-fixed-issue:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Close resolved issues
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.payload.workflow_run.head_branch;
            const marker = `<!-- auto-fix-deploy-${branch} -->`;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'auto-fix-deploy',
              state: 'open',
              per_page: 10,
            });

            for (const issue of openIssues.filter(i => i.body?.includes(marker))) {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issue.number,
                body: `Automatically closing: CI is passing again on \`${branch}\`.`,
              });
              await github.rest.issues.update({
                owner, repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              console.log(`Closed issue #${issue.number}`);
            }
