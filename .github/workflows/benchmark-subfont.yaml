name: Benchmark subfont

concurrency:
  group: benchmark-subfont-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "patches/subfont*"
      - "scripts/subfont.sh"
      - ".github/workflows/benchmark-subfont.yaml"

permissions:
  actions: read
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        timeout-minutes: 5

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env

      - name: Build site
        run: pnpm build

      - name: Run subfont with timing
        run: |
          echo "::group::subfont output"
          time NODE_OPTIONS="--max-old-space-size=6144" npx subfont --root public/ $(find public -type f -size +1100c -name "*.html") --formats woff2 --in-place --instance --inline-css --no-recursive --skip-source-map-processing
          echo "::endgroup::"
