name: Build Site

# Reusable workflow that builds the Quartz site and uploads the artifact.
# Called by workflows that need a built site (Playwright, Visual, Lighthouse, etc.).

on:
  workflow_call:
    inputs:
      artifact-name:
        description: "Name for the uploaded artifact"
        required: true
        type: string
      retention-days:
        description: "Number of days to retain the artifact"
        required: false
        type: number
        default: 1
      fetch-depth:
        description: "Git fetch depth (0 for full history)"
        required: false
        type: number
        default: 1
      remove-safari-autoplay:
        description: "Remove Safari autoplay script before build (for visual testing)"
        required: false
        type: boolean
        default: false

permissions:
  actions: read
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}
          filter: ${{ inputs.fetch-depth == 0 && 'blob:none' || '' }}

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env

      - name: Remove Safari autoplay script
        if: inputs.remove-safari-autoplay
        run: rm -f ./quartz/static/scripts/safari-autoplay.js

      - name: Build site
        run: pnpm build
        env:
          NODE_OPTIONS: "--permission --allow-fs-read=* --allow-fs-write=${{ github.workspace }}/*,/tmp/* --allow-child-process"

      - name: Upload built site
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ inputs.artifact-name }}
          path: public/
          retention-days: ${{ inputs.retention-days }}
