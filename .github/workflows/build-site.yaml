name: Build Site

# Reusable workflow that builds the Quartz site and caches the result.
# Called by workflows that need a built site (Playwright, Visual, Lighthouse, etc.).
# Uses actions/cache to deduplicate builds across workflows for the same commit.
# Consumer workflows restore the cache directly via actions/cache/restore.

on:
  workflow_call:
    inputs:
      fetch-depth:
        description: "Git fetch depth (0 for full history, required for commit-count population)"
        required: false
        type: number
        default: 0

permissions:
  actions: read
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    # Serialize builds for the same commit across every caller (deploy,
    # visual-testing, site-build-checks, playwright-tests, a11y, etc.).
    # The first caller does the real build (~24 min) and writes the
    # public/ cache. Every later caller queues, then hits the cache and
    # the build/setup steps no-op via the `if:` gates below. Without this,
    # all callers race in parallel and each pays the full build cost,
    # which is what hit the old 30-min timeout on slower runners.
    concurrency:
      group: build-site-${{ github.sha }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}
          filter: ${{ inputs.fetch-depth == 0 && 'blob:none' || '' }}

      # Cache keyed on commit SHA. First workflow to build
      # populates the cache; subsequent workflows get a hit and skip the build.
      - name: Restore build cache
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}

      - name: Setup Build Environment
        if: steps.cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-site
        with:
          install-sharp: "true"
          install-browsers: "true"
          install-system-deps: "true"
          cache-playwright: "true"
          cache-puppeteer: "true"
          cache-apt: "true"

      - name: Build site
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm build
