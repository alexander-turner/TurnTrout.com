name: Build Site

# Reusable workflow that builds the Quartz site and caches the result.
# Called by workflows that need a built site (Playwright, Visual, Lighthouse, etc.).
# Uses actions/cache to deduplicate builds across workflows for the same commit.
# Consumer workflows restore the cache directly via actions/cache/restore.

on:
  workflow_call:
    inputs:
      fetch-depth:
        description: "Git fetch depth (0 for full history, required for commit-count population)"
        required: false
        type: number
        default: 0
      include-fixtures:
        description: "Include `website_content/fixtures/` pages in the build. Set to true for visual/Playwright test builds. Must stay false for any artifact that ships to users."
        required: false
        type: boolean
        default: false

permissions:
  actions: read
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      INCLUDE_FIXTURES: ${{ inputs.include-fixtures && 'true' || '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}
          filter: ${{ inputs.fetch-depth == 0 && 'blob:none' || '' }}

      # Cache keyed on commit SHA + fixture flag. Test builds and deploy
      # builds end up at different keys so fixtures can't leak from one to
      # the other.
      - name: Restore build cache
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}-fixtures-${{ inputs.include-fixtures }}

      - name: Setup Build Environment
        if: steps.cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-site
        with:
          install-sharp: "true"
          install-browsers: "true"
          install-system-deps: "true"
          cache-playwright: "true"
          cache-puppeteer: "true"

      - name: Build site
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm build

      - name: Audit fixture artifacts vs include-fixtures flag
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          INCLUDE_FIXTURES_FLAG: ${{ inputs.include-fixtures }}
        run: |
          set -euo pipefail
          if [[ ! -d public ]]; then
            echo "public/ missing; nothing to audit"
            exit 0
          fi
          fixtures=$(find public -path '*fixture*' -type f | sort || true)
          if [[ -z "$fixtures" ]]; then
            echo "no fixture artifacts in public/"
          else
            echo "fixture artifacts (include-fixtures=${INCLUDE_FIXTURES_FLAG}):"
            printf '  %s\n' $fixtures
          fi
          if [[ "${INCLUDE_FIXTURES_FLAG}" != "true" && -n "$fixtures" ]]; then
            echo "::error::Fixture artifacts present despite include-fixtures=false"
            exit 1
          fi
          if [[ "${INCLUDE_FIXTURES_FLAG}" == "true" && -z "$fixtures" ]]; then
            echo "::error::include-fixtures=true but no fixture artifacts in build — RemoveFixtures filter may be broken"
            exit 1
          fi
