name: Track CI failures on PRs

# Wires up the existing scripts/.github/scripts/track_ci_failures.py so
# repeated failures on a PR get a single rolling tracker comment and
# `needs-human-review` label when attempts are exhausted.
#
# NOTE: an earlier iteration of this workflow posted @claude mentions to
# reuse the existing claude.yaml fix path. PR history (issues #1051,
# #1054, #1062, #1063, etc.) shows that path never produced a Claude
# response — every such issue was only closed by the auto-close bot when
# CI passed after a human fix. Until @claude invocation is known to work
# here, this workflow just makes failures more visible. The primary
# fix mechanism remains local Claude Code sessions (verify_ci.py Stop
# hook + scripts/run_push_checks.py autofixers).

on:
  workflow_run:
    workflows:
      - "Lint and validate"
      - "Python linting"
      - "site-build-checks"
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: track-ci-failures-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  track:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Find PR number
        id: pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests || [];
            if (prs.length === 0) {
              core.info('No PR attached to this workflow_run; skipping.');
              core.setOutput('skip', 'true');
              return;
            }
            core.setOutput('number', prs[0].number);

      - name: Update failure tracker
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: python3 .github/scripts/track_ci_failures.py
