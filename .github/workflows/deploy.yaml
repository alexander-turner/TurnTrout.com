name: Deploy to Cloudflare

concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches: ["main", "dev"]
  pull_request:
  workflow_dispatch:

# Read-only default; each job below elevates only to the writes it needs
# (Cloudflare OIDC/Pages deploys, PR preview comments, check-run reads).
# `actions: read` is required by the reusable build-site.yaml workflow (its
# jobs declare it); a reusable workflow's permissions cannot exceed the
# caller's, so omitting it here makes the whole run fail at startup.
permissions:
  actions: read
  contents: read

jobs:
  # Always triggers so the required-check context is created; the gate emits
  # run=false (and the deploy jobs report "skipped") when a PR touches no
  # deploy-relevant paths. Pushes and manual dispatches always run.
  should-run:
    name: deploy-should-run
    # Bot guard applies only to PRs; pushes/dispatches must always run so a
    # bot-authored squash-merge to main never skips the production deploy.
    if: github.event_name != 'pull_request' || (github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]' && !startsWith(github.head_ref, 'deepsource-'))
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        timeout-minutes: 5
        with:
          sparse-checkout: .github/actions/ci-gate
      - id: gate
        uses: ./.github/actions/ci-gate
        with:
          force-labels: "ci:full-tests,ci:run-deploy"
          filters: |
            relevant:
              - "quartz/**"
              - "!quartz/**/*.spec.ts"
              - "!quartz/**/*.test.ts"
              - "!quartz/**/*.test.tsx"
              - "!quartz/**/tests/**"
              - "website_content/**"
              - "config/quartz/**"
              - "config/constants.json"
              - "package.json"
              - "pnpm-lock.yaml"
              - ".github/actions/**"

  deploy-build:
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/build-site.yaml
    with:
      fetch-depth: 0

  prepare-deploy:
    needs: [should-run, deploy-build]
    if: needs.should-run.outputs.run == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    # Cloudflare Pages deploy (OIDC + Pages) plus PR preview comments.
    permissions:
      contents: read
      id-token: write
      pages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        timeout-minutes: 5
        with:
          fetch-depth: 0

      - name: Setup site
        uses: ./.github/actions/setup-site
        with:
          install-sharp: "true"
          install-browsers: "true"
          install-system-deps: "true"

      - name: Restore built site from cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}-fixtures-false
          fail-on-cache-miss: true

      # --- PR preview: deploy immediately without subfont ---
      - name: Deploy PR preview to Cloudflare Pages
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/deploy-to-cloudflare
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-zone-id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          project-name: turntrout
          branch: pr-${{ github.event.pull_request.number }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const marker = '<!-- pr-preview-deploy -->';
            const prNumber = parseInt(process.env.PR_NUMBER);
            const sha = context.sha.substring(0, 7);
            const deployUrl = `https://pr-${prNumber}.turntrout.pages.dev`;

            const body = [
              marker,
              `**Preview deployed** for commit ${sha}:`,
              deployUrl,
              '',
              'This preview updates automatically on each push to this PR.'
            ].join('\n');

            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });
              const existing = comments.find(c => c.body?.includes(marker));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: body,
                });
              }
            } catch (error) {
              core.setFailed(`Failed to comment on PR: ${error.message}`);
            }

      # --- main/dev: early deploy for dev, then subfont + checks ---
      - name: Deploy to Cloudflare Pages (fast feedback for dev)
        if: github.event_name == 'push' && github.ref_name == 'dev'
        uses: ./.github/actions/deploy-to-cloudflare
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-zone-id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          project-name: turntrout
          branch: ${{ github.ref_name }}

      # subfont is pinned to @turntrout/subfont@1.8.1 in package.json and
      # installed by setup-site's `pnpm install`, so we run it via
      # `pnpm exec` (in scripts/subfont.sh) — no separate global install.
      - name: Make script executable
        if: github.event_name == 'push'
        run: chmod +x ./scripts/subfont.sh
      - name: Subset fonts
        if: github.event_name == 'push'
        run: sh ./scripts/subfont.sh

      - name: Run site checks
        if: github.event_name == 'push'
        run: uv run python scripts/built_site_checks.py --check-fonts

      - name: Upload prepared site after subfont
        if: github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: public-dir
          path: public/

  # Wait for test workflows to pass before deploying to production.
  # Checks visual-testing and playwright-tests results.
  verify-test-results:
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    # Reads check-run conclusions on the commit via the GitHub API.
    permissions:
      contents: read
      checks: read
    steps:
      - name: Wait for test workflows to succeed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Poll check-run conclusions on the commit instead of watching
          # specific workflow runs. This handles cancelled/replaced runs
          # gracefully — sort_by(.started_at)|last always picks the most
          # recent check run for each name.
          # Per-check wall-clock deadline. The 90-min job timeout is the outer
          # bound; this inner deadline fails a single check fast (with a clear
          # message) if it never even produces a check-run, instead of burning
          # the whole job budget polling a check that will never appear.
          CHECK_DEADLINE_SECONDS=2700  # ~45 min per check
          for CHECK_NAME in visual-testing playwright-tests; do
            echo "Waiting for $CHECK_NAME..."
            CANCEL_RETRIES=0
            MAX_CANCEL_RETRIES=10  # Wait up to ~5 min for a replacement run
            POLL_INTERVAL=30
            MAX_POLL_INTERVAL=120
            CHECK_START=$(date +%s)
            while true; do
              if [ $(( $(date +%s) - CHECK_START )) -ge "$CHECK_DEADLINE_SECONDS" ]; then
                echo "::error::$CHECK_NAME did not conclude within $((CHECK_DEADLINE_SECONDS / 60)) min (no successful check-run observed). Failing fast."
                exit 1
              fi
              RESULT=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs" \
                --jq "[.check_runs[] | select(.name == \"$CHECK_NAME\")] | sort_by(.started_at) | last | .conclusion // empty" \
                2>/dev/null || echo "")

              case "$RESULT" in
                success)
                  echo "$CHECK_NAME passed"
                  break
                  ;;
                "")
                  CANCEL_RETRIES=0
                  echo "$CHECK_NAME still pending, waiting ${POLL_INTERVAL}s..."
                  sleep $POLL_INTERVAL
                  # Exponential backoff with cap
                  POLL_INTERVAL=$(( POLL_INTERVAL + POLL_INTERVAL / 4 ))
                  [ $POLL_INTERVAL -gt $MAX_POLL_INTERVAL ] && POLL_INTERVAL=$MAX_POLL_INTERVAL
                  ;;
                cancelled)
                  CANCEL_RETRIES=$((CANCEL_RETRIES + 1))
                  if [ $CANCEL_RETRIES -ge $MAX_CANCEL_RETRIES ]; then
                    echo "::error::$CHECK_NAME was cancelled with no replacement after $MAX_CANCEL_RETRIES retries"
                    exit 1
                  fi
                  echo "$CHECK_NAME was cancelled, waiting for replacement run ($CANCEL_RETRIES/$MAX_CANCEL_RETRIES)..."
                  sleep 30
                  ;;
                *)
                  echo "::error::$CHECK_NAME concluded with: $RESULT"
                  exit 1
                  ;;
              esac
            done
          done

  deploy:
    needs: [prepare-deploy, verify-test-results]
    if: |
      always() &&
      github.event_name == 'push' && (
        github.ref_name == 'dev' ||
        (github.ref_name == 'main' && needs.verify-test-results.result == 'success')
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Cloudflare Pages production deploy (OIDC + Pages).
    permissions:
      contents: read
      id-token: write
      pages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        timeout-minutes: 5

      - name: Download prepared site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: public-dir
          path: public/
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Cloudflare Pages
        uses: ./.github/actions/deploy-to-cloudflare
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-zone-id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          project-name: turntrout
          branch: ${{ github.ref_name }}
