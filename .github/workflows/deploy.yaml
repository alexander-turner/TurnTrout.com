name: Deploy to Cloudflare

concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "quartz/**"
      - "!quartz/**/*.spec.ts"
      - "!quartz/**/*.test.ts"
      - "!quartz/**/*.test.tsx"
      - "!quartz/**/tests/**"
      - "website_content/**"
      - "config/quartz/**"
      - "config/constants.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"

permissions:
  actions: read
  contents: read
  id-token: write
  pages: write
  pull-requests: write

jobs:
  deploy-build:
    uses: ./.github/workflows/build-site.yaml
    with:
      fetch-depth: 0

  prepare-deploy:
    needs: deploy-build
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          filter: blob:none

      - name: Setup site
        uses: ./.github/actions/setup-site
        with:
          install-sharp: "true"
          install-browsers: "true"
          install-ffmpeg: "true"
          install-system-deps: "true"

      - name: Restore built site from cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      # --- PR preview: deploy immediately without subfont ---
      - name: Deploy PR preview to Cloudflare Pages
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/deploy-to-cloudflare
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-zone-id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          project-name: turntrout
          branch: pr-${{ github.event.pull_request.number }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const marker = '<!-- pr-preview-deploy -->';
            const prNumber = parseInt(process.env.PR_NUMBER);
            const sha = context.sha.substring(0, 7);
            const deployUrl = `https://pr-${prNumber}.turntrout.pages.dev`;

            const body = [
              marker,
              `**Preview deployed** for commit ${sha}:`,
              deployUrl,
              '',
              'This preview updates automatically on each push to this PR.'
            ].join('\n');

            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });
              const existing = comments.find(c => c.body?.includes(marker));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: body,
                });
              }
            } catch (error) {
              core.setFailed(`Failed to comment on PR: ${error.message}`);
            }

      # --- main/dev: early deploy for dev, then subfont + checks ---
      - name: Deploy to Cloudflare Pages (fast feedback for dev)
        if: github.event_name == 'push' && github.ref_name == 'dev'
        uses: ./.github/actions/deploy-to-cloudflare
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-zone-id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          project-name: turntrout
          branch: ${{ github.ref_name }}

      - name: Install subfont
        if: github.event_name == 'push'
        run: pnpm add -g github:alexander-turner/subfont
      - name: Make script executable
        if: github.event_name == 'push'
        run: chmod +x ./scripts/subfont.sh
      - name: Subset fonts
        if: github.event_name == 'push'
        run: sh ./scripts/subfont.sh

      - name: Run site checks
        if: github.event_name == 'push'
        run: uv run python scripts/built_site_checks.py --check-fonts

      - name: Upload prepared site after subfont
        if: github.event_name == 'push'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: public-dir
          path: public/

  # Verify Lost Pixel visual changes are within bounds before deploying.
  # Test-waiting removed: merge queue validates Chromium tests before main.
  # Firefox/WebKit regressions are caught on the main push itself (not pre-merge).
  verify-visual-changes:
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    steps:
      - name: Wait for Lost Pixel status and verify visual changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if visual testing was skipped (combine-and-upload won't produce a LP check)
          COMBINE_STATUS=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs" \
            --jq '[.check_runs[] | select(.name == "combine-and-upload")] | .[0].conclusion // "missing"' \
            2>/dev/null || echo "missing")
          if [ "$COMBINE_STATUS" = "skipped" ] || [ "$COMBINE_STATUS" = "missing" ]; then
            echo "combine-and-upload was skipped or not found — no Lost Pixel check expected"
            exit 0
          fi

          # Poll for the Lost Pixel check (created by LP platform ~10 min after upload)
          MAX_ATTEMPTS=40  # 40 × 30s = 20 min max wait
          ATTEMPT=0
          SUMMARY=""

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))

            # Check runs (GitHub App check)
            SUMMARY=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs" \
              --paginate \
              --jq '[.check_runs[] | select(.name | test("lost.pixel"; "i"))] | .[0].output.summary // empty' \
              2>/dev/null || true)

            if [ -z "$SUMMARY" ]; then
              # Also check commit statuses (Lost Pixel may use status API)
              SUMMARY=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/statuses" \
                --jq '[.[] | select(.context | test("lost.pixel"; "i"))] | .[0].description // empty' \
                2>/dev/null || true)
            fi

            if [ -n "$SUMMARY" ]; then
              echo "Lost Pixel check found on attempt $ATTEMPT"
              break
            fi

            # Log available check-run names to aid debugging
            if [ $((ATTEMPT % 5)) -eq 0 ]; then
              echo "Available check runs:"
              gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs" \
                --jq '.check_runs[].name' 2>/dev/null || true
            fi
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: Lost Pixel check not yet available, waiting 30s..."
            sleep 30
          done

          if [ -z "$SUMMARY" ]; then
            echo "::error::Lost Pixel check never appeared after $MAX_ATTEMPTS attempts"
            exit 1
          fi

          echo "Lost Pixel result: $SUMMARY"

          # Extract counts for changed, added, and deleted images
          CHANGED=$(echo "$SUMMARY" | grep -oP '\d+(?=\s*(changed|visual|difference|diff))' | head -1)
          ADDED=$(echo "$SUMMARY" | grep -oP '\d+(?=\s*(added|new|created))' | head -1)
          DELETED=$(echo "$SUMMARY" | grep -oP '\d+(?=\s*(deleted|removed))' | head -1)

          # If none of the patterns matched, fail — the LP summary format may have changed
          if [ -z "$CHANGED" ] && [ -z "$ADDED" ] && [ -z "$DELETED" ]; then
            echo "::error::Could not parse any counts from Lost Pixel summary. Format may have changed."
            echo "Raw summary: $SUMMARY"
            exit 1
          fi

          CHANGED=${CHANGED:-0}
          ADDED=${ADDED:-0}
          DELETED=${DELETED:-0}
          TOTAL=$((CHANGED + ADDED + DELETED))

          echo "Visual changes: $CHANGED changed, $ADDED added, $DELETED deleted (total: $TOTAL)"
          if [ "$TOTAL" -ge 10 ]; then
            echo "::error::Too many visual differences ($TOTAL). Maximum allowed: 9. Breakdown: $CHANGED changed, $ADDED added, $DELETED deleted"
            exit 1
          fi
          echo "Visual differences within acceptable range (< 10)"

  deploy:
    needs: [prepare-deploy, verify-visual-changes]
    if: ${{ github.event_name == 'push' && ((always() && github.ref_name == 'dev') || needs.verify-visual-changes.result == 'success') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download prepared site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: public-dir
          path: public/

      - name: Deploy to Cloudflare Pages
        uses: ./.github/actions/deploy-to-cloudflare
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-zone-id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          project-name: turntrout
          branch: ${{ github.ref_name }}
