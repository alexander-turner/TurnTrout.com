name: Gitleaks Secret Scanning

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITLEAKS_VERSION: "8.30.1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download pinned gitleaks
        run: |
          curl -fsSL --retry 6 --retry-all-errors --retry-delay 15 --connect-timeout 30 \
            -O "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" gitleaks

      - name: Run gitleaks
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash .github/scripts/gitleaks-scan.sh

  # Stable Required check: runs even when `gitleaks` is cancelled/skipped, so a
  # protected branch never gets stuck on a check that never reports.
  gitleaks-passed: # required-check: true
    if: always()
    needs: [gitleaks]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            .github/actions/report-job-result
            .github/scripts
          persist-credentials: false

      - name: Report result
        uses: ./.github/actions/report-job-result
        with:
          run: "true"
          decide-result: "success"
          result: ${{ needs.gitleaks.result }}
