# Catches a force-push / rebase / squash that silently DROPS a commit the PR
# branch already had (see .github/scripts/check-history-integrity.sh). Fires only
# on `synchronize` (a push to an existing PR head), which is the sole event that
# carries the before/after SHAs a rewrite is detected from; `opened` has no prior
# head, so this is not — and cannot be — a required check (it never reports on the
# first push). Informational guard, not a merge gate.
name: History integrity

on:
  pull_request:
    types: [synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  no-dropped-commits:
    name: No dropped commits on force-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # persist-credentials stays on (artipacked ignored): this job uploads no
      # artifacts, so no token can leak into one, and the script needs the token
      # to `git fetch` a possibly-orphaned pre-push SHA from a private repo.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 # zizmor: ignore[artipacked]
        with:
          fetch-depth: 0
      - name: Check the push dropped no prior commit
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: bash .github/scripts/check-history-integrity.sh "$BEFORE" "$AFTER"
