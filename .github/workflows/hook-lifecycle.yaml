name: Hook lifecycle

# Runs the full Claude hook lifecycle (session setup -> pre-commit -> pre-push)
# on a clean checkout, so a broken hook is caught in CI rather than in a session.

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  decide:
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/decide-reusable.yaml
    with:
      filters: |
        run:
          - '.claude/hooks/**'
          - '.hooks/**'
          - 'setup.sh'
          - 'package.json'
          - 'pnpm-lock.yaml'
          - 'pyproject.toml'
          - 'uv.lock'
          - '.pre-commit-config.yaml'
          - '.github/scripts/run-hook-lifecycle.sh'
          - '.github/scripts/check-symlinks.sh'
          - '.github/actions/setup-base-env/**'
          - '.github/workflows/hook-lifecycle.yaml'

  hook-lifecycle:
    needs: decide
    if: needs.decide.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env
        with:
          setup-python: "true"

      - name: Run hook lifecycle
        run: bash .github/scripts/run-hook-lifecycle.sh

  hook-lifecycle-passed: # required-check: true
    if: always()
    needs: [decide, hook-lifecycle]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            .github/actions/report-job-result
            .github/scripts
          persist-credentials: false

      - name: Report result
        uses: ./.github/actions/report-job-result
        with:
          run: ${{ needs.decide.outputs.run }}
          decide-result: ${{ needs.decide.result }}
          result: ${{ needs.hook-lifecycle.result }}
