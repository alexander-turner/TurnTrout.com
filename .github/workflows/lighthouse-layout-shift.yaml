name: Lighthouse Testing

concurrency:
  group: lighthouse-testing-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: ["main", "dev"]
  pull_request:
    types: [labeled]
  merge_group:

permissions:
  actions: read
  contents: read
  id-token: write
  pages: write

jobs:
  should-run:
    name: lighthouse-should-run
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github/actions/ci-gate
      - id: gate
        uses: ./.github/actions/ci-gate
        with:
          run-labels: "ci:full-tests,ci:run-lighthouse"

  build:
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/build-site.yaml

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    outputs:
      deploy_url: ${{ steps.deploy_cf_pages.outputs.DEPLOY_URL }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup site
        uses: ./.github/actions/setup-site
        with:
          install-python: "false"

      - name: Restore built site from cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Install subfont
        run: pnpm add -g github:alexander-turner/subfont
      - name: Subset fonts for Lighthouse test pages
        run: |
          subfont --root public/ \
            public/index.html \
            public/design.html \
            public/about.html \
            public/research.html \
            public/Test-page.html \
            public/posts.html \
            --formats woff2 --in-place --instance --inline-css --no-recursive --debug

      - name: Install Wrangler
        run: pnpm add -g wrangler

      - name: Publish to Cloudflare Pages for Lighthouse testing
        id: deploy_cf_pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-8)
          DEPLOY_OUTPUT=$(pnpm exec wrangler pages deploy ./public --project-name=turntrout --branch=commit-${SHORT_SHA} --commit-dirty=true)

          echo "Wrangler deployment output:"
          echo "${DEPLOY_OUTPUT}"

          DEPLOY_URL=$(echo "${DEPLOY_OUTPUT}" | grep -o 'https://[a-zA-Z0-9.-]*pages.dev' | tail -n 1)

          if [[ -z "$DEPLOY_URL" ]]; then
            echo "::error::Could not determine deployment URL from Wrangler output using URL pattern."
            # Fallback: try to extract from "Deployment complete!" line or similar
            DEPLOY_URL=$(echo "${DEPLOY_OUTPUT}" | grep -oP 'https://[^\s]+\.pages\.dev' | tail -n 1)
            if [[ -z "$DEPLOY_URL" ]]; then
              echo "::error::Fallback URL extraction also failed. Please check Wrangler output."
              exit 1
            fi
          fi

          echo "Extracted DEPLOY_URL: $DEPLOY_URL"
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Wait for deployment to be reachable
        run: |
          URL="${{ steps.deploy_cf_pages.outputs.DEPLOY_URL }}"
          echo "Waiting for $URL to respond..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$URL" 2>/dev/null || echo "000")
            if [[ "$STATUS" =~ ^[23] ]]; then
              echo "Deploy reachable (HTTP $STATUS) on attempt $i"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "::error::Deploy URL $URL not reachable after 20 attempts"
          exit 1

  lighthouse_desktop_cls:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: deploy
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: CLS Check (Desktop)
        id: lighthouse_desktop
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          urls: |
            ${{ needs.deploy.outputs.deploy_url }}/design
            ${{ needs.deploy.outputs.deploy_url }}/design#footnote-label
            ${{ needs.deploy.outputs.deploy_url }}/test-page
            ${{ needs.deploy.outputs.deploy_url }}/test-page#spoilers
            ${{ needs.deploy.outputs.deploy_url }}/test-page#videos
            ${{ needs.deploy.outputs.deploy_url }}/test-page#admonitions
            ${{ needs.deploy.outputs.deploy_url }}/test-page#footnotes
          temporaryPublicStorage: true
          configPath: ".github/lighthouse-cls-only-config.json"

      - name: Upload CLS reports (Desktop)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lighthouse-cls-reports-desktop
          path: ${{ github.workspace }}/.lighthouseci/
          retention-days: 1

  lighthouse_mobile_cls:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: deploy
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: CLS Check (Mobile)
        id: lighthouse_mobile
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          urls: |
            ${{ needs.deploy.outputs.deploy_url }}/design
            ${{ needs.deploy.outputs.deploy_url }}/design#footnote-label
            ${{ needs.deploy.outputs.deploy_url }}/test-page
            ${{ needs.deploy.outputs.deploy_url }}/test-page#spoilers
            ${{ needs.deploy.outputs.deploy_url }}/test-page#videos
            ${{ needs.deploy.outputs.deploy_url }}/test-page#admonitions
            ${{ needs.deploy.outputs.deploy_url }}/test-page#footnotes
          temporaryPublicStorage: true
          configPath: ".github/lighthouse-cls-only-config-mobile.json"

      - name: Upload CLS reports (Mobile)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lighthouse-cls-reports-mobile
          path: ${{ github.workspace }}/.lighthouseci/
          retention-days: 1

  lighthouse_full_audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: deploy
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run Lighthouse Full Audit (Performance, Accessibility, Best Practices, SEO)
        id: lighthouse_full
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          urls: |
            ${{ needs.deploy.outputs.deploy_url }}/
            ${{ needs.deploy.outputs.deploy_url }}/design
            ${{ needs.deploy.outputs.deploy_url }}/about
            ${{ needs.deploy.outputs.deploy_url }}/research
            ${{ needs.deploy.outputs.deploy_url }}/test-page
            ${{ needs.deploy.outputs.deploy_url }}/posts
          temporaryPublicStorage: true
          configPath: ".github/lighthouse-full-config.json"

      - name: Upload Lighthouse Full Audit reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lighthouse-reports-full-audit
          path: ${{ github.workspace }}/.lighthouseci/
          retention-days: 1
