name: Lighthouse Testing

concurrency:
  group: lighthouse-testing-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: ["main", "dev", "no-layout-shift"]
    paths:
      - "quartz/**/*.scss"
      - "quartz/**/*.tsx"
      - "!quartz/**/*.test.tsx"
      - "quartz/**/*.ts"
      - "!quartz/**/*.spec.ts"
      - "!quartz/**/*.test.ts"
      - "!quartz/**/tests/**"
      - "quartz/static/**"
      - "config/quartz/**"
      - "config/constants.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"
      - ".github/lighthouse-*.json"
  pull_request:
    types: [labeled, synchronize, opened, reopened]
    paths:
      - "quartz/**/*.scss"
      - "quartz/**/*.tsx"
      - "!quartz/**/*.test.tsx"
      - "quartz/**/*.ts"
      - "!quartz/**/*.spec.ts"
      - "!quartz/**/*.test.ts"
      - "!quartz/**/tests/**"
      - "quartz/static/**"
      - "config/quartz/**"
      - "config/constants.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"
      - ".github/lighthouse-*.json"
  merge_group:

permissions:
  actions: read
  contents: read
  id-token: write
  pages: write

jobs:
  # Gate: only run on PRs if ci:run-lighthouse or ci:full-tests label is present.
  should-run:
    name: lighthouse-should-run
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-24.04
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:full-tests') }}" == "true" ]] || \
               [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:run-lighthouse') }}" == "true" ]]; then
              echo "run=true" >> "$GITHUB_OUTPUT"
            else
              echo "run=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/build-site.yaml
    with:
      artifact-name: lighthouse-public-dir

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    outputs:
      deploy_url: ${{ steps.deploy_cf_pages.outputs.DEPLOY_URL }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env

      - name: Download built site
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: lighthouse-public-dir
          path: public/

      - name: Install subfont
        run: pnpm add -g subfont
      - name: Subset fonts for Lighthouse test pages
        run: |
          subfont --root public/ \
            public/index.html \
            public/design.html \
            public/about.html \
            public/research.html \
            public/Test-page.html \
            public/posts.html \
            --formats woff2 --in-place --instance --inline-css --no-recursive

      - name: Install Wrangler
        run: pnpm add -g wrangler

      - name: Publish to Cloudflare Pages for Lighthouse testing
        id: deploy_cf_pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-8)
          DEPLOY_OUTPUT=$(pnpm exec wrangler pages deploy ./public --project-name=turntrout --branch=commit-${SHORT_SHA} --commit-dirty=true)

          echo "Wrangler deployment output:"
          echo "${DEPLOY_OUTPUT}"

          DEPLOY_URL=$(echo "${DEPLOY_OUTPUT}" | grep -o 'https://[a-zA-Z0-9.-]*pages.dev' | tail -n 1)

          if [[ -z "$DEPLOY_URL" ]]; then
            echo "::error::Could not determine deployment URL from Wrangler output using primary method."
            DEPLOY_URL=$(echo "${DEPLOY_OUTPUT}" | grep -o 'https://[a-zA-Z0-9.-]*pages.dev' | tail -n 1)
            if [[ -z "$DEPLOY_URL" ]]; then
              echo "::error::Fallback URL extraction also failed. Please check Wrangler output."
              exit 1
            fi
          fi

          echo "Extracted DEPLOY_URL: $DEPLOY_URL"
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_OUTPUT

  lighthouse_desktop_cls:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: deploy
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: CLS Check (Desktop)
        id: lighthouse_desktop
        uses: treosh/lighthouse-ci-action@fcd65974f7c4c2bf0ee9d09b84d2489183c29726 # v12
        with:
          urls: |
            ${{ needs.deploy.outputs.deploy_url }}/design
            ${{ needs.deploy.outputs.deploy_url }}/design#footnote-label
            ${{ needs.deploy.outputs.deploy_url }}/test-page
            ${{ needs.deploy.outputs.deploy_url }}/test-page#spoilers
            ${{ needs.deploy.outputs.deploy_url }}/test-page#videos
            ${{ needs.deploy.outputs.deploy_url }}/test-page#admonitions
            ${{ needs.deploy.outputs.deploy_url }}/test-page#footnotes
          temporaryPublicStorage: true
          configPath: ".github/lighthouse-cls-only-config.json"

      - name: Upload CLS reports (Desktop)
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: lighthouse-cls-reports-desktop
          path: /home/runner/work/TurnTrout.com/TurnTrout.com/.lighthouseci/
          retention-days: 1

  lighthouse_mobile_cls:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: deploy
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: CLS Check (Mobile)
        id: lighthouse_mobile
        uses: treosh/lighthouse-ci-action@fcd65974f7c4c2bf0ee9d09b84d2489183c29726 # v12
        with:
          urls: |
            ${{ needs.deploy.outputs.deploy_url }}/design
            ${{ needs.deploy.outputs.deploy_url }}/design#footnote-label
            ${{ needs.deploy.outputs.deploy_url }}/test-page
            ${{ needs.deploy.outputs.deploy_url }}/test-page#spoilers
            ${{ needs.deploy.outputs.deploy_url }}/test-page#videos
            ${{ needs.deploy.outputs.deploy_url }}/test-page#admonitions
            ${{ needs.deploy.outputs.deploy_url }}/test-page#footnotes
          temporaryPublicStorage: true
          configPath: ".github/lighthouse-cls-only-config-mobile.json"

      - name: Upload CLS reports (Mobile)
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: lighthouse-cls-reports-mobile
          path: /home/runner/work/TurnTrout.com/TurnTrout.com/.lighthouseci/
          retention-days: 1

  lighthouse_full_audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: deploy
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run Lighthouse Full Audit (Performance, Accessibility, Best Practices, SEO)
        id: lighthouse_full
        uses: treosh/lighthouse-ci-action@fcd65974f7c4c2bf0ee9d09b84d2489183c29726 # v12
        with:
          urls: |
            ${{ needs.deploy.outputs.deploy_url }}/
            ${{ needs.deploy.outputs.deploy_url }}/design
            ${{ needs.deploy.outputs.deploy_url }}/about
            ${{ needs.deploy.outputs.deploy_url }}/research
            ${{ needs.deploy.outputs.deploy_url }}/test-page
            ${{ needs.deploy.outputs.deploy_url }}/posts
          temporaryPublicStorage: true
          configPath: ".github/lighthouse-full-config.json"

      - name: Upload Lighthouse Full Audit reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: lighthouse-reports-full-audit
          path: /home/runner/work/TurnTrout.com/TurnTrout.com/.lighthouseci/
          retention-days: 1
