name: Lint and validate

concurrency:
  group: lint-validate-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    paths:
      - "quartz/**"
      - "website_content/**"
      - "config/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/**"
  merge_group:

permissions:
  actions: read
  contents: read

jobs:
  update-dates:
    needs: detect-changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      pushed: ${{ steps.push-result.outputs.pushed }}
    # Only run on push to main by a human (skip our own automated date commits)
    # Note: github.actor reflects the PAT owner, not the bot, so we check the commit message
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !startsWith(github.event.head_commit.message, 'chore: updated publication dates') &&
      needs.detect-changes.outputs.content == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          filter: blob:none # Partial clone: skip historical file content (only need commit/tree objects for git diff --name-only)
          token: ${{ secrets.PUSH_TOKEN }}

      - name: Setup site
        uses: ./.github/actions/setup-site

      - name: Update article dates
        run: uv run python scripts/update_date_on_publish.py --commit-range "${{ github.event.before }}..${{ github.event.after }}"

      - name: Check for changes
        id: check-changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        id: push-result
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add website_content/*.md README.md
          git commit -m "chore: updated publication dates [skip ci]"
          git push
          echo "pushed=true" >> $GITHUB_OUTPUT

      - name: Set output if no push
        if: steps.check-changes.outputs.has_changes != 'true'
        run: echo "pushed=false" >> $GITHUB_OUTPUT

  detect-changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      content: ${{ steps.changes.outputs.content }}
      code: ${{ steps.changes.outputs.code }}
      styles: ${{ steps.changes.outputs.styles }}
      source-checks: ${{ steps.changes.outputs.source-checks }}
      workflows: ${{ steps.changes.outputs.workflows }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        with:
          filters: |
            content:
              - 'website_content/**'
              - 'config/spellcheck/**'
              - 'config/vale/**'
              - 'scripts/strip_quotes.py'
            code:
              - 'quartz/**'
              - 'config/javascript/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/actions/**'
            styles:
              - 'quartz/**/*.scss'
              - 'config/stylelint/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/actions/**'
            source-checks:
              - 'website_content/**'
              - 'quartz/**'
              - '!quartz/**/*.spec.ts'
              - '!quartz/**/*.test.ts'
              - '!quartz/**/*.test.tsx'
              - '!quartz/**/tests/**'
              - 'scripts/source_file_checks.py'
              - 'config/quartz/**'
              - 'config/constants.json'
              - '.github/actions/**'
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'

  autofix:
    needs: [detect-changes, update-dates]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    # Auto-fix formatting on PRs and pushes to main/dev (not merge queue)
    # Depends on update-dates to avoid push race condition (both push to main).
    # always() lets this run even when update-dates is skipped (PRs, no content changes).
    if: >
      always() && !cancelled() &&
      needs.detect-changes.result == 'success' &&
      !startsWith(github.head_ref, 'deepsource-') &&
      (needs.detect-changes.outputs.code == 'true' ||
       needs.detect-changes.outputs.styles == 'true') &&
      (github.event_name == 'pull_request' ||
       (github.event_name == 'push' && contains(fromJSON('["refs/heads/main","refs/heads/dev"]'), github.ref)))
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.PUSH_TOKEN }}

      - name: Setup site
        uses: ./.github/actions/setup-site
        with:
          install-python: "false"

      - name: Generate SCSS variables
        if: needs.detect-changes.outputs.styles == 'true'
        run: pnpm exec tsx quartz/styles/generate-variables.ts

      - name: Run ESLint --fix
        if: needs.detect-changes.outputs.code == 'true'
        continue-on-error: true
        run: pnpm eslint . --fix --config config/javascript/eslint.config.js

      - name: Run Stylelint --fix
        if: needs.detect-changes.outputs.styles == 'true'
        continue-on-error: true
        run: |
          pnpm exec stylelint \
            --config config/stylelint/.stylelintrc.json \
            --fix \
            "quartz/**/*.scss"

      - name: Run Prettier on styles
        if: needs.detect-changes.outputs.styles == 'true'
        continue-on-error: true
        run: |
          pnpm exec prettier --write \
            --config config/prettier/.prettierrc \
            --ignore-path config/prettier/.prettierignore \
            "quartz/**/*.scss"

      - name: Run Prettier on code
        if: needs.detect-changes.outputs.code == 'true'
        continue-on-error: true
        run: |
          pnpm exec prettier --write \
            --config config/prettier/.prettierrc \
            --ignore-path config/prettier/.prettierignore \
            "quartz/**/*.{js,jsx,ts,tsx}"

      - name: Commit and push fixes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Only stage files that formatters could have modified
          git diff --name-only -z -- 'quartz/**/*.scss' 'quartz/**/*.js' 'quartz/**/*.jsx' 'quartz/**/*.ts' 'quartz/**/*.tsx' | xargs -0 --no-run-if-empty git add --
          if [[ -n $(git diff --cached --name-only) ]]; then
            git commit -m "style: auto-fix formatting [skip ci]"
            # Discard unstaged changes (e.g. generated SCSS, ESLint fixes outside quartz/)
            # so git pull --rebase can proceed cleanly
            git checkout -- .
            # Pull any commits pushed by update-dates before pushing
            if ! git pull --rebase origin ${{ github.head_ref || github.ref_name }}; then
              echo "::error::Rebase failed — aborting to avoid pushing broken state"
              git rebase --abort 2>/dev/null || true
              exit 1
            fi
            git push
            echo "::notice::Pushed auto-fix formatting commit"
          else
            echo "::notice::No formatting changes needed"
          fi

  check-action-pins:
    needs: detect-changes
    if: needs.detect-changes.outputs.workflows == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Check for unpinned action references
        run: |
          # Find YAML uses: directives with tag-based refs (@v1, @v2, etc.) instead of SHA pins
          # Only match lines where uses: is a YAML key (not inside comments or run blocks)
          UNPINNED=$(grep -rn '^\s*-\?\s*uses:.*@v[0-9]' .github/workflows/ .github/actions/ || true)
          if [ -n "$UNPINNED" ]; then
            echo "::error::Found unpinned action references (must use SHA pins with version comment):"
            echo "$UNPINNED"
            echo ""
            echo "Pin actions to a commit SHA, e.g.:"
            echo "  uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6"
            exit 1
          fi
          echo "All action references are SHA-pinned"

  lint:
    needs: [update-dates, detect-changes, autofix]
    # Run if detect-changes found changes, and not a deepsource PR
    # update-dates is allowed to be skipped (runs only on push to main by users)
    # Skip if update-dates pushed changes (the new commit will trigger a fresh workflow)
    if: >
      !startsWith(github.head_ref, 'deepsource-') &&
      (needs.detect-changes.outputs.content == 'true' ||
       needs.detect-changes.outputs.code == 'true' ||
       needs.detect-changes.outputs.styles == 'true' ||
       needs.detect-changes.outputs.source-checks == 'true') &&
      always() && !cancelled() &&
      needs.detect-changes.result == 'success' &&
      needs.update-dates.outputs.pushed != 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      # When autofix ran (PRs/dev), check out the branch tip to get any fix commit.
      # Otherwise (main/merge_group), use the default SHA that triggered the workflow.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: needs.autofix.result == 'success'
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: needs.autofix.result != 'success'

      - name: Setup site
        uses: ./.github/actions/setup-site

      - name: Install Vale
        if: needs.detect-changes.outputs.content == 'true'
        run: |
          wget -q https://github.com/errata-ai/vale/releases/download/v3.9.0/vale_3.9.0_Linux_64-bit.tar.gz
          echo "fd39029bd9dbd0ecf8cbd5274b69dcff03ad27a5d7344c69c173c93a00f6d423  vale_3.9.0_Linux_64-bit.tar.gz" | sha256sum --check
          tar -xzf vale_3.9.0_Linux_64-bit.tar.gz
          sudo mv vale /usr/local/bin/

      - name: Generate SCSS variables
        if: >
          needs.detect-changes.outputs.styles == 'true' ||
          needs.detect-changes.outputs.source-checks == 'true'
        run: pnpm exec tsx quartz/styles/generate-variables.ts

      - name: Add node_modules/.bin to PATH
        if: needs.detect-changes.outputs.source-checks == 'true'
        run: echo "${{ github.workspace }}/node_modules/.bin" >> $GITHUB_PATH

      - name: Strip quote blocks for linting
        id: strip-quotes
        if: needs.detect-changes.outputs.content == 'true'
        run: |
          STRIPPED_DIR=".stripped_quotes"
          uv run python scripts/strip_quotes.py --source-dir website_content --output-dir "$STRIPPED_DIR"
          echo "dir=$STRIPPED_DIR" >> $GITHUB_OUTPUT

      - name: Run spellcheck
        id: spellcheck
        if: needs.detect-changes.outputs.content == 'true'
        continue-on-error: true
        run: |
          pnpm exec spellchecker \
            --no-suggestions \
            --quiet \
            --dictionaries config/spellcheck/.wordlist.txt \
            --files "${{ steps.strip-quotes.outputs.dir }}/**/*.md" \
            --ignore '(?=.{10,})[\da-zA-Z]+(\-[\da-zA-Z]+)+' \
            --plugins spell indefinite-article repeated-words syntax-urls frontmatter

      - name: Run Vale
        id: vale
        if: needs.detect-changes.outputs.content == 'true'
        continue-on-error: true
        run: vale --config config/vale/.vale.ini "${{ steps.strip-quotes.outputs.dir }}"

      - name: Clean up stripped quotes
        if: always() && steps.strip-quotes.outputs.dir
        run: rm -rf "${{ steps.strip-quotes.outputs.dir }}"

      - name: Run ESLint
        id: eslint
        if: needs.detect-changes.outputs.code == 'true'
        continue-on-error: true
        run: pnpm eslint . --config config/javascript/eslint.config.js

      - name: Run Stylelint
        id: stylelint
        if: needs.detect-changes.outputs.styles == 'true'
        continue-on-error: true
        run: |
          pnpm exec stylelint \
            --config config/stylelint/.stylelintrc.json \
            "quartz/**/*.scss"

      - name: Set publication date check flag
        id: pub-date-flag
        if: needs.detect-changes.outputs.source-checks == 'true'
        run: |
          # Check publication dates on PRs and merge queue (pre-merge validation)
          # Skip on push to main/dev (dates are auto-added by update-dates job)
          if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.event_name }}" == "merge_group" ]]; then
            echo "flag=--check-publication-dates" >> $GITHUB_OUTPUT
          fi

      - name: Run source file checks
        id: source-checks
        if: needs.detect-changes.outputs.source-checks == 'true'
        continue-on-error: true
        run: uv run python scripts/source_file_checks.py ${{ steps.pub-date-flag.outputs.flag }}

      - name: Verify apt packages are version-pinned
        run: |
          # Find package-like lines between apt-get install and shell: that lack =version
          awk '/apt-get install/,/shell:/' .github/actions/setup-site/action.yaml \
            | grep -E '^\s+[a-z][a-z0-9._+-]+\s*\\?\s*$' \
            | while read -r line; do
                pkg=$(echo "$line" | tr -d ' \\')
                echo "::error::Unpinned apt package in setup-site: '$pkg' (add =version suffix)"
                exit 1
              done
          echo "All apt packages are version-pinned"

      - name: Check results
        run: |
          failed=""
          if [[ "${{ steps.spellcheck.outcome }}" == "failure" ]]; then failed="$failed spellcheck"; fi
          if [[ "${{ steps.vale.outcome }}" == "failure" ]]; then failed="$failed vale"; fi
          if [[ "${{ steps.eslint.outcome }}" == "failure" ]]; then failed="$failed eslint"; fi
          if [[ "${{ steps.stylelint.outcome }}" == "failure" ]]; then failed="$failed stylelint"; fi
          if [[ "${{ steps.source-checks.outcome }}" == "failure" ]]; then failed="$failed source-file-checks"; fi
          if [[ -n "$failed" ]]; then
            echo "The following checks failed:$failed"
            exit 1
          fi
