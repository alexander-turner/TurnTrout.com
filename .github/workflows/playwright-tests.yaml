name: Playwright Tests

concurrency:
  group: playwright-tests-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    types: [labeled, synchronize, opened, reopened]
    paths:
      - "quartz/**"
      - "config/quartz/**"
      - "config/constants.json"
      - "config/playwright/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"
  merge_group:

permissions:
  actions: read
  contents: read

jobs:
  # Gate: only run expensive tests on PRs when a CI label is actively added.
  # The pull_request trigger keeps synchronize/opened/reopened so this workflow
  # fires on every push — the should-run gate returns run=false instantly,
  # which is needed for the unified "playwright-tests" required status check.
  # Skip entirely for bot actors (dependabot, renovate, etc.).
  should-run:
    name: playwright-should-run
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      run: ${{ steps.gate.outputs.run }}
      run-macos: ${{ steps.gate.outputs.run-macos }}
      browsers: ${{ steps.gate.outputs.browsers }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github/actions/ci-gate
      - id: gate
        uses: ./.github/actions/ci-gate
        with:
          run-labels: "ci:full-tests,ci:run-playwright"

  build:
    name: playwright-build
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/build-site.yaml

  # Chromium + Firefox on main; Chromium-only on PRs/merge queue
  playwright-tests-linux:
    needs: [build, should-run]
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard:
          [
            "1/8",
            "2/8",
            "3/8",
            "4/8",
            "5/8",
            "6/8",
            "7/8",
            "8/8",
          ]
    env:
      PLAYWRIGHT_BROWSERS: ${{ needs.should-run.outputs.browsers }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-visual-testing-env
        with:
          install-playwright: "true"

      - name: Create Winston logs directory
        run: mkdir -p .logs

      - name: Install browsers
        run: pnpm run install-browsers

      - name: Restore built site from cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm exec playwright test --config config/playwright/playwright.config.ts --grep "^(?:(?!lostpixel).)*$" --shard ${{ matrix.shard }} | tee playwright-run.log
        env:
          # 40 min job timeout → 35 min Playwright global timeout
          PLAYWRIGHT_GLOBAL_TIMEOUT_MS: "2100000"

      - name: Sanitize shard name
        run: echo "SANITIZED_SHARD=${MATRIX_SHARD%%/*}" >> $GITHUB_ENV
        if: always()
        env:
          MATRIX_SHARD: ${{ matrix.shard }}

      - name: Upload Playwright logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-log-linux-shard-${{ env.SANITIZED_SHARD }}
          path: playwright-run.log
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Winston logs
        if: steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: winston-logs-linux-shard-${{ env.SANITIZED_SHARD }}
          path: .logs/
          if-no-files-found: warn
          retention-days: 1

      - name: Upload webServer build logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: webserver-build-log-linux-shard-${{ env.SANITIZED_SHARD }}
          path: /tmp/webserver.log
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-traces-linux-index-${{ strategy.job-index }}-shard-${{ env.SANITIZED_SHARD }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 1

      - name: Fail if playwright tests failed
        if: steps.playwright.outcome != 'success'
        run: exit 1

  # WebKit (Safari) tests on macOS for real Safari fidelity.
  # Linux WebKit (WPE) has known flakiness issues with timing, localStorage,
  # and module loading that don't reproduce on real Safari.
  playwright-tests-macos:
    needs: [build, should-run]
    if: needs.should-run.outputs.run-macos == 'true'
    runs-on: macos-26
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        shard:
          [
            "1/5",
            "2/5",
            "3/5",
            "4/5",
            "5/5",
          ]
    env:
      PLAYWRIGHT_BROWSERS: webkit
      # Playwright 1.59.0 added Page.overridePlatform for WebKit device presets,
      # which crashes WebKit on macOS ARM64 (microsoft/playwright#40009).
      # Reverted upstream but no 1.59.2 release yet. Remove when upgrading Playwright.
      PLAYWRIGHT_NO_UA_PLATFORM: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Disable macOS firewall
        run: sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate off

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-visual-testing-env
        with:
          install-playwright: "false"

      - name: Create Winston logs directory
        run: mkdir -p .logs

      - name: Install Playwright WebKit browser
        run: pnpm exec playwright install webkit

      - name: Strip macOS Gatekeeper quarantine attributes
        run: xattr -cr ~/Library/Caches/ms-playwright

      - name: Restore built site from cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm exec playwright test --config config/playwright/playwright.config.ts --grep "^(?:(?!lostpixel).)*$" --shard ${{ matrix.shard }} | tee playwright-run.log
        env:
          # 50 min job timeout → 45 min Playwright global timeout
          PLAYWRIGHT_GLOBAL_TIMEOUT_MS: "2700000"

      - name: Sanitize shard name
        run: echo "SANITIZED_SHARD=${MATRIX_SHARD%%/*}" >> $GITHUB_ENV
        if: always()
        env:
          MATRIX_SHARD: ${{ matrix.shard }}

      - name: Upload Playwright logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-log-macos-shard-${{ env.SANITIZED_SHARD }}
          path: playwright-run.log
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Winston logs
        if: steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: winston-logs-macos-shard-${{ env.SANITIZED_SHARD }}
          path: .logs/
          if-no-files-found: warn
          retention-days: 1

      - name: Upload webServer build logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: webserver-build-log-macos-shard-${{ env.SANITIZED_SHARD }}
          path: /tmp/webserver.log
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-traces-macos-index-${{ strategy.job-index }}-shard-${{ env.SANITIZED_SHARD }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 1

      - name: Fail if playwright tests failed
        if: steps.playwright.outcome != 'success'
        run: exit 1

  # Unified status check — required by branch protection
  playwright-tests:
    name: playwright-tests
    if: always()
    needs: [should-run, playwright-tests-linux, playwright-tests-macos]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.should-run.outputs.run }}" == "false" ]]; then
            echo "Tests were skipped (no label)"
            exit 0
          fi
          if [[ "${{ needs.playwright-tests-linux.result }}" != "success" ]]; then
            echo "Linux tests did not succeed (${{ needs.playwright-tests-linux.result }})"
            exit 1
          fi
          # macOS only runs on push to main; allow skipped elsewhere
          if [[ "${{ needs.should-run.outputs.run-macos }}" == "true" ]] && \
             [[ "${{ needs.playwright-tests-macos.result }}" != "success" ]]; then
            echo "macOS tests did not succeed (${{ needs.playwright-tests-macos.result }})"
            exit 1
          fi

  summarize-failures:
    name: Summarize Failures
    if: >-
      always() && (
        needs.playwright-tests-linux.result == 'failure' ||
        needs.playwright-tests-linux.result == 'cancelled' ||
        needs.playwright-tests-macos.result == 'failure' ||
        needs.playwright-tests-macos.result == 'cancelled'
      )
    needs: [playwright-tests-linux, playwright-tests-macos]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/summarize-failed-shards
        with:
          log-pattern: playwright-log-*
          final-log-name: playwright-failed-logs
