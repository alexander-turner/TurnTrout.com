name: Python tests

concurrency:
  group: python-tests-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches: ["main", "dev"]
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      python: ${{ steps.changes.outputs.python }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        timeout-minutes: 5
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        with:
          filters: |
            python:
              - 'scripts/**'
              - 'config/python/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/actions/**'
              - '.github/scripts/**'
              # test-page.md drives the pinned-screenshot-asset completeness
              # guard (test_pin_screenshot_assets.py); rerun it when the page
              # gains an image so an unpinned asset can't silently fall back to
              # the live CDN.
              - 'website_content/test-page.md'

  python-tests:
    needs: detect-changes
    if: >
      !startsWith(github.head_ref, 'deepsource-') &&
      needs.detect-changes.outputs.python == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        timeout-minutes: 5
        with:
          persist-credentials: false

      - name: Setup site
        uses: ./.github/actions/setup-site
        with:
          install-node-deps: "false"
          install-system-deps: "true"

      - name: Install test dependencies
        uses: ./.github/actions/retry-external
        with:
          max-attempts: "3"
          timeout-minutes: "10"
          command: |
            sudo apt-get update && \
            sudo apt-get install -y --no-install-recommends libimage-exiftool-perl inkscape fish ffmpeg

      - name: Install ImageMagick 7 via Homebrew
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          # libheif's post-install (update-mime-database) can fail on CI runners,
          # causing brew to return exit code 1 even though ImageMagick installs fine.
          brew install imagemagick || true
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          magick --version

      - name: Run pytest
        run: |
          uv run python -m pytest scripts \
            -m "not requires_r2" \
            --config-file config/python/pyproject.toml
