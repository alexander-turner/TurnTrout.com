name: Python tests

concurrency:
  group: python-tests-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches: ["main", "dev"]
  # Removed pull_request trigger: zero failures across 50 PRs analyzed.
  # Still runs on main/dev push and merge queue for pre-merge validation.
  merge_group:

permissions:
  actions: read
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-24.04
    outputs:
      python: ${{ steps.changes.outputs.python }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: changes
        with:
          filters: |
            python:
              - 'scripts/**'
              - 'config/python/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/actions/**'
              - '.github/scripts/**'

  python-tests:
    needs: detect-changes
    if: >
      !startsWith(github.head_ref, 'deepsource-') &&
      needs.detect-changes.outputs.python == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          install-node-deps: "false"

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libimage-exiftool-perl inkscape rclone fish ffmpeg=7:6.1.1-3ubuntu5
          pip install linkchecker

      - name: Install ImageMagick 7 via Homebrew
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew install imagemagick
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH

      - name: Run pytest
        run: |
          uv run python -m pytest scripts \
            -m "not requires_r2" \
            --config-file config/python/pyproject.toml
