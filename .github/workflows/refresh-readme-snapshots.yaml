name: Refresh README snapshots

# The site build reads the GitHub READMEs embedded in pages (open-source.md)
# from committed snapshots in quartz/plugins/transformers/.readme-snapshots/,
# never from the network. This workflow is the only place those snapshots are
# re-fetched: it runs on a schedule, retries transient GitHub failures with
# backoff, and opens an auto-merged PR when upstream content changed. A failed
# refresh leaves the last-known-good snapshots in place, so builds stay green.

concurrency:
  group: refresh-readme-snapshots
  cancel-in-progress: false

on:
  schedule:
    # Daily at 08:17 UTC.
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # All writes (branch push, PR creation, auto-merge) go through the
    # TEMPLATE_SYNC_TOKEN PAT; GITHUB_TOKEN only performs read-only API
    # fetches, so the workflow-level `contents: read` suffices.

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        timeout-minutes: 5
        with:
          persist-credentials: false

      # A PAT (TEMPLATE_SYNC_TOKEN) lets the PR trigger the required status
      # checks; PRs created with the default GITHUB_TOKEN never start
      # workflows, which would leave auto-merge waiting forever. Fail loudly
      # up front rather than creating a zombie PR whose checks never run.
      - name: Require TEMPLATE_SYNC_TOKEN
        env:
          HAS_PAT: ${{ secrets.TEMPLATE_SYNC_TOKEN != '' }}
        run: |
          if [ "$HAS_PAT" != "true" ]; then
            echo "::error::TEMPLATE_SYNC_TOKEN is not set; a PR created with GITHUB_TOKEN would never trigger its required checks."
            exit 1
          fi

      - name: Setup Node environment
        uses: ./.github/actions/setup-site
        with:
          install-python: "false"

      # continue-on-error so snapshots that DID refresh still reach the PR
      # steps below; a failing source is re-raised by the final step.
      - name: Refresh snapshots
        id: refresh
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx scripts/refresh_readme_snapshots.ts

      - name: Open pull request with updated snapshots
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.TEMPLATE_SYNC_TOKEN }}
          branch: automated/readme-snapshots
          delete-branch: true
          commit-message: "chore(readmes): refresh external README snapshots"
          title: "chore(readmes): refresh external README snapshots"
          body: |
            Automated refresh of the committed GitHub README snapshots that
            the build embeds into pages.

            Generated by `.github/workflows/refresh-readme-snapshots.yaml`
            running `scripts/refresh_readme_snapshots.ts`.
          add-paths: quartz/plugins/transformers/.readme-snapshots/

      # Re-arm on 'updated' too: if a prior run's auto-merge attempt failed
      # or was manually disabled, the daily update must not leave the PR
      # stalled. `gh pr merge --auto` is idempotent.
      - name: Enable auto-merge
        if: contains(fromJSON('["created", "updated"]'), steps.create-pr.outputs.pull-request-operation)
        env:
          GH_TOKEN: ${{ secrets.TEMPLATE_SYNC_TOKEN }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        # The repository disallows squash merging, so use a merge commit.
        run: gh pr merge --auto --merge "$PR_NUMBER"

      - name: Fail if any source could not be refreshed
        if: steps.refresh.outcome == 'failure'
        run: |
          echo "::error::At least one README source failed to refresh; its last-known-good snapshot was kept. See the 'Refresh snapshots' step."
          exit 1
