name: Refresh README snapshots

# The site build reads the GitHub READMEs embedded in pages (open-source.md)
# from committed snapshots in quartz/plugins/transformers/.readme-snapshots/,
# never from the network. This workflow is the only place those snapshots are
# re-fetched: it runs on a schedule, retries transient GitHub failures with
# backoff, and opens an auto-merged PR when upstream content changed. A failed
# refresh leaves the last-known-good snapshots in place, so builds stay green.

concurrency:
  group: refresh-readme-snapshots
  cancel-in-progress: false

on:
  schedule:
    # Daily at 08:17 UTC.
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        timeout-minutes: 5
        with:
          persist-credentials: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-site
        with:
          install-python: "false"

      - name: Refresh snapshots
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx scripts/refresh_readme_snapshots.ts

      # A PAT (TEMPLATE_SYNC_TOKEN) lets the PR trigger the required status
      # checks; PRs created with the default GITHUB_TOKEN never start
      # workflows, which would leave auto-merge waiting forever.
      - name: Open pull request with updated snapshots
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.TEMPLATE_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
          branch: automated/readme-snapshots
          delete-branch: true
          commit-message: "chore(readmes): refresh external README snapshots"
          title: "chore(readmes): refresh external README snapshots"
          body: |
            Automated refresh of the committed GitHub README snapshots that
            the build embeds into pages.

            Generated by `.github/workflows/refresh-readme-snapshots.yaml`
            running `scripts/refresh_readme_snapshots.ts`.
          add-paths: quartz/plugins/transformers/.readme-snapshots/

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ secrets.TEMPLATE_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: gh pr merge --auto --squash "$PR_NUMBER"
