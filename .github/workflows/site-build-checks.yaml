name: Site build checks

concurrency:
  group: site-build-checks-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  workflow_dispatch:
  push:
    branches: ["main", "dev"]
    paths:
      - "quartz/**"
      - "!quartz/**/*.spec.ts"
      - "!quartz/**/*.test.ts"
      - "!quartz/**/*.test.tsx"
      - "!quartz/**/tests/**"
      - "website_content/**"
      - "config/quartz/**"
      - "config/constants.json"
      - "config/stylelint/.variables-only-stylelintrc.json"
      - "scripts/built_site_checks.py"
      - "scripts/check_internal_links.py"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"
  pull_request:
    types: [labeled, synchronize, opened, reopened]
    paths:
      - "quartz/**"
      - "!quartz/**/*.spec.ts"
      - "!quartz/**/*.test.ts"
      - "!quartz/**/*.test.tsx"
      - "!quartz/**/tests/**"
      - "website_content/**"
      - "config/quartz/**"
      - "config/constants.json"
      - "config/stylelint/.variables-only-stylelintrc.json"
      - "scripts/built_site_checks.py"
      - "scripts/check_internal_links.py"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"
  merge_group:

permissions:
  actions: read
  contents: read

jobs:
  should-run:
    name: site-checks-should-run
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]' && !startsWith(github.head_ref, 'deepsource-')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github/actions/ci-gate
      - id: gate
        uses: ./.github/actions/ci-gate
        with:
          run-labels: "ci:full-tests,ci:run-site-checks"

  build:
    name: site-checks-build
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/build-site.yaml
    with:
      fetch-depth: 0

  built-site-checks:
    needs: [should-run, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup site
        uses: ./.github/actions/setup-site
        with:
          install-system-deps: "true"
          cache-apt: "true"

      - name: Restore built site from cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Check CSS variables
        run: |
          # Run stylelint to check for unknown CSS variables
          # Filter out known false positives and check if any real issues remain
          WARNINGS=$(pnpm exec stylelint public/index.css \
            --config config/stylelint/.variables-only-stylelintrc.json 2>&1 \
            | grep -vE 'shiki|problem|public/index.css' \
            | grep . || true)

          if [ -n "$WARNINGS" ]; then
            echo "Error: Found unknown CSS variable(s):"
            echo "$WARNINGS"
            exit 1
          fi

      - name: Run built site checks
        run: uv run python scripts/built_site_checks.py

  linkchecker:
    needs: [should-run, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup site
        uses: ./.github/actions/setup-site

      - name: Restore built site from cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Start server
        id: server
        uses: ./.github/actions/wait-for-server
        with:
          path: public

      - name: Run linkchecker
        env:
          SERVER_PID: ${{ steps.server.outputs.server-pid }}
        run: |
          # Check internal links
          echo "Checking internal links..."
          uv run linkchecker http://localhost:8080 --threads 50
          INTERNAL_STATUS=$?

          # Check external links (only assets.turntrout.com and github repo)
          echo "Checking external links..."
          uv run linkchecker public/**/*.html \
            --ignore-url='!^https://(assets\.turntrout\.com|github\.com/alexander-turner/TurnTrout\.com)' \
            --check-extern \
            --threads 30 \
            --user-agent "linkchecker" \
            --timeout 40
          EXTERNAL_STATUS=$?

          # Stop server
          kill $SERVER_PID 2>/dev/null || true

          # Exit with failure if any check failed
          if [ $INTERNAL_STATUS -ne 0 ] || [ $EXTERNAL_STATUS -ne 0 ]; then
            echo "Link checks failed:"
            echo "Internal linkchecker: $INTERNAL_STATUS"
            echo "External linkchecker: $EXTERNAL_STATUS"
            exit 1
          fi

  # Unified status check — provides passing status when gated off on PRs
  site-build-checks:
    name: site-build-checks
    if: always()
    needs: [should-run, built-site-checks, linkchecker]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.should-run.outputs.run }}" == "false" ]]; then
            echo "Tests were skipped (no label)"
            exit 0
          fi
          if [[ "${{ needs.built-site-checks.result }}" != "success" ]] || \
             [[ "${{ needs.linkchecker.result }}" != "success" ]]; then
            echo "Site build checks did not succeed (checks=${{ needs.built-site-checks.result }}, links=${{ needs.linkchecker.result }})"
            exit 1
          fi
