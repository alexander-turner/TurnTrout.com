name: Subfont Bisect

# Bisection harness for github:alexander-turner/subfont. On every push to
# a claude/subfont-bisect* branch, reads the target fork ref from
# .github/subfont-bisect-ref.txt, installs that subfont, runs it against
# the current commit's built site, and reports elapsed time + log.
#
# To bisect: edit .github/subfont-bisect-ref.txt and push. Can also be
# dispatched manually from the Actions UI with an override ref.

on:
  push:
    branches:
      - "claude/subfont-bisect"
      - "claude/subfont-bisect-*"
    paths:
      - ".github/workflows/subfont-bisect.yaml"
      - ".github/subfont-bisect-ref.txt"
  workflow_dispatch:
    inputs:
      fork_ref_override:
        description: "subfont fork git ref (leave blank to use file)"
        required: false
        default: ""

permissions:
  actions: read
  contents: read

jobs:
  build-site:
    uses: ./.github/workflows/build-site.yaml
    with:
      fetch-depth: 0

  subfont-bisect:
    needs: build-site
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          filter: blob:none

      - name: Resolve fork ref
        id: ref
        run: |
          set -e
          OVERRIDE="${{ inputs.fork_ref_override }}"
          if [ -n "$OVERRIDE" ]; then
            FORK_REF="$OVERRIDE"
            echo "Using dispatch override: $FORK_REF"
          else
            FORK_REF=$(tr -d '[:space:]' < .github/subfont-bisect-ref.txt)
            echo "Using ref from file: $FORK_REF"
          fi
          if [ -z "$FORK_REF" ]; then
            echo "::error::No fork ref supplied (file empty and no override)"
            exit 1
          fi
          echo "fork_ref=$FORK_REF" >> "$GITHUB_OUTPUT"

      - name: Setup site tooling
        uses: ./.github/actions/setup-site
        with:
          install-sharp: "true"
          install-browsers: "true"
          install-system-deps: "true"

      - name: Restore built site from cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Install subfont fork at ${{ steps.ref.outputs.fork_ref }}
        run: pnpm add -g github:alexander-turner/subfont#${{ steps.ref.outputs.fork_ref }}

      - name: Record installed subfont version
        id: record
        run: |
          set -e
          INSTALLED=$(pnpm -g list --depth 0 --json 2>/dev/null | node -e '
            let s = "";
            process.stdin.on("data", d => s += d);
            process.stdin.on("end", () => {
              try {
                const arr = JSON.parse(s);
                const entries = arr.flatMap(e => Object.entries(e.dependencies || {}));
                const subfont = entries.find(([n]) => n === "subfont");
                if (!subfont) return console.log("NOT FOUND");
                const info = subfont[1];
                console.log(info.from || info.version || JSON.stringify(info));
              } catch (e) {
                console.log("PARSE ERROR: " + e.message);
              }
            });
          ')
          echo "Installed subfont: $INSTALLED"
          echo "installed=$INSTALLED" >> "$GITHUB_OUTPUT"

      - name: Make subfont.sh executable
        run: chmod +x ./scripts/subfont.sh

      - name: Run subfont (timed)
        id: subfont
        timeout-minutes: 75
        run: |
          set -o pipefail
          ./scripts/subfont.sh 2>&1 | tee subfont.log
          ELAPSED=$(grep -oE 'Subfont completed in [0-9]+s' subfont.log | grep -oE '[0-9]+' | tail -1 || echo "")
          echo "elapsed_seconds=$ELAPSED" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Subfont bisect — \`${{ steps.ref.outputs.fork_ref }}\`"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Fork ref | \`${{ steps.ref.outputs.fork_ref }}\` |"
            echo "| Installed | \`${{ steps.record.outputs.installed }}\` |"
            echo "| Subfont step result | ${{ steps.subfont.outcome }} |"
            echo "| Elapsed (seconds) | ${{ steps.subfont.outputs.elapsed_seconds || 'n/a' }} |"
            echo "| Site commit | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload subfont log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: subfont-log-${{ steps.ref.outputs.fork_ref }}
          path: subfont.log
          if-no-files-found: warn
