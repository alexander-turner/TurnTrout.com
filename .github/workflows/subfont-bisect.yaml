name: Subfont Bisect

# TEMPORARY: repurposed to mirror CDN favicon assets into an artifact for
# sandboxed analysis. Will be reverted on this branch before review.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch-favicons:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Fetch favicon assets from CDN
        run: |
          mkdir -p mirror
          : > mirror/missing.txt
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            fname=$(basename "${url%%\?*}")
            if ! curl -fsSL --retry 2 -o "mirror/$fname" "$url"; then
              echo "$url" >> mirror/missing.txt
            fi
          done < .github/favicon_fetch_urls.txt
          echo "fetched: $(ls mirror | wc -l) files; missing: $(wc -l < mirror/missing.txt)"
      - uses: actions/upload-artifact@v4
        with:
          name: favicon-mirror
          path: mirror/
          retention-days: 1
