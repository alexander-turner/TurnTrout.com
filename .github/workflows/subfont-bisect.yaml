name: Subfont Bisect

# Manually-dispatched workflow for bisecting the
# `github:alexander-turner/subfont` fork. Pinned ref is installed,
# subfont is timed against the current commit's built site, and the full
# log is uploaded as an artifact for inspection.
#
# Start with a known-good baseline (default) to confirm the pipeline works,
# then flip `fork_ref` to candidate SHAs between good and bad until the
# regression is located.

on:
  workflow_dispatch:
    inputs:
      fork_ref:
        description: "subfont fork git ref (SHA, branch, or tag)"
        required: true
        default: "04198b6f"
      step_timeout_minutes:
        description: "Per-step subfont timeout (minutes)"
        required: false
        default: "75"

permissions:
  actions: read
  contents: read

jobs:
  build-site:
    uses: ./.github/workflows/build-site.yaml
    with:
      fetch-depth: 0

  subfont-bisect:
    needs: build-site
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          filter: blob:none

      - name: Setup site tooling
        uses: ./.github/actions/setup-site
        with:
          install-sharp: "true"
          install-browsers: "true"
          install-system-deps: "true"

      - name: Restore built site from cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Install subfont fork at ${{ inputs.fork_ref }}
        run: pnpm add -g github:alexander-turner/subfont#${{ inputs.fork_ref }}

      - name: Record installed subfont SHA
        run: |
          set -e
          INSTALLED=$(pnpm -g list --depth 0 --json | node -e '
            let s = "";
            process.stdin.on("data", d => s += d);
            process.stdin.on("end", () => {
              const pkgs = JSON.parse(s).flatMap(e => Object.entries(e.dependencies || {}));
              const subfont = pkgs.find(([name]) => name === "subfont");
              console.log(subfont ? subfont[1].version || subfont[1].from || JSON.stringify(subfont[1]) : "NOT FOUND");
            });
          ')
          echo "Installed subfont: $INSTALLED"
          echo "installed=$INSTALLED" >> "$GITHUB_OUTPUT"
        id: record

      - name: Make subfont.sh executable
        run: chmod +x ./scripts/subfont.sh

      - name: Run subfont (timed)
        id: subfont
        timeout-minutes: 75
        run: |
          set -o pipefail
          ./scripts/subfont.sh 2>&1 | tee subfont.log
          # Extract elapsed seconds from subfont.sh output ("Subfont completed in <N>s")
          ELAPSED=$(grep -oE 'Subfont completed in [0-9]+s' subfont.log | grep -oE '[0-9]+' | tail -1 || echo "")
          echo "elapsed_seconds=$ELAPSED" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Subfont bisect — \`${{ inputs.fork_ref }}\`"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Fork ref (input) | \`${{ inputs.fork_ref }}\` |"
            echo "| Installed | \`${{ steps.record.outputs.installed }}\` |"
            echo "| Subfont step result | ${{ steps.subfont.outcome }} |"
            echo "| Elapsed (seconds) | ${{ steps.subfont.outputs.elapsed_seconds || 'n/a (step did not complete)' }} |"
            echo "| Site commit | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload subfont log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: subfont-log-${{ inputs.fork_ref }}
          path: subfont.log
          if-no-files-found: warn
