# Temporary debugging workflow: the DeepSource dashboard and API are
# unreachable from the authoring sandbox, so this dumps the CLI findings
# for PR 1552 into a PR comment. Delete before merge.
name: Temp DeepSource Findings
on:
  push:
    branches: [claude/external-link-annotations-0cj6m1]

permissions:
  contents: read
  pull-requests: write

jobs:
  findings:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      DEEPSOURCE_PAT: ${{ secrets.DEEPSOURCE_PAT }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Query run summary via GraphQL and post as PR comment
        run: |
          set -uo pipefail
          # Wait for the JavaScript analysis of this head to finish so the
          # status carries the run UID in its target_url.
          run_url=""
          for _ in $(seq 1 40); do
            run_url=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/statuses" \
              --jq '[.[] | select(.context == "DeepSource: JavaScript") | select(.state != "pending")][0].target_url // ""')
            if [ -n "$run_url" ]; then break; fi
            sleep 15
          done
          run_uid=$(echo "$run_url" | sed -E 's|.*/run/([0-9a-f-]+)/.*|\1|')

          gql() {
            curl -sS https://api.deepsource.io/graphql/ \
              -H "Authorization: Bearer $DEEPSOURCE_PAT" \
              -H "Content-Type: application/json" \
              -d "$1"
          }
          q1=$(jq -n --arg uid "$run_uid" '{query: "query($uid: UUID!) { run(runUid: $uid) { status commitOid summary { occurrencesIntroduced occurrencesResolved occurrencesSuppressed } checks { edges { node { analyzer { shortcode } status summary { occurrencesIntroduced occurrencesResolved occurrencesSuppressed } } } } } }", variables: {uid: $uid}}')
          q2=$(jq -n '{query: "{ checkType: __type(name: \"Check\") { fields { name } } occurrenceType: __type(name: \"Occurrence\") { fields { name } } }"}')
          q3=$(jq -n --arg uid "$run_uid" '{query: "query($uid: UUID!) { run(runUid: $uid) { checks { edges { node { analyzer { shortcode } occurrences(first: 50) { edges { node { issue { shortcode title } path beginLine } } } } } } } }", variables: {uid: $uid}}')
          {
            echo "<!-- tmp-deepsource-findings -->"
            echo "Run URL: $run_url"
            echo "Run summary:"
            echo '```json'
            gql "$q1" | jq . || true
            echo '```'
            echo "Check/Occurrence schema fields:"
            echo '```json'
            gql "$q2" | jq . || true
            echo '```'
            echo "Occurrences:"
            echo '```json'
            gql "$q3" | jq . || true
            echo '```'
          } > /tmp/comment.md
          gh api "repos/${GITHUB_REPOSITORY}/issues/1552/comments" \
            -f body="$(cat /tmp/comment.md)"
