# Temporary debugging workflow: the DeepSource dashboard and API are
# unreachable from the authoring sandbox, so this dumps the CLI findings
# for PR 1552 into a PR comment. Delete before merge.
name: Temp DeepSource Findings
on:
  push:
    branches: [claude/external-link-annotations-0cj6m1]

permissions:
  contents: read
  pull-requests: write

jobs:
  findings:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      DEEPSOURCE_PAT: ${{ secrets.DEEPSOURCE_PAT }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        timeout-minutes: 5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install DeepSource CLI
        run: |
          curl -fsSL https://cli.deepsource.com/install | BINDIR="$HOME/.local/bin" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Fetch findings and post as PR comment
        run: |
          set -euo pipefail
          deepsource auth login --with-token "$DEEPSOURCE_PAT"
          pr_json=$(deepsource issues --pr 1552 --output json || echo '[]')
          deepsource issues --analyzer javascript --limit 500 --output json \
            | grep -v '^> Note:' > /tmp/branch.json || echo '[]' > /tmp/branch.json
          deepsource issues --default-branch --analyzer javascript --limit 500 --output json \
            | grep -v '^> Note:' > /tmp/main.json || echo '[]' > /tmp/main.json
          {
            echo "<!-- tmp-deepsource-findings -->"
            echo "PR issues:"
            echo '```json'
            echo "$pr_json"
            echo '```'
            echo "Branch JS issue count: $(jq 'length' /tmp/branch.json)"
            echo "Main JS issue count: $(jq 'length' /tmp/main.json)"
            echo "All branch JS issues (compact):"
            echo '```'
            jq -r '.[] | "\(.path):\(.begin_line) \(.issue_code) \(.title)"' /tmp/branch.json
            echo '```'
          } > /tmp/comment.md
          gh api "repos/${GITHUB_REPOSITORY}/issues/1552/comments" \
            -f body="$(cat /tmp/comment.md)"
