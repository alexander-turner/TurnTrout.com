# Temporary debugging workflow: the DeepSource dashboard and API are
# unreachable from the authoring sandbox, so this dumps the CLI findings
# for PR 1552 into a PR comment. Delete before merge.
name: Temp DeepSource Findings
on:
  push:
    branches: [claude/external-link-annotations-0cj6m1]

permissions:
  contents: read
  pull-requests: write

jobs:
  findings:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      DEEPSOURCE_PAT: ${{ secrets.DEEPSOURCE_PAT }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install DeepSource CLI
        run: |
          curl -fsSL https://cli.deepsource.com/install | BINDIR="$HOME/.local/bin" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Fetch findings and post as PR comment
        run: |
          set -euo pipefail
          deepsource auth login --with-token "$DEEPSOURCE_PAT"
          pr_json=$(deepsource issues --pr 1552 --output json || echo '"CLI-ERROR"')
          branch_json=$(deepsource issues --analyzer javascript --limit 100 --output json || echo '"CLI-ERROR"')
          main_json=$(deepsource issues --default-branch --analyzer javascript --limit 100 --output json || echo '"CLI-ERROR"')
          git diff --name-only origin/main...HEAD > /tmp/changed.txt
          {
            echo "<!-- tmp-deepsource-findings -->"
            echo "PR issues:"
            echo '```json'
            echo "$pr_json"
            echo '```'
            echo "Branch JS issue count: $(echo "$branch_json" | jq 'length' || echo '?')"
            echo "Main JS issue count: $(echo "$main_json" | jq 'length' || echo '?')"
            echo "Branch JS issues in changed files:"
            echo '```json'
            echo "$branch_json" | jq --rawfile changed /tmp/changed.txt \
              '[.[] | select((.path // .location.path) as $p | $changed | split("\n") | index($p))]' \
              || echo "$branch_json" | head -c 3000
            echo '```'
            echo "First 3 branch JS issues (raw shape):"
            echo '```json'
            echo "$branch_json" | jq '.[0:3]' || true
            echo '```'
          } > /tmp/comment.md
          gh api "repos/${GITHUB_REPOSITORY}/issues/1552/comments" \
            -f body="$(cat /tmp/comment.md)"
