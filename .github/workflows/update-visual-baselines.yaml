name: Update visual baselines

# Triggered by the "Approve these as baselines" button on the visual-diff
# gallery (which POSTs to the workflow_dispatch endpoint). Downloads the
# named visual-testing run's `*-actual.png` artifacts and uploads them
# to R2 as the new baselines.
#
# For open-PR runs (`pr_number` supplied, PR unmerged) the workflow then
# pushes an empty commit to the PR branch so visual-testing reruns
# immediately. For main runs it posts a synthetic passing `visual-testing`
# check-run + re-runs failed jobs on the same-commit `deploy.yaml` run so
# the deploy unblocks without a 30-minute visual-testing rerun.
#
# For MERGED PRs the approval carries through to main: the branch is gone
# (auto-deleted on merge) and the same diffs re-fail main's own
# visual-testing run, so the workflow waits for the post-merge
# visual-testing run on main and — only when that run had no real failures
# and every one of its snapshot diffs is covered by the just-approved
# screenshots — applies the main-run treatment (synthetic passing
# check-run + deploy verify rerun). One approval click clears both the PR
# and main.

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "visual-testing run ID whose actuals to adopt"
        required: true
        type: string
      pr_number:
        description: "PR number to retrigger + comment on (blank = main run)"
        required: false
        type: string
        default: ""

permissions:
  actions: write # re-run deploy on main
  checks: write # post a synthetic passing visual-testing check-run on main
  contents: write
  # PR conversation comments (issues.createComment on a PR) require
  # pull-requests: write, not issues: write.
  pull-requests: write
  issues: write

concurrency:
  # Key on PR number when one is supplied so concurrent button-clicks on
  # the same PR queue cleanly. Main-run dispatches fall through to a
  # per-run key so they never block each other.
  group: update-visual-baselines-${{ github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  approve:
    runs-on: ubuntu-24.04
    # 5 min R2 upload + up to 20 min waiting for main's post-merge
    # visual-testing run + up to 15 min polling deploy.yaml.
    timeout-minutes: 50
    env:
      # Single source of truth for where approved baselines are staged;
      # must match scripts/r2_baselines.py LOCAL_DIR.
      STAGING_DIR: tests/visual-baselines
    steps:
      - name: Resolve PR ref (if any)
        id: resolve
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DISPATCH_PR_NUMBER: ${{ github.event.inputs.pr_number }}
        with:
          script: |
            const prNumber = process.env.DISPATCH_PR_NUMBER || '';
            // Set pr_number first so the failure-comment step can find
            // the PR even if the lookup below fails.
            core.setOutput('pr_number', prNumber);
            let ref = '';
            let merged = '';
            let mergedAt = '';
            if (prNumber) {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: Number(prNumber),
              });
              ref = pr.data.head.ref;
              merged = pr.data.merged ? 'true' : 'false';
              mergedAt = pr.data.merged_at || '';
            }
            core.setOutput('ref', ref);
            core.setOutput('merged', merged);
            core.setOutput('merged_at', mergedAt);

      # Merged PRs skip the branch checkout: the head branch is auto-deleted
      # on merge, and the carry-through path below only needs the scripts on
      # the default branch.
      - name: Checkout target ref
        if: steps.resolve.outputs.ref != '' && steps.resolve.outputs.merged != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 # zizmor: ignore[artipacked] the persisted GITHUB_TOKEN is used by the empty-commit push below
        with:
          ref: ${{ steps.resolve.outputs.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout default branch (main runs and merged PRs)
        if: steps.resolve.outputs.ref == '' || steps.resolve.outputs.merged == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download Playwright blob reports from the named run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: blob-report-*
          path: ./all-blob-reports
          merge-multiple: true
          run-id: ${{ github.event.inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: ./.github/actions/setup-visual-testing-env
        with:
          install-playwright: "false"
          install-python: "true"

      - name: Install rclone
        uses: ./.github/actions/retry-external
        with:
          max-attempts: "3"
          timeout-minutes: "5"
          command: sudo apt-get update && sudo apt-get install -y rclone

      - name: Upload screenshots to R2 as new baselines
        env:
          ACCESS_KEY_ID_TURNTROUT_MEDIA: ${{ secrets.ACCESS_KEY_ID_TURNTROUT_MEDIA }}
          SECRET_ACCESS_TURNTROUT_MEDIA: ${{ secrets.SECRET_ACCESS_TURNTROUT_MEDIA }}
          S3_ENDPOINT_ID_TURNTROUT_MEDIA: ${{ secrets.S3_ENDPOINT_ID_TURNTROUT_MEDIA }}
        run: |
          uv run python scripts/approve_baselines_from_artifacts.py \
            ./all-blob-reports --staging-dir "$STAGING_DIR"

      - name: Push empty commit to retrigger visual-testing (open-PR runs only)
        if: steps.resolve.outputs.pr_number != '' && steps.resolve.outputs.merged != 'true'
        env:
          REF: ${{ steps.resolve.outputs.ref }}
          RUN_ID: ${{ github.event.inputs.run_id }}
          APPROVER: ${{ github.actor }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "ci: rerun visual-testing against approved baselines (run $RUN_ID, approved by $APPROVER)"
          git push origin "HEAD:$REF"

      # Carry-through for merged PRs: the approved diffs are the ones
      # re-failing main's own visual-testing run, so find that run and (after
      # the safety checks below) give it the main-run treatment. Waits out
      # cancelled runs — pushes to main amend + force-push, cancelling the
      # first wave — until a completed replacement reports.
      - name: Find post-merge visual-testing run on main
        id: find-main-run
        if: steps.resolve.outputs.merged == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          MERGED_AT: ${{ steps.resolve.outputs.merged_at }}
        with:
          script: |
            const mergedAt = new Date(process.env.MERGED_AT);
            const POLL_INTERVAL_MS = 30_000;
            const MAX_ATTEMPTS = 40; // 40 × 30s = 20 min
            let found = null;
            for (let i = 0; i < MAX_ATTEMPTS; i++) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'visual-testing.yaml',
                branch: 'main',
                per_page: 20,
              });
              // The API lists newest first. The approval covers the merge
              // commit itself, so take the EARLIEST non-cancelled post-merge
              // run — a newer run belongs to a later push to main whose
              // diffs this approval never saw. Cancelled runs are dropped so
              // a superseded first wave defers to its completed replacement.
              const candidates = data.workflow_runs.filter(
                (r) =>
                  new Date(r.created_at) >= mergedAt &&
                  r.conclusion !== 'cancelled'
              );
              const run = candidates[candidates.length - 1];
              if (!run) {
                core.info('No post-merge visual-testing run on main yet; waiting…');
              } else if (run.status !== 'completed') {
                core.info(`Run ${run.id} still ${run.status}; waiting…`);
              } else {
                found = run;
                break;
              }
              await new Promise((r) => setTimeout(r, POLL_INTERVAL_MS));
            }
            if (!found) {
              core.warning(
                'No completed post-merge visual-testing run on main appeared ' +
                'within 20 min; if main stays red, approve it from its own gallery.'
              );
            }
            core.setOutput('main_run_id', found ? String(found.id) : '');
            core.setOutput('main_conclusion', found ? found.conclusion : '');

      - name: Download main run's shard statuses
        if: steps.find-main-run.outputs.main_conclusion == 'failure'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: visual-status-*
          path: ./main-shard-statuses
          merge-multiple: true
          run-id: ${{ steps.find-main-run.outputs.main_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download main run's blob reports
        if: steps.find-main-run.outputs.main_conclusion == 'failure'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: blob-report-*
          path: ./main-blob-reports
          merge-multiple: true
          run-id: ${{ steps.find-main-run.outputs.main_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Safety gate: the main run may only be marked green when it failed for
      # snapshot diffs alone AND every diffing screenshot is among the
      # just-approved ones. Real failures, missing shard statuses, or diffs
      # beyond the approval leave the run red for the user to inspect.
      - name: Check the approval covers the main run's diffs
        id: cover
        if: steps.find-main-run.outputs.main_conclusion == 'failure'
        run: |
          set -euo pipefail
          covered="true"
          reason=""
          shopt -s nullglob
          status_files=(./main-shard-statuses/*.txt)
          if [ "${#status_files[@]}" -eq 0 ]; then
            covered="false"
            reason="the main run uploaded no shard statuses, so its failure cannot be classified"
          elif grep -qx "has_real_failures=true" "${status_files[@]}"; then
            covered="false"
            reason="the main run has real (non-snapshot) failures"
          else
            # Capture via command substitution so a script crash aborts the
            # step under `set -e` (process substitution would swallow it).
            names_output=$(uv run python scripts/approve_baselines_from_artifacts.py ./main-blob-reports --names-only)
            if [ -z "$names_output" ]; then
              covered="false"
              reason="the main run produced no snapshot attachments to compare against"
            else
              mapfile -t main_names <<< "$names_output"
              for name in "${main_names[@]}"; do
                if [ ! -f "$STAGING_DIR/$name" ]; then
                  covered="false"
                  reason="the main run has diffs beyond this approval (e.g. $name)"
                  break
                fi
              done
            fi
          fi
          echo "covered=$covered"
          if [ -n "$reason" ]; then
            echo "reason: $reason"
          fi
          {
            echo "covered=$covered"
            echo "reason=$reason"
          } >> "$GITHUB_OUTPUT"

      # Main runs can't push an empty commit (would pollute history). The
      # actuals we just uploaded ARE the new baselines, so re-running
      # visual-testing would always pass — skip it. Instead, post a
      # synthetic passing `visual-testing` check-run on the head commit
      # (deploy.yaml's verify-test-results polls `sort_by(.started_at)
      # | last`, so the new success wins over the prior failure), then
      # re-run failed jobs on the same-commit deploy.yaml run to unblock
      # the deploy. Merged-PR approvals reach this step with the discovered
      # post-merge main run once the coverage gate above has passed.
      - name: Mark visual-testing passing + retrigger deploy on main
        if: success() && (steps.resolve.outputs.pr_number == '' || steps.cover.outputs.covered == 'true')
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          VISUAL_RUN_ID: ${{ steps.resolve.outputs.pr_number == '' && github.event.inputs.run_id || steps.find-main-run.outputs.main_run_id }}
        with:
          script: |
            const runId = Number(process.env.VISUAL_RUN_ID);
            const original = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });
            const headSha = original.data.head_sha;
            const detailsUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const nowIso = new Date().toISOString();
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'visual-testing',
              head_sha: headSha,
              status: 'completed',
              conclusion: 'success',
              started_at: nowIso,
              completed_at: nowIso,
              details_url: detailsUrl,
              output: {
                title: 'Baselines approved',
                summary: `Baselines for ${headSha} were approved via run ${runId}; the uploaded actuals are now the new R2 baselines, so visual-testing on this commit would pass. Synthetic check-run posted to unblock \`verify-test-results\`.`,
              },
            });
            core.info(`Posted passing visual-testing check-run for ${headSha}`);

            // Find the deploy.yaml run for this commit, then poll until it
            // reaches a terminal state — `rerun-failed-jobs` only works on
            // completed runs. Typical wait is just `prepare-deploy`
            // finishing (≈3–5 min); cap at 15 min so a stuck pipeline
            // fails with a warning instead of exhausting the job timeout.
            const listDeployRuns = () =>
              github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'deploy.yaml',
                head_sha: headSha,
                per_page: 5,
              });
            const POLL_INTERVAL_MS = 30_000;
            const MAX_ATTEMPTS = 30; // 30 × 30s = 15 min
            let deploy;
            for (let i = 0; i < MAX_ATTEMPTS; i++) {
              const { data } = await listDeployRuns();
              const run = data.workflow_runs[0]; // most recent for this SHA
              if (!run) {
                core.info(`No deploy.yaml run for ${headSha} yet; waiting…`);
              } else if (run.status === 'completed') {
                deploy = run;
                break;
              } else {
                core.info(
                  `deploy.yaml run ${run.id} still ${run.status}; waiting…`
                );
              }
              await new Promise((r) => setTimeout(r, POLL_INTERVAL_MS));
            }
            if (!deploy) {
              core.warning(
                `deploy.yaml run for ${headSha} didn't finish within 15 min; ` +
                `re-run its failed jobs manually from the Actions UI to ` +
                `unblock the deploy.`
              );
              return;
            }
            if (deploy.conclusion === 'success') {
              core.info(
                `deploy.yaml ${deploy.id} already succeeded; nothing to do`
              );
              return;
            }
            // Rerun just the `verify-test-results` job — `rerun-job`
            // also reruns dependents, so `deploy` re-evaluates against
            // the now-passing visual-testing check-run. More targeted
            // than `rerun-failed-jobs`, which would also rerun anything
            // else that happened to fail in this run.
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: deploy.id,
              per_page: 50,
            });
            const verifyJob = jobs.data.jobs.find(
              (j) => j.name === 'verify-test-results'
            );
            if (!verifyJob) {
              core.warning(
                `deploy.yaml ${deploy.id} has no verify-test-results job; ` +
                `nothing to rerun`
              );
              return;
            }
            await github.rest.actions.reRunJobForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              job_id: verifyJob.id,
            });
            core.info(
              `Re-running verify-test-results job ${verifyJob.id} ` +
              `(part of deploy run ${deploy.id})`
            );

      - name: Comment success on PR
        if: success() && steps.resolve.outputs.pr_number != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
          RUN_ID: ${{ github.event.inputs.run_id }}
          MERGED: ${{ steps.resolve.outputs.merged }}
          MAIN_RUN_ID: ${{ steps.find-main-run.outputs.main_run_id }}
          MAIN_CONCLUSION: ${{ steps.find-main-run.outputs.main_conclusion }}
          COVERED: ${{ steps.cover.outputs.covered }}
          COVER_REASON: ${{ steps.cover.outputs.reason }}
        with:
          script: |
            let body = `Approved baselines from run ${process.env.RUN_ID}`;
            if (process.env.MERGED !== 'true') {
              body += ' and pushed an empty commit to retrigger visual-testing.';
            } else if (!process.env.MAIN_RUN_ID) {
              body +=
                '. No completed post-merge visual-testing run appeared on main ' +
                'within the wait budget — if main stays red, approve it from its own gallery.';
            } else if (process.env.MAIN_CONCLUSION !== 'failure') {
              body += `. Main's post-merge visual-testing run already concluded ` +
                `\`${process.env.MAIN_CONCLUSION}\`; nothing further to do.`;
            } else if (process.env.COVERED === 'true') {
              body += `. Carried the approval through to main: marked visual-testing ` +
                `run ${process.env.MAIN_RUN_ID} green and retriggered the deploy gate.`;
            } else {
              body += `. Main's visual-testing run ${process.env.MAIN_RUN_ID} was left ` +
                `red because ${process.env.COVER_REASON}.`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body,
            });

      - name: Comment failure on PR
        if: failure() && steps.resolve.outputs.pr_number != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: `Approve-baselines failed: ${runUrl}`,
            });
