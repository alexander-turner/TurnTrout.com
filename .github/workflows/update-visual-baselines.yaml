name: Update visual baselines

# Triggered when a reviewer adds the `visual-approved` label to a PR:
# regenerates visual baselines (Chromium+Firefox on Linux, WebKit on
# macOS), uploads the fresh PNGs to R2, and pushes an empty commit to
# the PR branch so visual-testing reruns against the new baselines.

on:
  pull_request:
    types: [labeled]

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: update-visual-baselines-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event.label.name == 'visual-approved'
    uses: ./.github/workflows/build-site.yaml

  generate-linux:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      PLAYWRIGHT_BROWSERS: chromium,firefox
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-visual-testing-env
        with:
          install-playwright: "true"
          install-python: "true"

      - name: Install browsers
        run: pnpm run install-browsers

      - name: Restore built site from cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Download existing visual baselines from R2
        env:
          ACCESS_KEY_ID_TURNTROUT_MEDIA: ${{ secrets.ACCESS_KEY_ID_TURNTROUT_MEDIA }}
          SECRET_ACCESS_TURNTROUT_MEDIA: ${{ secrets.SECRET_ACCESS_TURNTROUT_MEDIA }}
          S3_ENDPOINT_ID_TURNTROUT_MEDIA: ${{ secrets.S3_ENDPOINT_ID_TURNTROUT_MEDIA }}
        run: uv run python scripts/r2_baselines.py download

      - name: Run Playwright with --update-snapshots
        run: |
          set -o pipefail
          pnpm exec playwright test \
            --config config/playwright/playwright.config.ts \
            --update-snapshots=all \
            -g "(screenshot)" 2>&1 | tee playwright-update.log || true
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload regenerated baselines to R2
        env:
          ACCESS_KEY_ID_TURNTROUT_MEDIA: ${{ secrets.ACCESS_KEY_ID_TURNTROUT_MEDIA }}
          SECRET_ACCESS_TURNTROUT_MEDIA: ${{ secrets.SECRET_ACCESS_TURNTROUT_MEDIA }}
          S3_ENDPOINT_ID_TURNTROUT_MEDIA: ${{ secrets.S3_ENDPOINT_ID_TURNTROUT_MEDIA }}
        run: uv run python scripts/r2_baselines.py upload

  generate-macos:
    needs: build
    runs-on: macos-26
    timeout-minutes: 60
    env:
      PLAYWRIGHT_BROWSERS: webkit
      # Playwright 1.59.0 added Page.overridePlatform for WebKit device presets,
      # which crashes WebKit on macOS ARM64 (microsoft/playwright#40009).
      PLAYWRIGHT_NO_UA_PLATFORM: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Disable macOS firewall
        run: sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate off

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-visual-testing-env
        with:
          install-playwright: "false"
          install-python: "true"

      - name: Install Playwright WebKit browser
        run: pnpm exec playwright install webkit

      - name: Strip macOS Gatekeeper quarantine attributes
        run: xattr -cr ~/Library/Caches/ms-playwright

      - name: Restore built site from cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Download existing visual baselines from R2
        env:
          ACCESS_KEY_ID_TURNTROUT_MEDIA: ${{ secrets.ACCESS_KEY_ID_TURNTROUT_MEDIA }}
          SECRET_ACCESS_TURNTROUT_MEDIA: ${{ secrets.SECRET_ACCESS_TURNTROUT_MEDIA }}
          S3_ENDPOINT_ID_TURNTROUT_MEDIA: ${{ secrets.S3_ENDPOINT_ID_TURNTROUT_MEDIA }}
        run: uv run python scripts/r2_baselines.py download

      - name: Run Playwright with --update-snapshots
        run: |
          set -o pipefail
          pnpm exec playwright test \
            --config config/playwright/playwright.config.ts \
            --update-snapshots=all \
            -g "(screenshot)" 2>&1 | tee playwright-update.log || true
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload regenerated baselines to R2
        env:
          ACCESS_KEY_ID_TURNTROUT_MEDIA: ${{ secrets.ACCESS_KEY_ID_TURNTROUT_MEDIA }}
          SECRET_ACCESS_TURNTROUT_MEDIA: ${{ secrets.SECRET_ACCESS_TURNTROUT_MEDIA }}
          S3_ENDPOINT_ID_TURNTROUT_MEDIA: ${{ secrets.S3_ENDPOINT_ID_TURNTROUT_MEDIA }}
        run: uv run python scripts/r2_baselines.py upload

  # Retrigger visual-testing on the PR with the new baselines in R2.
  # Empty commit on the PR head fires the synchronize event.
  retrigger:
    needs: [generate-linux, generate-macos]
    if: >-
      always() && (
        needs.generate-linux.result == 'success' ||
        needs.generate-macos.result == 'success'
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push empty commit to retrigger visual-testing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          PLATFORMS=""
          if [ "${{ needs.generate-linux.result }}" = "success" ]; then
            PLATFORMS="linux"
          fi
          if [ "${{ needs.generate-macos.result }}" = "success" ]; then
            PLATFORMS="${PLATFORMS:+${PLATFORMS}+}macos"
          fi
          SHORT_SHA=$(git rev-parse --short HEAD)
          git commit --allow-empty -m "ci: rerun visual-testing against new R2 baselines (${PLATFORMS}, approved on ${SHORT_SHA})"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Remove approval label
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'visual-approved',
              });
            } catch (err) {
              // 404 = already removed; ignore. Anything else, rethrow.
              if (err.status !== 404) throw err;
            }
