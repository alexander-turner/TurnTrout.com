name: Update visual baselines

# Two ways in:
#   1. PR path: a reviewer adds the `visual-approved` label.
#   2. Manual path: workflow_dispatch with a ref input — used to approve
#      baseline drift detected on main (or any non-PR ref) without
#      having to open a fix-up PR.
# Both regenerate baselines (Chromium+Firefox on Linux, WebKit on
# macOS), upload to R2, then push an empty commit to the target branch
# so visual-testing reruns against the new baselines.

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch to regen baselines against and push the rerun commit to. Must be a branch name (push back fails on SHAs). Defaults to main."
        required: false
        default: main

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: update-visual-baselines-${{ github.event.pull_request.number || inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'visual-approved'
    uses: ./.github/workflows/build-site.yaml

  generate-linux:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      PLAYWRIGHT_BROWSERS: chromium,firefox
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-visual-testing-env
        with:
          install-playwright: "true"
          install-python: "true"

      - name: Install browsers
        run: pnpm run install-browsers

      - name: Restore built site from cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Download existing visual baselines from R2
        env:
          ACCESS_KEY_ID_TURNTROUT_MEDIA: ${{ secrets.ACCESS_KEY_ID_TURNTROUT_MEDIA }}
          SECRET_ACCESS_TURNTROUT_MEDIA: ${{ secrets.SECRET_ACCESS_TURNTROUT_MEDIA }}
          S3_ENDPOINT_ID_TURNTROUT_MEDIA: ${{ secrets.S3_ENDPOINT_ID_TURNTROUT_MEDIA }}
        run: uv run python scripts/r2_baselines.py download

      - name: Run Playwright with --update-snapshots
        run: |
          set -o pipefail
          pnpm exec playwright test \
            --config config/playwright/playwright.config.ts \
            --update-snapshots=all \
            -g "(screenshot)" 2>&1 | tee playwright-update.log || true
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload regenerated baselines to R2
        env:
          ACCESS_KEY_ID_TURNTROUT_MEDIA: ${{ secrets.ACCESS_KEY_ID_TURNTROUT_MEDIA }}
          SECRET_ACCESS_TURNTROUT_MEDIA: ${{ secrets.SECRET_ACCESS_TURNTROUT_MEDIA }}
          S3_ENDPOINT_ID_TURNTROUT_MEDIA: ${{ secrets.S3_ENDPOINT_ID_TURNTROUT_MEDIA }}
        run: uv run python scripts/r2_baselines.py upload

  generate-macos:
    needs: build
    runs-on: macos-26
    timeout-minutes: 60
    env:
      PLAYWRIGHT_BROWSERS: webkit
      # Playwright 1.59.0 added Page.overridePlatform for WebKit device presets,
      # which crashes WebKit on macOS ARM64 (microsoft/playwright#40009).
      PLAYWRIGHT_NO_UA_PLATFORM: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Disable macOS firewall
        run: sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate off

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-visual-testing-env
        with:
          install-playwright: "false"
          install-python: "true"

      - name: Install Playwright WebKit browser
        run: pnpm exec playwright install webkit

      - name: Strip macOS Gatekeeper quarantine attributes
        run: xattr -cr ~/Library/Caches/ms-playwright

      - name: Restore built site from cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Download existing visual baselines from R2
        env:
          ACCESS_KEY_ID_TURNTROUT_MEDIA: ${{ secrets.ACCESS_KEY_ID_TURNTROUT_MEDIA }}
          SECRET_ACCESS_TURNTROUT_MEDIA: ${{ secrets.SECRET_ACCESS_TURNTROUT_MEDIA }}
          S3_ENDPOINT_ID_TURNTROUT_MEDIA: ${{ secrets.S3_ENDPOINT_ID_TURNTROUT_MEDIA }}
        run: uv run python scripts/r2_baselines.py download

      - name: Run Playwright with --update-snapshots
        run: |
          set -o pipefail
          pnpm exec playwright test \
            --config config/playwright/playwright.config.ts \
            --update-snapshots=all \
            -g "(screenshot)" 2>&1 | tee playwright-update.log || true
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload regenerated baselines to R2
        env:
          ACCESS_KEY_ID_TURNTROUT_MEDIA: ${{ secrets.ACCESS_KEY_ID_TURNTROUT_MEDIA }}
          SECRET_ACCESS_TURNTROUT_MEDIA: ${{ secrets.SECRET_ACCESS_TURNTROUT_MEDIA }}
          S3_ENDPOINT_ID_TURNTROUT_MEDIA: ${{ secrets.S3_ENDPOINT_ID_TURNTROUT_MEDIA }}
        run: uv run python scripts/r2_baselines.py upload

  # Retrigger visual-testing against the new baselines in R2 by pushing
  # an empty commit to the target branch.
  #   - PR path: target = PR head ref on its source repo.
  #   - workflow_dispatch path: target = the ref the workflow was
  #     dispatched against (defaults to main).
  retrigger:
    needs: [generate-linux, generate-macos]
    if: >-
      always() && (
        needs.generate-linux.result == 'success' ||
        needs.generate-macos.result == 'success'
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Compute target ref/repo
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
            echo "repo=${{ github.repository }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
            echo "repo=${{ github.event.pull_request.head.repo.full_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout target branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.target.outputs.ref }}
          repository: ${{ steps.target.outputs.repo }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push empty commit to retrigger visual-testing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          PLATFORMS=""
          if [ "${{ needs.generate-linux.result }}" = "success" ]; then
            PLATFORMS="linux"
          fi
          if [ "${{ needs.generate-macos.result }}" = "success" ]; then
            PLATFORMS="${PLATFORMS:+${PLATFORMS}+}macos"
          fi
          SHORT_SHA=$(git rev-parse --short HEAD)
          git commit --allow-empty -m "ci: rerun visual-testing against new R2 baselines (${PLATFORMS}, approved on ${SHORT_SHA})"
          git push origin HEAD:${{ steps.target.outputs.ref }}

      - name: Remove approval label
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'visual-approved',
              });
            } catch (err) {
              // 404 = already removed; ignore. Anything else, rethrow.
              if (err.status !== 404) throw err;
            }
