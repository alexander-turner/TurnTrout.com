name: Visual Testing

concurrency:
  group: visual-testing-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    types: [labeled, synchronize, opened, reopened]
    paths:
      - "quartz/**"
      - "website_content/**"
      - "config/quartz/**"
      - "config/constants.json"
      - "config/playwright/**"
      - "tests/visual-baselines/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"
  merge_group:

permissions:
  actions: read
  contents: read
  pull-requests: write
  statuses: write

jobs:
  # Gate: only run expensive tests on PRs when a CI label is actively added.
  # The pull_request trigger keeps synchronize/opened/reopened so this workflow
  # fires on every push — the should-run gate returns run=false instantly,
  # which is needed for the unified "visual-testing" required status check.
  should-run:
    name: visual-should-run
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]' && !startsWith(github.head_ref, 'deepsource-')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      run: ${{ steps.gate.outputs.run }}
      run-macos: ${{ steps.gate.outputs.run-macos }}
      browsers: ${{ steps.gate.outputs.browsers }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github/actions/ci-gate
      - id: gate
        uses: ./.github/actions/ci-gate
        with:
          run-labels: "ci:full-tests,ci:run-visual"

  build:
    name: visual-testing-build
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/build-site.yaml

  # Chromium + Firefox on main; Chromium-only on PRs/merge queue
  visual-testing-linux:
    needs: [build, should-run]
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard:
          [
            "1/3",
            "2/3",
            "3/3",
          ]
    env:
      PLAYWRIGHT_BROWSERS: ${{ needs.should-run.outputs.browsers }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-visual-testing-env
        with:
          install-playwright: "true"
          install-python: "true"

      - name: Create Winston logs directory
        run: mkdir -p .logs

      - name: Install browsers
        run: pnpm run install-browsers

      - name: Restore built site from cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Download visual baselines from R2
        env:
          ACCESS_KEY_ID_TURNTROUT_MEDIA: ${{ secrets.ACCESS_KEY_ID_TURNTROUT_MEDIA }}
          SECRET_ACCESS_TURNTROUT_MEDIA: ${{ secrets.SECRET_ACCESS_TURNTROUT_MEDIA }}
          S3_ENDPOINT_ID_TURNTROUT_MEDIA: ${{ secrets.S3_ENDPOINT_ID_TURNTROUT_MEDIA }}
        run: uv run python scripts/r2_baselines.py download

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm exec playwright test \
            --config config/playwright/playwright.config.ts \
            --shard ${{ matrix.shard }} \
            --reporter=blob,dot \
            --update-snapshots=none \
            --trace=off \
            -g "(screenshot)" 2>&1 | tee playwright-run.log
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"
          # 40 min job timeout → 35 min Playwright global timeout
          PLAYWRIGHT_GLOBAL_TIMEOUT_MS: "2100000"

      - name: Create sanitized shard
        if: always()
        run: echo "SANITIZED_SHARD=${MATRIX_SHARD%%/*}" >> $GITHUB_ENV
        env:
          MATRIX_SHARD: ${{ matrix.shard }}

      - name: Upload Playwright logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: visual-testing-log-linux-shard-${{ env.SANITIZED_SHARD }}
          path: playwright-run.log
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Winston logs
        if: steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: winston-logs-linux-shard-${{ env.SANITIZED_SHARD }}
          path: .logs/
          if-no-files-found: warn
          retention-days: 1

      - name: Upload webServer build logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: webserver-build-log-linux-shard-${{ env.SANITIZED_SHARD }}
          path: /tmp/webserver.log
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-traces-linux-shard-${{ env.SANITIZED_SHARD }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 1

      # Playwright's blob reporter writes report-<run-id>-<shard-num>.zip,
      # so Linux and macOS shards with the same shard number produce the
      # same filename. publish-visual-report downloads with merge-multiple,
      # which silently overwrites the colliding files. Tag with platform
      # before upload so every blob report has a unique name.
      - name: Tag blob report with platform
        if: always() && hashFiles('blob-report/*.zip') != ''
        run: |
          cd blob-report
          for f in *.zip; do mv "$f" "linux-$f"; done

      # Blob report is consumed by the publish-visual-report job to
      # generate a merged HTML diff report with side-by-side comparisons.
      - name: Upload blob report shard
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: blob-report-linux-shard-${{ env.SANITIZED_SHARD }}
          path: blob-report/
          if-no-files-found: warn
          retention-days: 1

      - name: Fail if playwright tests failed
        if: steps.playwright.outcome != 'success'
        run: exit 1

  # WebKit (Safari) visual tests on macOS for real Safari fidelity
  visual-testing-macos:
    needs: [build, should-run]
    if: needs.should-run.outputs.run-macos == 'true'
    runs-on: macos-26
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard:
          [
            "1/2",
            "2/2",
          ]
    env:
      PLAYWRIGHT_BROWSERS: webkit
      # Playwright 1.59.0 added Page.overridePlatform for WebKit device presets,
      # which crashes WebKit on macOS ARM64 (microsoft/playwright#40009).
      # Reverted upstream but no 1.59.2 release yet. Remove when upgrading Playwright.
      PLAYWRIGHT_NO_UA_PLATFORM: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Disable macOS firewall
        run: sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate off

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-visual-testing-env
        with:
          install-playwright: "false"
          install-python: "true"

      - name: Create Winston logs directory
        run: mkdir -p .logs

      - name: Install Playwright WebKit browser
        run: pnpm exec playwright install webkit

      - name: Strip macOS Gatekeeper quarantine attributes
        run: xattr -cr ~/Library/Caches/ms-playwright

      - name: Restore built site from cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Download visual baselines from R2
        env:
          ACCESS_KEY_ID_TURNTROUT_MEDIA: ${{ secrets.ACCESS_KEY_ID_TURNTROUT_MEDIA }}
          SECRET_ACCESS_TURNTROUT_MEDIA: ${{ secrets.SECRET_ACCESS_TURNTROUT_MEDIA }}
          S3_ENDPOINT_ID_TURNTROUT_MEDIA: ${{ secrets.S3_ENDPOINT_ID_TURNTROUT_MEDIA }}
        run: uv run python scripts/r2_baselines.py download

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm exec playwright test \
            --config config/playwright/playwright.config.ts \
            --shard ${{ matrix.shard }} \
            --reporter=blob,dot \
            --update-snapshots=none \
            --trace=off \
            -g "(screenshot)" 2>&1 | tee playwright-run.log
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"
          PLAYWRIGHT_GLOBAL_TIMEOUT_MS: "2100000"

      - name: Create sanitized shard
        if: always()
        run: echo "SANITIZED_SHARD=${MATRIX_SHARD%%/*}" >> $GITHUB_ENV
        env:
          MATRIX_SHARD: ${{ matrix.shard }}

      - name: Upload Playwright logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: visual-testing-log-macos-shard-${{ env.SANITIZED_SHARD }}
          path: playwright-run.log
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Winston logs
        if: steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: winston-logs-macos-shard-${{ env.SANITIZED_SHARD }}
          path: .logs/
          if-no-files-found: warn
          retention-days: 1

      - name: Upload webServer build logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: webserver-build-log-macos-shard-${{ env.SANITIZED_SHARD }}
          path: /tmp/webserver.log
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-traces-macos-shard-${{ env.SANITIZED_SHARD }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 1

      # See Linux job for the rationale — without a platform tag, Linux
      # and macOS shards with the same shard number collide on download.
      - name: Tag blob report with platform
        if: always() && hashFiles('blob-report/*.zip') != ''
        run: |
          cd blob-report
          for f in *.zip; do mv "$f" "macos-$f"; done

      - name: Upload blob report shard
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: blob-report-macos-shard-${{ env.SANITIZED_SHARD }}
          path: blob-report/
          if-no-files-found: warn
          retention-days: 1

      - name: Fail if playwright tests failed
        if: steps.playwright.outcome != 'success'
        run: exit 1

  # Unified status check — required by branch protection
  visual-testing:
    name: visual-testing
    if: always()
    needs: [should-run, visual-testing-linux, visual-testing-macos]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.should-run.outputs.run }}" == "false" ]] || [[ "${{ needs.should-run.result }}" == "skipped" ]]; then
            echo "Tests were skipped (no label or filtered branch)"
            exit 0
          fi
          if [[ "${{ needs.visual-testing-linux.result }}" != "success" ]]; then
            echo "Linux visual tests did not succeed (${{ needs.visual-testing-linux.result }})"
            exit 1
          fi
          # macOS only runs on push to main; allow skipped elsewhere
          if [[ "${{ needs.should-run.outputs.run-macos }}" == "true" ]] && \
             [[ "${{ needs.visual-testing-macos.result }}" != "success" ]]; then
            echo "macOS visual tests did not succeed (${{ needs.visual-testing-macos.result }})"
            exit 1
          fi

  summarize-failures:
    name: Summarize Failures
    if: >-
      always() && (
        needs.visual-testing-linux.result == 'failure' ||
        needs.visual-testing-linux.result == 'cancelled' ||
        needs.visual-testing-macos.result == 'failure' ||
        needs.visual-testing-macos.result == 'cancelled'
      )
    needs: [visual-testing-linux, visual-testing-macos]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/summarize-failed-shards
        with:
          log-pattern: visual-testing-log-*
          final-log-name: visual-testing-failed-logs

  # Merge per-shard blob reports into a single HTML report, upload as a
  # GHA artifact, and post a PR comment with the download link.
  publish-visual-report:
    needs: [should-run, visual-testing-linux, visual-testing-macos]
    if: >-
      always() && !cancelled() &&
      needs.should-run.outputs.run == 'true' &&
      (
        needs.visual-testing-linux.result == 'failure' ||
        needs.visual-testing-macos.result == 'failure'
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-visual-testing-env

      - name: Download all blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: blob-report-*
          path: ./all-blob-reports
          merge-multiple: true

      # Pass -c so merge-reports tolerates the Linux/macOS testDir
      # difference (/home/runner vs /Users/runner) — without it the merge
      # aborts with "different test directories, merging cannot proceed".
      - name: Merge blob reports into HTML
        run: |
          pnpm exec playwright merge-reports \
            -c config/playwright/playwright.config.ts \
            --reporter html ./all-blob-reports

      # Pull every shard's test-results/ for the screenshot gallery generator.
      - name: Download trace artifacts (for gallery)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: playwright-traces-*
          path: ./all-traces
          merge-multiple: true

      # Build a single-page screenshot gallery alongside the Playwright
      # report. Skim-friendly grid view; useful at bootstrap (no
      # baselines yet → main report has nothing to slide between).
      - name: Generate screenshot gallery
        run: python3 scripts/generate_visual_gallery.py ./all-traces ./playwright-report

      - name: Upload merged HTML report
        id: upload-report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: visual-diff-report
          path: playwright-report/
          retention-days: 14

      # Belt-and-suspenders: drop anything still over Cloudflare Pages'
      # 25 MiB per-file cap. With --trace=off in the test run, individual
      # PNGs are well under this; this catches edge-case full-page shots
      # of unusually long articles.
      - name: Prune oversize files before Pages upload
        run: find playwright-report -type f -size +24M -print -delete || true

      # Branch name for the Cloudflare Pages deploy. Per-PR for PRs (so
      # opening the same PR again replaces the previous deploy), per-run
      # for main pushes (so historical commits stay accessible).
      - name: Compute Cloudflare branch name
        id: cf-branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "name=visual-pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=visual-main-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy diff report to Cloudflare Pages
        id: deploy-report
        continue-on-error: true
        uses: ./.github/actions/deploy-to-cloudflare
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-zone-id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          project-name: turntrout
          branch: ${{ steps.cf-branch.outputs.name }}
          public-dir: ./playwright-report

      # Surface the Cloudflare URL as a commit status so the red X on
      # PR/commit pages links straight to the diff gallery via "Details"
      # — instead of dropping into the workflow run logs.
      - name: Post visual-diff commit status
        if: steps.deploy-report.outcome == 'success'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          CLOUDFLARE_URL: https://${{ steps.cf-branch.outputs.name }}.turntrout.pages.dev
        with:
          script: |
            const sha = context.payload.pull_request?.head.sha || context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: 'failure',
              context: 'Visual diff report',
              target_url: process.env.CLOUDFLARE_URL,
              description: 'Open Details to view the screenshot diff gallery',
            });

      # Always-on summary on the workflow run page. Works for PR and main
      # pushes so you can find the URLs from any failing visual-testing
      # run without hunting through the Artifacts section. Includes the
      # approve-baselines link too — the PR-comment step below adds the
      # same content as a PR-side surface.
      - name: Emit summary with report links
        if: always()
        env:
          ARTIFACT_URL: ${{ steps.upload-report.outputs.artifact-url }}
          CLOUDFLARE_OK: ${{ steps.deploy-report.outcome == 'success' }}
          CLOUDFLARE_URL: https://${{ steps.cf-branch.outputs.name }}.turntrout.pages.dev
          APPROVE_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
          APPROVE_URL: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-visual-baselines.yaml
        run: |
          {
            echo "## Visual diff report"
            echo ""
            if [ "$CLOUDFLARE_OK" = "true" ]; then
              echo "- Diff gallery (skim view, expected/actual/diff side-by-side): $CLOUDFLARE_URL"
              echo "- Playwright report (per-test detail): $CLOUDFLARE_URL/report.html"
              echo ""
            fi
            echo "- Artifact: $ARTIFACT_URL"
            echo ""
            echo "### Approve baselines"
            echo ""
            echo "If the diffs look intended, approve them by running"
            echo "[Update visual baselines]($APPROVE_URL) with \`ref=$APPROVE_REF\`."
            echo "(Click *Run workflow*, pick the branch, set the ref input, and submit.)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment report links on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ARTIFACT_URL: ${{ steps.upload-report.outputs.artifact-url }}
          CLOUDFLARE_OK: ${{ steps.deploy-report.outcome == 'success' }}
          CLOUDFLARE_URL: https://${{ steps.cf-branch.outputs.name }}.turntrout.pages.dev
          APPROVE_REF: ${{ github.event.pull_request.head.ref }}
          APPROVE_URL: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-visual-baselines.yaml
        with:
          script: |
            const marker = '<!-- visual-diff-report -->';
            const prNumber = parseInt(process.env.PR_NUMBER);
            const sha = context.sha.substring(0, 7);
            const artifactUrl = process.env.ARTIFACT_URL;
            const cloudflareOk = process.env.CLOUDFLARE_OK === 'true';
            const cloudflareUrl = process.env.CLOUDFLARE_URL;
            const approveRef = process.env.APPROVE_REF;
            const approveUrl = process.env.APPROVE_URL;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const lines = [
              marker,
              `**Visual diff report** for commit ${sha}:`,
              '',
            ];
            if (cloudflareOk) {
              lines.push(`- Diff gallery (skim view, expected/actual/diff side-by-side): ${cloudflareUrl}`);
              lines.push(`- Playwright report (per-test detail): ${cloudflareUrl}/report.html`);
              lines.push('');
            }
            lines.push(`Download: ${artifactUrl}`);
            lines.push(`(or see the Artifacts section of the [workflow run](${runUrl}))`);
            lines.push('');
            lines.push(`If everything looks intended, approve the baselines by running [Update visual baselines](${approveUrl}) with \`ref=${approveRef}\`. (Click *Run workflow*, pick the branch, set the ref input, and submit.)`);
            const body = lines.join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
