name: Visual Testing

concurrency:
  group: visual-testing-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    types: [labeled, synchronize, opened, reopened]
    paths:
      - "quartz/**"
      - "website_content/**"
      - "config/quartz/**"
      - "config/constants.json"
      - "config/playwright/**"
      - "tests/visual-baselines/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"
  merge_group:

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  # Gate: only run expensive tests on PRs when a CI label is actively added.
  # The pull_request trigger keeps synchronize/opened/reopened so this workflow
  # fires on every push — the should-run gate returns run=false instantly,
  # which is needed for the unified "visual-testing" required status check.
  should-run:
    name: visual-should-run
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      run: ${{ steps.gate.outputs.run }}
      run-macos: ${{ steps.gate.outputs.run-macos }}
      browsers: ${{ steps.gate.outputs.browsers }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github/actions/ci-gate
      - id: gate
        uses: ./.github/actions/ci-gate
        with:
          run-labels: "ci:full-tests,ci:run-visual"

  build:
    name: visual-testing-build
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/build-site.yaml

  # Chromium + Firefox on main; Chromium-only on PRs/merge queue
  visual-testing-linux:
    needs: [build, should-run]
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard:
          [
            "1/3",
            "2/3",
            "3/3",
          ]
    env:
      PLAYWRIGHT_BROWSERS: ${{ needs.should-run.outputs.browsers }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-visual-testing-env
        with:
          install-playwright: "true"

      - name: Create Winston logs directory
        run: mkdir -p .logs

      - name: Install browsers
        run: pnpm run install-browsers

      - name: Restore built site from cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm exec playwright test \
            --config config/playwright/playwright.config.ts \
            --shard ${{ matrix.shard }} \
            --reporter=blob,dot \
            --update-snapshots=none \
            --trace=off \
            -g "(lostpixel)" 2>&1 | tee playwright-run.log
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"
          # 40 min job timeout → 35 min Playwright global timeout
          PLAYWRIGHT_GLOBAL_TIMEOUT_MS: "2100000"

      - name: Create sanitized shard
        if: always()
        run: echo "SANITIZED_SHARD=${MATRIX_SHARD%%/*}" >> $GITHUB_ENV
        env:
          MATRIX_SHARD: ${{ matrix.shard }}

      - name: Upload Playwright logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: visual-testing-log-linux-shard-${{ env.SANITIZED_SHARD }}
          path: playwright-run.log
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Winston logs
        if: steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: winston-logs-linux-shard-${{ env.SANITIZED_SHARD }}
          path: .logs/
          if-no-files-found: warn
          retention-days: 1

      - name: Upload webServer build logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: webserver-build-log-linux-shard-${{ env.SANITIZED_SHARD }}
          path: /tmp/webserver.log
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-traces-linux-shard-${{ env.SANITIZED_SHARD }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 1

      # Blob report is consumed by the publish-visual-report job to
      # generate a merged HTML diff report with side-by-side comparisons.
      - name: Upload blob report shard
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: blob-report-linux-shard-${{ env.SANITIZED_SHARD }}
          path: blob-report/
          if-no-files-found: warn
          retention-days: 1

      - name: Fail if playwright tests failed
        if: steps.playwright.outcome != 'success'
        run: exit 1

  # WebKit (Safari) visual tests on macOS for real Safari fidelity
  visual-testing-macos:
    needs: [build, should-run]
    if: needs.should-run.outputs.run-macos == 'true'
    runs-on: macos-26
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard:
          [
            "1/2",
            "2/2",
          ]
    env:
      PLAYWRIGHT_BROWSERS: webkit
      # Playwright 1.59.0 added Page.overridePlatform for WebKit device presets,
      # which crashes WebKit on macOS ARM64 (microsoft/playwright#40009).
      # Reverted upstream but no 1.59.2 release yet. Remove when upgrading Playwright.
      PLAYWRIGHT_NO_UA_PLATFORM: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Disable macOS firewall
        run: sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate off

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-visual-testing-env
        with:
          install-playwright: "false"

      - name: Create Winston logs directory
        run: mkdir -p .logs

      - name: Install Playwright WebKit browser
        run: pnpm exec playwright install webkit

      - name: Strip macOS Gatekeeper quarantine attributes
        run: xattr -cr ~/Library/Caches/ms-playwright

      - name: Restore built site from cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm exec playwright test \
            --config config/playwright/playwright.config.ts \
            --shard ${{ matrix.shard }} \
            --reporter=blob,dot \
            --update-snapshots=none \
            --trace=off \
            -g "(lostpixel)" 2>&1 | tee playwright-run.log
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"
          PLAYWRIGHT_GLOBAL_TIMEOUT_MS: "2100000"

      - name: Create sanitized shard
        if: always()
        run: echo "SANITIZED_SHARD=${MATRIX_SHARD%%/*}" >> $GITHUB_ENV
        env:
          MATRIX_SHARD: ${{ matrix.shard }}

      - name: Upload Playwright logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: visual-testing-log-macos-shard-${{ env.SANITIZED_SHARD }}
          path: playwright-run.log
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Winston logs
        if: steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: winston-logs-macos-shard-${{ env.SANITIZED_SHARD }}
          path: .logs/
          if-no-files-found: warn
          retention-days: 1

      - name: Upload webServer build logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: webserver-build-log-macos-shard-${{ env.SANITIZED_SHARD }}
          path: /tmp/webserver.log
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-traces-macos-shard-${{ env.SANITIZED_SHARD }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 1

      - name: Upload blob report shard
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: blob-report-macos-shard-${{ env.SANITIZED_SHARD }}
          path: blob-report/
          if-no-files-found: warn
          retention-days: 1

      - name: Fail if playwright tests failed
        if: steps.playwright.outcome != 'success'
        run: exit 1

  # Unified status check — required by branch protection
  visual-testing:
    name: visual-testing
    if: always()
    needs: [should-run, visual-testing-linux, visual-testing-macos]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.should-run.outputs.run }}" == "false" ]]; then
            echo "Tests were skipped (no label)"
            exit 0
          fi
          if [[ "${{ needs.visual-testing-linux.result }}" != "success" ]]; then
            echo "Linux visual tests did not succeed (${{ needs.visual-testing-linux.result }})"
            exit 1
          fi
          # macOS only runs on push to main; allow skipped elsewhere
          if [[ "${{ needs.should-run.outputs.run-macos }}" == "true" ]] && \
             [[ "${{ needs.visual-testing-macos.result }}" != "success" ]]; then
            echo "macOS visual tests did not succeed (${{ needs.visual-testing-macos.result }})"
            exit 1
          fi

  summarize-failures:
    name: Summarize Failures
    if: >-
      always() && (
        needs.visual-testing-linux.result == 'failure' ||
        needs.visual-testing-linux.result == 'cancelled' ||
        needs.visual-testing-macos.result == 'failure' ||
        needs.visual-testing-macos.result == 'cancelled'
      )
    needs: [visual-testing-linux, visual-testing-macos]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/summarize-failed-shards
        with:
          log-pattern: visual-testing-log-*
          final-log-name: visual-testing-failed-logs

  # Merge per-shard blob reports into a single HTML report, upload as a
  # GHA artifact, and post a PR comment with the download link.
  publish-visual-report:
    needs: [should-run, visual-testing-linux, visual-testing-macos]
    if: >-
      always() && !cancelled() &&
      needs.should-run.outputs.run == 'true' &&
      (
        needs.visual-testing-linux.result == 'failure' ||
        needs.visual-testing-macos.result == 'failure'
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-visual-testing-env

      - name: Download all blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: blob-report-*
          path: ./all-blob-reports
          merge-multiple: true

      - name: Merge blob reports into HTML
        run: pnpm exec playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        id: upload-report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: visual-diff-report
          path: playwright-report/
          retention-days: 14

      - name: Comment report download link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ARTIFACT_URL: ${{ steps.upload-report.outputs.artifact-url }}
        with:
          script: |
            const marker = '<!-- visual-diff-report -->';
            const prNumber = parseInt(process.env.PR_NUMBER);
            const sha = context.sha.substring(0, 7);
            const artifactUrl = process.env.ARTIFACT_URL;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              marker,
              `**Visual diff report** for commit ${sha}:`,
              '',
              `Download: ${artifactUrl}`,
              `(or see the Artifacts section of the [workflow run](${runUrl}))`,
              '',
              'Unzip the `visual-diff-report` archive and open `index.html` to inspect diffs side-by-side. If everything looks intended, add the `visual-approved` label to this PR to update the baselines.',
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
