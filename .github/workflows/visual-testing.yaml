name: Visual Testing

concurrency:
  group: visual-testing-${{ github.ref_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    types: [labeled, synchronize, opened, reopened]
    paths:
      - "quartz/**"
      - "website_content/**"
      - "config/quartz/**"
      - "config/constants.json"
      - "config/playwright/**"
      - "config/lostpixel/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"
  merge_group:

permissions:
  actions: read
  contents: read

jobs:
  # Gate: only run expensive tests on PRs when a CI label is actively added.
  # The pull_request trigger keeps synchronize/opened/reopened so this workflow
  # fires on every push — the should-run gate returns run=false instantly,
  # which is needed for the unified "visual-testing" required status check.
  should-run:
    name: visual-should-run
    runs-on: ubuntu-24.04
    outputs:
      run: ${{ steps.check.outputs.run }}
      run-macos: ${{ steps.check.outputs.run-macos }}
      browsers: ${{ steps.check.outputs.browsers }}
    steps:
      - id: check
        run: |
          # On PRs, only run when a CI label is actively added (per-commit, not persistent)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "${{ github.event.action }}" == "labeled" ]]; then
              if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:full-tests') }}" == "true" ]] || \
                 [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:run-visual') }}" == "true" ]]; then
                echo "run=true" >> "$GITHUB_OUTPUT"
              else
                echo "run=false" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "run=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
          # macOS (WebKit) and Firefox only on push to main — save 10x runner cost
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "main" ]]; then
            echo "run-macos=true" >> "$GITHUB_OUTPUT"
            echo "browsers=chromium,firefox" >> "$GITHUB_OUTPUT"
          else
            echo "run-macos=false" >> "$GITHUB_OUTPUT"
            echo "browsers=chromium" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: visual-testing-build
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/build-site.yaml

  # Chromium + Firefox on main; Chromium-only on PRs/merge queue
  visual-testing-linux:
    needs: [build, should-run]
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard:
          [
            "1/3",
            "2/3",
            "3/3",
          ]
    env:
      PLAYWRIGHT_BROWSERS: ${{ needs.should-run.outputs.browsers }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-visual-testing-env
        with:
          install-playwright: "true"

      - name: Make folder for screenshots
        run: mkdir -p ./lost-pixel

      - name: Create Winston logs directory
        run: mkdir -p .logs

      - name: Install browsers
        run: pnpm run install-browsers

      - name: Restore built site from cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm exec playwright test --config config/playwright/playwright.config.ts --shard ${{ matrix.shard }} -g "(lostpixel)" 2>&1 | tee playwright-run.log
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Create sanitized shard
        if: always()
        run: echo "SANITIZED_SHARD=${MATRIX_SHARD%%/*}" >> $GITHUB_ENV
        env:
          MATRIX_SHARD: ${{ matrix.shard }}

      - name: Upload Playwright logs
        if: steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: visual-testing-log-linux-shard-${{ env.SANITIZED_SHARD }}
          path: playwright-run.log
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Winston logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: winston-logs-linux-shard-${{ env.SANITIZED_SHARD }}
          path: .logs/
          if-no-files-found: warn
          retention-days: 1

      - name: Upload webServer build logs
        if: steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: webserver-build-log-linux-shard-${{ env.SANITIZED_SHARD }}
          path: /tmp/webserver.log
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Playwright traces
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: steps.playwright.outcome == 'failure'
        with:
          name: playwright-traces-linux-shard-${{ env.SANITIZED_SHARD }}
          path: test-results/
          retention-days: 1

      - name: Upload Lost Pixel screenshots shard
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: lost-pixel-screenshots-linux-shard-${{ env.SANITIZED_SHARD }}
          path: ./lost-pixel
          retention-days: 1

      - name: Fail if playwright tests failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1

  # WebKit (Safari) visual tests on macOS for real Safari fidelity
  visual-testing-macos:
    needs: [build, should-run]
    if: needs.should-run.outputs.run-macos == 'true'
    runs-on: macos-14
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard:
          [
            "1/2",
            "2/2",
          ]
    env:
      PLAYWRIGHT_BROWSERS: webkit
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Disable macOS firewall
        run: sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate off

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-visual-testing-env
        with:
          install-playwright: "false"

      - name: Make folder for screenshots
        run: mkdir -p ./lost-pixel

      - name: Create Winston logs directory
        run: mkdir -p .logs

      - name: Install Playwright WebKit browser
        run: pnpm exec playwright install webkit

      - name: Strip macOS Gatekeeper quarantine attributes
        run: xattr -cr ~/Library/Caches/ms-playwright

      - name: Restore built site from cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: public/
          key: site-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm exec playwright test --config config/playwright/playwright.config.ts --shard ${{ matrix.shard }} -g "(lostpixel)" 2>&1 | tee playwright-run.log
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Create sanitized shard
        if: always()
        run: echo "SANITIZED_SHARD=${MATRIX_SHARD%%/*}" >> $GITHUB_ENV
        env:
          MATRIX_SHARD: ${{ matrix.shard }}

      - name: Upload Playwright logs
        if: steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: visual-testing-log-macos-shard-${{ env.SANITIZED_SHARD }}
          path: playwright-run.log
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Winston logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: winston-logs-macos-shard-${{ env.SANITIZED_SHARD }}
          path: .logs/
          if-no-files-found: warn
          retention-days: 1

      - name: Upload webServer build logs
        if: steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: webserver-build-log-macos-shard-${{ env.SANITIZED_SHARD }}
          path: /tmp/webserver.log
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Playwright traces
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: steps.playwright.outcome == 'failure'
        with:
          name: playwright-traces-macos-shard-${{ env.SANITIZED_SHARD }}
          path: test-results/
          retention-days: 1

      - name: Upload Lost Pixel screenshots shard
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: lost-pixel-screenshots-macos-shard-${{ env.SANITIZED_SHARD }}
          path: ./lost-pixel
          retention-days: 1

      - name: Fail if playwright tests failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1

  # Unified status check — required by branch protection
  visual-testing:
    name: visual-testing
    if: always()
    needs: [should-run, visual-testing-linux, visual-testing-macos]
    runs-on: ubuntu-24.04
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.should-run.outputs.run }}" == "false" ]]; then
            echo "Tests were skipped (no label)"
            exit 0
          fi
          if [[ "${{ needs.visual-testing-linux.result }}" != "success" ]]; then
            echo "Linux visual tests did not succeed (${{ needs.visual-testing-linux.result }})"
            exit 1
          fi
          # macOS only runs on push to main; allow skipped elsewhere
          if [[ "${{ needs.should-run.outputs.run-macos }}" == "true" ]] && \
             [[ "${{ needs.visual-testing-macos.result }}" != "success" ]]; then
            echo "macOS visual tests did not succeed (${{ needs.visual-testing-macos.result }})"
            exit 1
          fi

  summarize-failures:
    name: Summarize Failures
    if: always() && (needs.visual-testing-linux.result == 'failure' || needs.visual-testing-macos.result == 'failure')
    needs: [visual-testing-linux, visual-testing-macos]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/summarize-failed-shards
        with:
          log-pattern: visual-testing-log-*
          final-log-name: visual-testing-failed-logs

  combine-and-upload:
    needs: [should-run, visual-testing-linux, visual-testing-macos]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: >
      always() && !cancelled() &&
      needs.visual-testing-linux.result == 'success' &&
      (needs.visual-testing-macos.result == 'success' || needs.visual-testing-macos.result == 'skipped')

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-visual-testing-env

      - name: Download all Lost Pixel screenshot shards
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: lost-pixel-screenshots-*
          path: ./all-lost-pixel-shards
          merge-multiple: true

      - name: Combine screenshots into ./lost-pixel directory
        id: combine
        run: |
          shopt -s globstar # Enable recursive globbing
          mkdir -p ./lost-pixel
          cp -v ./all-lost-pixel-shards/**/*.png ./lost-pixel/
          echo "Contents of ./lost-pixel after combining:"
          ls -R ./lost-pixel
          if [ -z "$(ls -A ./lost-pixel)" ]; then
            echo "screenshots_found=false" >> "$GITHUB_OUTPUT"
            echo "./lost-pixel directory is empty after combination attempt."
          else
            echo "screenshots_found=true" >> "$GITHUB_OUTPUT"
            echo "Screenshots found in ./lost-pixel."
          fi

      - name: Symlink LostPixel config to root
        if: steps.combine.outputs.screenshots_found == 'true'
        run: ln -s config/lostpixel/lostpixel.config.ts lostpixel.config.ts

      - name: Run LostPixel on combined screenshots
        if: steps.combine.outputs.screenshots_found == 'true'
        uses: lost-pixel/lost-pixel@41055d71dea42eb5fa5c27dabd2a90722f376e33 # v3.22.0
        env:
          LOST_PIXEL_API_KEY: ${{ secrets.LOST_PIXEL_API_KEY }}
          LOST_PIXEL_PROJECT_ID: ${{ secrets.LOST_PIXEL_PROJECT_ID }}

      - name: Clean up downloaded shards
        run: rm -rf ./all-lost-pixel-shards
