name: Visual Testing

concurrency:
  group: visual-testing-${{ github.ref_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    types: [labeled, synchronize, opened, reopened]
    paths:
      - "quartz/**"
      - "website_content/**"
      - "config/quartz/**"
      - "config/constants.json"
      - "config/playwright/**"
      - "config/lostpixel/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"
  merge_group:

permissions:
  actions: read
  contents: read

jobs:
  # Gate: only run on PRs if ci:run-visual or ci:full-tests label is present.
  # The pull_request trigger intentionally omits a branches filter so that
  # these labels work on PRs targeting any branch (not just main/dev).
  # Tests always run in the merge queue to enforce passing before merge.
  should-run:
    name: visual-should-run
    runs-on: ubuntu-24.04
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:full-tests') }}" == "true" ]] || \
               [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:run-visual') }}" == "true" ]]; then
              echo "run=true" >> "$GITHUB_OUTPUT"
            else
              echo "run=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: visual-testing-build
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/build-site.yaml
    with:
      artifact-name: visual-testing-public-dir
      remove-safari-autoplay: true

  visual-testing:
    needs: build
    # Using Ubuntu 24.04 (pinned) for stability - ubuntu-latest can break when GitHub updates it
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        shard:
          [
            "1/10",
            "2/10",
            "3/10",
            "4/10",
            "5/10",
            "6/10",
            "7/10",
            "8/10",
            "9/10",
            "10/10",
          ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-visual-testing-env
        with:
          install-playwright: "true"

      - name: Make folder for screenshots
        run: mkdir -p ./lost-pixel

      - name: Create Winston logs directory
        run: mkdir -p .logs

      - name: Install browsers
        run: pnpm run install-browsers

      - name: Download built site
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: visual-testing-public-dir
          path: public/

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm exec playwright test --config config/playwright/playwright.config.ts --shard ${{ matrix.shard }} -g "(lostpixel)" 2>&1 | tee playwright-run.log
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Create sanitized shard
        if: always()
        run: echo "SANITIZED_SHARD=${MATRIX_SHARD%%/*}" >> $GITHUB_ENV
        env:
          MATRIX_SHARD: ${{ matrix.shard }}

      - name: Upload Playwright logs
        if: steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: visual-testing-log-shard-${{ env.SANITIZED_SHARD }}
          path: playwright-run.log
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Winston logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: winston-logs-shard-${{ env.SANITIZED_SHARD }}
          path: .logs/
          if-no-files-found: warn
          retention-days: 1

      - name: Upload webServer build logs
        if: steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: webserver-build-log-shard-${{ env.SANITIZED_SHARD }}
          path: /tmp/webserver.log
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Playwright traces
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: steps.playwright.outcome == 'failure'
        with:
          name: playwright-traces-shard-${{ env.SANITIZED_SHARD }}
          path: test-results/
          retention-days: 1

      - name: Upload Lost Pixel screenshots shard
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: lost-pixel-screenshots-shard-${{ env.SANITIZED_SHARD }}
          path: ./lost-pixel
          retention-days: 1

      - name: Fail if playwright tests failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1

  summarize-failures:
    name: Summarize Failures
    if: always() && needs.visual-testing.result == 'failure'
    needs: visual-testing
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/summarize-failed-shards
        with:
          log-pattern: visual-testing-log-shard-*
          final-log-name: visual-testing-failed-logs

  combine-and-upload:
    needs: visual-testing
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: needs.visual-testing.result == 'success'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-visual-testing-env

      - name: Download all Lost Pixel screenshot shards
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: lost-pixel-screenshots-*
          path: ./all-lost-pixel-shards
          merge-multiple: true

      - name: Combine screenshots into ./lost-pixel directory
        id: combine
        run: |
          shopt -s globstar # Enable recursive globbing
          mkdir -p ./lost-pixel
          cp -v ./all-lost-pixel-shards/**/*.png ./lost-pixel/
          echo "Contents of ./lost-pixel after combining:"
          ls -R ./lost-pixel
          if [ -z "$(ls -A ./lost-pixel)" ]; then
            echo "screenshots_found=false" >> "$GITHUB_OUTPUT"
            echo "./lost-pixel directory is empty after combination attempt."
          else
            echo "screenshots_found=true" >> "$GITHUB_OUTPUT"
            echo "Screenshots found in ./lost-pixel."
          fi

      - name: Symlink LostPixel config to root
        if: steps.combine.outputs.screenshots_found == 'true'
        run: ln -s config/lostpixel/lostpixel.config.ts lostpixel.config.ts

      - name: Run LostPixel on combined screenshots
        if: steps.combine.outputs.screenshots_found == 'true'
        uses: lost-pixel/lost-pixel@6db31948aef97f10ea9c7b1a8fa8dd3a0ce2dd49 # v3.16.0
        env:
          LOST_PIXEL_API_KEY: ${{ secrets.LOST_PIXEL_API_KEY }}
          LOST_PIXEL_PROJECT_ID: ${{ secrets.LOST_PIXEL_PROJECT_ID }}

      - name: Clean up downloaded shards
        run: rm -rf ./all-lost-pixel-shards
