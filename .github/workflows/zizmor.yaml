name: zizmor

# Security audit of GitHub Actions workflows and composite actions.

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  decide:
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/decide-reusable.yaml
    with:
      filters: |
        run:
          - '.github/**'

  zizmor:
    needs: decide
    if: needs.decide.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run zizmor
        run: uvx zizmor==1.25.2 .github/

  zizmor-passed: # required-check: true
    if: always()
    needs: [decide, zizmor]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            .github/actions/report-job-result
            .github/scripts
          persist-credentials: false

      - name: Report result
        uses: ./.github/actions/report-job-result
        with:
          run: ${{ needs.decide.outputs.run }}
          decide-result: ${{ needs.decide.result }}
          result: ${{ needs.zizmor.result }}
